<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Deck — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  (function() {
    var STORAGE_KEY = "mts-theme";
    var theme = localStorage.getItem(STORAGE_KEY);
    if (!theme) {
      theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
  <link rel="stylesheet" href="../assets/global.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    /* ── Design tokens ── */
    
    

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--text2); text-decoration: none;
      font-size: 0.85rem; font-weight: 500;
      padding: 6px 12px; border: 1px solid var(--border2);
      border-radius: var(--radius-xs); transition: all 0.2s;
    }
    .nav-back:hover { color: var(--text); border-color: var(--accent); }
    .nav-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1rem; flex: 1;
    }
    .nav-ig-icon {
      width: 22px; height: 22px; border-radius: 6px;
      background: var(--ig-grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: #fff; flex-shrink: 0;
    }

    /* ── Deck layout ── */
    .deck-container {
      display: flex; overflow-x: auto;
      height: calc(100vh - 57px);
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .deck-column {
      flex: 1 1 0; min-width: 200px;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg2); overflow: hidden;
    }
    .deck-col-header {
      position: sticky; top: 0;
      padding: 14px 16px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      z-index: 2; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .col-avatar-wrap {
      position: relative; flex-shrink: 0; margin-right: 10px;
    }
    .col-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; display: block;
      border: 2px solid transparent;
      background: var(--ig-grad);
      padding: 2px;
    }
    .col-avatar-inner {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover; display: block;
      background: var(--bg3);
    }
    .col-verified {
      position: absolute; bottom: -2px; right: -2px;
      width: 14px; height: 14px; border-radius: 50%;
      background: #3b9ded; border: 2px solid var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.45rem; color: #fff;
    }
    .deck-col-header h2 {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.92rem; color: var(--text);
    }
    .deck-col-header .handle {
      font-size: 0.7rem; color: var(--text3); margin-top: 1px;
    }
    .col-stats {
      font-size: 0.65rem; color: var(--text3); margin-top: 2px;
    }
    .deck-col-badge {
      font-size: 0.68rem; padding: 2px 8px;
      background: var(--bg3); border-radius: 100px; color: var(--text2);
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .deck-pulse {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #e8ff47;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .deck-col-feed {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .deck-loading {
      padding: 24px 16px; text-align: center;
      font-size: 0.8rem; color: var(--text3);
    }

    /* ── Post card ── */
    .post-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); overflow: hidden;
      margin-bottom: 10px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .post-card:hover { background: var(--card-hover); border-color: var(--border2); }

    /* Thumbnail */
    .post-thumb {
      width: 100%; aspect-ratio: 1/1; object-fit: cover;
      display: block; background: var(--bg3);
      position: relative;
    }
    .post-thumb-wrap {
      position: relative; overflow: hidden;
    }
    .post-thumb-img {
      width: 100%; aspect-ratio: 1/1; object-fit: cover;
      display: block; background: var(--bg3);
      transition: transform 0.3s ease;
    }
    .post-card:hover .post-thumb-img { transform: scale(1.03); }

    /* Media type badge overlay */
    .post-type-badge {
      position: absolute; top: 8px; right: 8px;
      padding: 3px 8px; border-radius: 100px;
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase;
      backdrop-filter: blur(8px);
      border: 1px solid;
    }
    .type-video  { background: rgba(255,107,107,0.85); color: #fff; border-color: rgba(255,107,107,0.5); }
    .type-image  { background: rgba(124,107,255,0.85); color: #fff; border-color: rgba(124,107,255,0.5); }
    .type-sidecar { background: rgba(0,0,0,0.75); color: #fff; border-color: rgba(255,255,255,0.2); }

    /* Play icon overlay for video */
    .post-play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.25);
    }
    .post-play-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.7);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: #fff;
    }

    /* Multi-image indicator */
    .post-multi-icon {
      position: absolute; top: 8px; left: 8px;
      font-size: 0.85rem; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
    }

    /* Card body */
    .post-body { padding: 12px 14px 10px; }

    .post-header {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 8px;
    }
    .post-handle { font-size: 0.72rem; color: var(--text3); }
    .post-date   { font-size: 0.7rem; color: var(--text3); margin-left: auto; white-space: nowrap; }

    .post-caption {
      font-size: 0.84rem; color: var(--text); line-height: 1.45;
      margin-bottom: 10px; word-break: break-word;
    }

    /* Stats row */
    .post-stats {
      display: flex; gap: 12px; margin-bottom: 10px;
    }
    .post-stat {
      font-size: 0.72rem; color: var(--text2);
      display: flex; align-items: center; gap: 4px;
    }
    .post-stat-val { font-weight: 600; color: var(--text); }

    /* Tags */
    .post-tags {
      display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .post-tag {
      font-size: 0.62rem; padding: 2px 7px;
      border-radius: 100px; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      border: 1px solid;
    }
    .tag-video   { color: #ff6b6b; border-color: rgba(255,107,107,0.4); background: rgba(255,107,107,0.08); }
    .tag-image   { color: var(--accent2); border-color: rgba(124,107,255,0.4); background: rgba(124,107,255,0.08); }
    .tag-sidecar { color: #38bdf8; border-color: rgba(56,189,248,0.4); background: rgba(56,189,248,0.08); }
    .tag-igtv    { color: #f59e0b; border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.08); }

    /* Buttons */
    .post-btns {
      display: flex; gap: 5px; flex-wrap: wrap;
    }
    .post-btn {
      font-size: 0.68rem; padding: 4px 9px;
      border: 1px solid var(--border2); border-radius: var(--radius-xs);
      background: var(--bg3); color: var(--text2); cursor: pointer;
      transition: all 0.15s; font-family: 'DM Sans', sans-serif;
      text-decoration: none; display: inline-flex; align-items: center;
    }
    .post-btn:hover { border-color: var(--accent); color: var(--accent); }
    .post-btn.copied { background: var(--accent); color: var(--btn-text); border-color: var(--accent); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px; backdrop-filter: blur(6px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); max-width: 640px; width: 100%;
      max-height: 92vh; overflow-y: auto; padding: 0;
      position: relative; scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .modal-close {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text2); width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { color: var(--text); border-color: var(--accent); }

    /* Modal media */
    .modal-media { width: 100%; background: #000; position: relative; }
    .modal-media-img {
      width: 100%; max-height: 70vh; object-fit: contain;
      display: block;
    }
    .modal-media-video {
      width: 100%; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg3); flex-direction: column; gap: 8px;
      padding: 32px;
    }
    .modal-media-carousel {
      display: flex; overflow-x: auto; gap: 2px;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin; scrollbar-color: var(--accent) var(--bg);
    }
    .modal-media-carousel img {
      flex-shrink: 0; width: 100%; scroll-snap-align: start;
      object-fit: contain; max-height: 70vh;
    }

    /* Modal body */
    .modal-body { padding: 20px 24px 24px; }
    .modal-profile {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px; padding-right: 40px;
    }
    .modal-avatar-wrap { position: relative; flex-shrink: 0; }
    .modal-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      object-fit: cover; border: 2px solid transparent;
      background: var(--ig-grad); padding: 2px;
    }
    .modal-avatar-inner {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover; background: var(--bg3); display: block;
    }
    .modal-verified {
      position: absolute; bottom: -2px; right: -2px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #3b9ded; border: 2px solid var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.5rem; color: #fff;
    }
    .modal-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
    .modal-handle { font-size: 0.8rem; color: var(--text3); }

    .modal-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }

    .modal-caption {
      font-size: 0.92rem; line-height: 1.6;
      color: var(--text); margin-bottom: 14px; word-break: break-word;
      white-space: pre-wrap;
    }
    .modal-stats {
      display: flex; gap: 16px; margin-bottom: 14px;
      padding: 10px 0; border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .modal-stat { font-size: 0.8rem; color: var(--text2); }
    .modal-stat strong { display: block; font-size: 1rem; color: var(--text); font-weight: 700; }

    .modal-footer {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; padding-top: 14px;
    }
    .modal-date { font-size: 0.78rem; color: var(--text3); flex: 1; }
    .modal-open-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: var(--radius-xs);
      background: var(--ig-grad); color: #fff;
      font-size: 0.78rem; font-weight: 600; text-decoration: none;
      transition: opacity 0.2s;
    }
    .modal-open-btn:hover { opacity: 0.85; }
    .modal-copy-btn {
      padding: 7px 14px; border-radius: var(--radius-xs);
      border: 1px solid var(--border2); background: var(--bg3);
      color: var(--text2); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .modal-copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-copy-btn.copied { background: var(--accent); color: var(--btn-text); border-color: var(--accent); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .deck-column {
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .deck-column:nth-of-type(1) { animation-delay: 0.1s; }
    .deck-column:nth-of-type(2) { animation-delay: 0.15s; }
    .deck-column:nth-of-type(3) { animation-delay: 0.2s; }
    .deck-column:nth-of-type(4) { animation-delay: 0.25s; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ════════════════════════════════════════
       MOBILE — TAB-BASED SINGLE COLUMN VIEW
    ════════════════════════════════════════ */

    .mobile-tab-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      z-index: 90;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      align-items: stretch;
    }
    .mobile-tab-bar::-webkit-scrollbar { display: none; }

    .mobile-tab {
      flex: 0 0 auto;
      min-width: 72px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 5px 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .mobile-tab:hover { background: var(--bg3); }
    .mobile-tab.active { border-bottom-color: var(--accent); }

    .mobile-tab-initial {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--bg3); border: 1.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.6rem; color: var(--accent2);
      transition: border-color 0.15s;
      flex-shrink: 0; overflow: hidden; position: relative;
    }
    .mobile-tab.active .mobile-tab-initial { border-color: var(--accent); color: var(--accent); }
    .mobile-tab-initial img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; border-radius: 50%; display: none;
    }
    .mobile-tab-initial img.loaded { display: block; }

    .mobile-tab-label {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.52rem; color: var(--text3);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 72px;
      transition: color 0.15s;
    }
    .mobile-tab.active .mobile-tab-label { color: var(--accent); }

    @keyframes slideInFromRight { from { transform: translateX(28px); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes slideInFromLeft  { from { transform: translateX(-28px); opacity:0; } to { transform: translateX(0); opacity:1; } }
    .deck-column.slide-from-right { animation: slideInFromRight 0.22s cubic-bezier(0.4,0,0.2,1) forwards; }
    .deck-column.slide-from-left  { animation: slideInFromLeft  0.22s cubic-bezier(0.4,0,0.2,1) forwards; }

    @media (max-width: 700px) {

      /* Kill the fadeUp re-trigger when columns are shown/hidden via mobile-active */
      .deck-column {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      .nav { padding: 10px 14px; gap: 8px; }
      .nav-back { padding: 5px 9px; font-size: 0.78rem; }
      .nav-title { font-size: 0.88rem; }
      .nav-ig-icon { display: none; }
      .theme-toggle { width: 32px; height: 32px; }

      .mobile-tab-bar { display: flex; }

      .deck-container {
        display: block;
        height: calc(100vh - 53px);
        overflow: hidden;
        position: relative;
      }
      .deck-column {
        position: absolute; inset: 0;
        min-width: unset; max-width: unset; width: 100%;
        border-right: none;
        display: none; flex-direction: column;
        padding-bottom: 52px;
      }
      .deck-column.mobile-active { display: flex; }
      .deck-col-feed { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

      .deck-col-header { padding: 10px 14px; }
      .col-avatar { width: 30px; height: 30px; }
      .deck-col-header h2 { font-size: 0.88rem; }
      .deck-col-header .handle { font-size: 0.67rem; }

      .post-card { margin-bottom: 8px; }
      .post-body { padding: 10px 12px 8px; }
      .post-btn  { font-size: 0.64rem; padding: 3px 7px; }

      /* Modal: bottom sheet */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal-box {
        max-width: 100%; width: 100%;
        max-height: 92vh;
        border-radius: var(--radius) var(--radius) 0 0;
      }
      .modal-footer { flex-wrap: wrap; gap: 8px; }
      .modal-open-btn { flex: 1; justify-content: center; text-align: center; }
      .modal-copy-btn { flex: 1; text-align: center; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-back">← Back</a>
  <div class="nav-ig-icon">📷</div>
  <span class="nav-title">IG Deck</span>
  <span style="font-size:0.72rem;color:var(--text3);">via Apify</span>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
    <button class="theme-toggle" id="themeToggle"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
  </div>
</nav>

<div class="deck-container" id="deckContainer"></div>

<!-- Mobile tab bar -->
<div class="mobile-tab-bar" id="mobileTabBar"></div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose">×</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="../assets/theme.js"></script>
<script>

// ── Config ─────────────────────────────────────────────────────────────────
const APIFY_TOKEN = atob('YXBpZnlfYXBpX2ZqdldvdjlOZnBLS1lTbFdER3pqbzJOZEhuSGhvdzNGbnh1QQ==');

const COLUMNS = [
  { key: 'le360fr', handle: '@le360fr', label: 'Le360 FR'      },
  { key: 'le360ar', handle: '@le360ar', label: 'Le360 AR'      },
  { key: 'le360sport', handle: '@le360sport', label: 'Le360 Sport'      },
  { key: 'le360es', handle: '@le360es', label: 'Le360 Español' },
];

// Cache: username → { profile, posts, loadedAt }
const cache = {};
const seen  = {}; // key → Set of post IDs

// ── Fetch all accounts in one API call ─────────────────────────────────────
async function fetchAllInstagram() {
  const usernames = COLUMNS.map(c => c.key);
  const res = await fetch(
    `https://api.apify.com/v2/acts/apify~instagram-profile-scraper/run-sync-get-dataset-items?token=${APIFY_TOKEN}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usernames })
    }
  );
  if (!res.ok) throw new Error(`Apify error ${res.status}`);
  const data = await res.json();
  if (!Array.isArray(data)) throw new Error('No data returned');
  data.forEach(profile => {
    if (profile && profile.username) {
      cache[profile.username] = profile;
    }
  });
  return data;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function formatDate(ts) {
  if (!ts) return '';
  try {
    const d   = new Date(ts);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60)    return 'Just now';
    if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return d.toLocaleString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return ts; }
}

function fmtNum(n) {
  if (!n) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000)    return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
  });
}

function proxyUrl(url) {
  if (!url) return '';
  return 'https://images.weserv.nl/?url=' + encodeURIComponent(url);
}

// ── Determine post type ────────────────────────────────────────────────────
// Apify returns type: "Image", "Video", "Sidecar" (carousel)
function getPostType(post) {
  const t = (post.type || '').toLowerCase();
  if (t === 'video' || post.videoUrl) return 'video';
  if (t === 'sidecar' || (post.childPosts && post.childPosts.length > 0)) return 'sidecar';
  return 'image';
}

function typeLabel(type) {
  if (type === 'video')   return { cls: 'type-video',   tag: 'tag-video',   label: '▶ Video',   tagLabel: 'Video' };
  if (type === 'sidecar') return { cls: 'type-sidecar', tag: 'tag-sidecar', label: '⊞ Album',   tagLabel: 'Album' };
  return                         { cls: 'type-image',   tag: 'tag-image',   label: '◻ Photo',   tagLabel: 'Image' };
}

// Get all images from a post (including carousel children)
function getPostImages(post) {
  const imgs = [];
  if (post.displayUrl) imgs.push(post.displayUrl);
  if (post.childPosts && post.childPosts.length) {
    post.childPosts.forEach(c => { if (c.displayUrl) imgs.push(c.displayUrl); });
  }
  return imgs;
}

// ── Build post card ────────────────────────────────────────────────────────
function createPostCard(post, colKey, profileData) {
  const card = document.createElement('div');
  card.className = 'post-card';

  const type   = getPostType(post);
  const tinfo  = typeLabel(type);
  const images = getPostImages(post);
  const caption = (post.caption || '').trim();

  // Thumbnail
  if (images.length > 0 || type === 'video') {
    const wrap = document.createElement('div');
    wrap.className = 'post-thumb-wrap';

    const img = document.createElement('img');
    img.className = 'post-thumb-img';
    img.src = proxyUrl(images[0] || '');
    img.loading = 'lazy'; img.alt = '';
    img.onerror = function(){ this.closest('.post-thumb-wrap').style.display='none'; };
    wrap.appendChild(img);

    // Type badge
    const badge = document.createElement('span');
    badge.className = `post-type-badge ${tinfo.cls}`;
    badge.textContent = tinfo.label;
    wrap.appendChild(badge);

    // Play overlay for video
    if (type === 'video') {
      const overlay = document.createElement('div');
      overlay.className = 'post-play-overlay';
      const playBtn = document.createElement('div');
      playBtn.className = 'post-play-btn';
      playBtn.textContent = '▶';
      overlay.appendChild(playBtn);
      wrap.appendChild(overlay);
    }

    // Multi icon for carousel
    if (type === 'sidecar' && images.length > 1) {
      const multi = document.createElement('span');
      multi.className = 'post-multi-icon';
      multi.textContent = '❐';
      wrap.appendChild(multi);
    }

    card.appendChild(wrap);
  }

  // Body
  const body = document.createElement('div');
  body.className = 'post-body';

  // Header
  const header = document.createElement('div');
  header.className = 'post-header';
  const handleEl = document.createElement('span');
  handleEl.className = 'post-handle';
  handleEl.textContent = `@${colKey}`;
  const dateEl = document.createElement('span');
  dateEl.className = 'post-date';
  dateEl.textContent = formatDate(post.timestamp);
  header.appendChild(handleEl);
  header.appendChild(dateEl);
  body.appendChild(header);

  // Tag
  const tagRow = document.createElement('div');
  tagRow.className = 'post-tags';
  const tag = document.createElement('span');
  tag.className = `post-tag ${tinfo.tag}`;
  tag.textContent = tinfo.tagLabel;
  tagRow.appendChild(tag);
  if (post.productType === 'igtv') {
    const igtvTag = document.createElement('span');
    igtvTag.className = 'post-tag tag-igtv';
    igtvTag.textContent = 'IGTV';
    tagRow.appendChild(igtvTag);
  }
  body.appendChild(tagRow);

  // Caption
  if (caption) {
    const cap = document.createElement('div');
    cap.className = 'post-caption';
    cap.textContent = caption.length > 180 ? caption.slice(0, 180) + '…' : caption;
    body.appendChild(cap);
  }

  // Stats
  const stats = document.createElement('div');
  stats.className = 'post-stats';
  if (post.likesCount != null) {
    const ls = document.createElement('div');
    ls.className = 'post-stat';
    ls.innerHTML = `♥ <span class="post-stat-val">${fmtNum(post.likesCount)}</span>`;
    stats.appendChild(ls);
  }
  if (post.commentsCount != null) {
    const cs = document.createElement('div');
    cs.className = 'post-stat';
    cs.innerHTML = `💬 <span class="post-stat-val">${fmtNum(post.commentsCount)}</span>`;
    stats.appendChild(cs);
  }
  if (post.videoViewCount) {
    const vs = document.createElement('div');
    vs.className = 'post-stat';
    vs.innerHTML = `▶ <span class="post-stat-val">${fmtNum(post.videoViewCount)}</span>`;
    stats.appendChild(vs);
  }
  if (stats.children.length) body.appendChild(stats);

  // Buttons
  const btns = document.createElement('div');
  btns.className = 'post-btns';

  if (caption) {
    const copyCapBtn = document.createElement('button');
    copyCapBtn.className = 'post-btn';
    copyCapBtn.textContent = 'Copy Caption';
    copyCapBtn.addEventListener('click', e => { e.stopPropagation(); copyText(caption, copyCapBtn); });
    btns.appendChild(copyCapBtn);
  }

  const copyLinkBtn = document.createElement('button');
  copyLinkBtn.className = 'post-btn';
  copyLinkBtn.textContent = 'Copy Link';
  copyLinkBtn.addEventListener('click', e => { e.stopPropagation(); copyText(post.url, copyLinkBtn); });
  btns.appendChild(copyLinkBtn);

  const openBtn = document.createElement('a');
  openBtn.className = 'post-btn';
  openBtn.textContent = '↗ Open';
  openBtn.href = post.url;
  openBtn.target = '_blank'; openBtn.rel = 'noopener';
  openBtn.addEventListener('click', e => e.stopPropagation());
  btns.appendChild(openBtn);

  body.appendChild(btns);
  card.appendChild(body);

  card.addEventListener('click', () => openModal(post, colKey, profileData));
  return card;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(post, colKey, profileData) {
  const overlay = document.getElementById('modalOverlay');
  const content = document.getElementById('modalContent');
  content.innerHTML = '';

  const type   = getPostType(post);
  const images = getPostImages(post);
  const caption = (post.caption || '').trim();

  // Media section
  const mediaWrap = document.createElement('div');
  mediaWrap.className = 'modal-media';

  if (type === 'video') {
    const vw = document.createElement('div');
    vw.className = 'modal-media-video';
    vw.innerHTML = `<div style="font-size:2rem;color:var(--text3)">▶</div>
      <div style="font-size:0.82rem;color:var(--text3);text-align:center">Video — open on Instagram to play</div>`;
    if (images[0]) {
      const thumb = document.createElement('img');
      thumb.src = proxyUrl(images[0]); thumb.alt = '';
      thumb.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0.4;';
      vw.style.position = 'relative';
      vw.insertBefore(thumb, vw.firstChild);
    }
    mediaWrap.appendChild(vw);
  } else if (images.length === 1) {
    const img = document.createElement('img');
    img.className = 'modal-media-img';
    img.src = proxyUrl(images[0] || ''); img.alt = '';
    mediaWrap.appendChild(img);
  } else if (images.length > 1) {
    const carousel = document.createElement('div');
    carousel.className = 'modal-media-carousel';
    images.forEach(src => {
      const img = document.createElement('img');
      img.src = proxyUrl(src); img.alt = '';
      carousel.appendChild(img);
    });
    mediaWrap.appendChild(carousel);
  }

  if (mediaWrap.children.length) content.appendChild(mediaWrap);

  // Body
  const body = document.createElement('div');
  body.className = 'modal-body';

  // Profile header
  const profileRow = document.createElement('div');
  profileRow.className = 'modal-profile';

  const avatarWrap = document.createElement('div');
  avatarWrap.className = 'modal-avatar-wrap';
  const avatarOuter = document.createElement('div');
  avatarOuter.className = 'modal-avatar';
  avatarOuter.style.cssText = 'width:48px;height:48px;border-radius:50%;background:var(--ig-grad);padding:2px;';
  const avatarInner = document.createElement('img');
  avatarInner.className = 'modal-avatar-inner';
  avatarInner.src = profileData ? proxyUrl(profileData.profilePicUrl) : '';
  avatarInner.alt = '';
  avatarInner.onerror = function(){ this.style.display='none'; };
  avatarOuter.appendChild(avatarInner);
  avatarWrap.appendChild(avatarOuter);
  if (profileData && profileData.verified) {
    const vbadge = document.createElement('div');
    vbadge.className = 'modal-verified';
    vbadge.textContent = '✓';
    avatarWrap.appendChild(vbadge);
  }
  profileRow.appendChild(avatarWrap);

  const info = document.createElement('div');
  const name = document.createElement('div');
  name.className = 'modal-name';
  name.textContent = profileData ? profileData.fullName : colKey;
  const handle = document.createElement('div');
  handle.className = 'modal-handle';
  handle.textContent = `@${colKey}`;
  info.appendChild(name); info.appendChild(handle);
  profileRow.appendChild(info);
  body.appendChild(profileRow);

  // Tags
  const tinfo = typeLabel(type);
  const tagRow = document.createElement('div');
  tagRow.className = 'modal-tags';
  const tag = document.createElement('span');
  tag.className = `post-tag ${tinfo.tag}`;
  tag.textContent = tinfo.tagLabel;
  tagRow.appendChild(tag);
  if (post.productType === 'igtv') {
    const igtvTag = document.createElement('span');
    igtvTag.className = 'post-tag tag-igtv';
    igtvTag.textContent = 'IGTV';
    tagRow.appendChild(igtvTag);
  }
  if (images.length > 1) {
    const cntTag = document.createElement('span');
    cntTag.className = 'post-tag tag-sidecar';
    cntTag.textContent = `${images.length} photos`;
    tagRow.appendChild(cntTag);
  }
  body.appendChild(tagRow);

  // Caption
  if (caption) {
    const cap = document.createElement('div');
    cap.className = 'modal-caption';
    cap.textContent = caption;
    body.appendChild(cap);
  }

  // Stats
  const stats = document.createElement('div');
  stats.className = 'modal-stats';
  const addStat = (label, val) => {
    if (val == null) return;
    const s = document.createElement('div');
    s.className = 'modal-stat';
    s.innerHTML = `<strong>${fmtNum(val)}</strong>${label}`;
    stats.appendChild(s);
  };
  addStat('Likes', post.likesCount);
  addStat('Comments', post.commentsCount);
  addStat('Views', post.videoViewCount);
  if (stats.children.length) body.appendChild(stats);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  const dateEl = document.createElement('div');
  dateEl.className = 'modal-date';
  dateEl.textContent = post.timestamp ? new Date(post.timestamp).toLocaleString('fr-FR') : '';
  footer.appendChild(dateEl);

  if (caption) {
    const copyCapBtn = document.createElement('button');
    copyCapBtn.className = 'modal-copy-btn';
    copyCapBtn.textContent = 'Copy Caption';
    copyCapBtn.addEventListener('click', () => copyText(caption, copyCapBtn));
    footer.appendChild(copyCapBtn);
  }

  const copyLinkBtn = document.createElement('button');
  copyLinkBtn.className = 'modal-copy-btn';
  copyLinkBtn.textContent = 'Copy Link';
  copyLinkBtn.addEventListener('click', () => copyText(post.url, copyLinkBtn));
  footer.appendChild(copyLinkBtn);

  const openBtn = document.createElement('a');
  openBtn.className = 'modal-open-btn';
  openBtn.href = post.url;
  openBtn.target = '_blank'; openBtn.rel = 'noopener';
  openBtn.textContent = '↗ Open on Instagram';
  footer.appendChild(openBtn);

  body.appendChild(footer);
  content.appendChild(body);

  overlay.classList.remove('hidden');
}

document.getElementById('modalClose').addEventListener('click', () =>
  document.getElementById('modalOverlay').classList.add('hidden'));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.add('hidden');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.add('hidden');
});

// ── Build columns ──────────────────────────────────────────────────────────
const container = document.getElementById('deckContainer');

COLUMNS.forEach(col => {
  seen[col.key] = new Set();

  const colEl = document.createElement('div');
  colEl.className = 'deck-column';
  colEl.id = `col-${col.key}`;
  colEl.innerHTML = `
    <div class="deck-col-header">
      <div class="col-avatar-wrap">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--ig-grad);padding:2px;">
          <img class="col-avatar-inner" src="" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover;background:var(--bg3);" />
        </div>
      </div>
      <div style="flex:1;min-width:0;">
        <h2>${col.label}</h2>
        <div class="handle">${col.handle}</div>
        <div class="col-stats" id="stats-${col.key}"></div>
      </div>
      <span class="deck-col-badge"><span class="deck-pulse"></span>live</span>
    </div>
    <div class="deck-col-feed" id="feed-${col.key}">
      <div class="deck-loading">Loading…</div>
    </div>`;
  container.appendChild(colEl);
});

// ── Load column from cache ──────────────────────────────────────────────────
async function loadColumn(col) {
  const feed = document.getElementById(`feed-${col.key}`);
  try {
    if (!cache[col.key]) {
      await fetchAllInstagram();
    }
    const data = cache[col.key];
    if (!data) throw new Error('No cached data');

    const posts = [
      ...(data.latestPosts || []),
      ...(data.latestIgtvVideos || [])
    ].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

    // Update avatar
    if (data.profilePicUrl) {
      const avatarWrap = document.querySelector(`#col-${col.key} .col-avatar-wrap`);
      const avatarImg = avatarWrap ? avatarWrap.querySelector('.col-avatar-inner') : null;
      if (avatarImg) {
        avatarImg.src = proxyUrl(data.profilePicUrl);
        avatarImg.style.display = 'block';
        avatarImg.onerror = function() {
          this.style.display = 'none';
        };
      } else {
        console.warn('Avatar img not found for', col.key, avatarWrap);
      }
      setTabAvatar(col.key, proxyUrl(data.profilePicUrl));
    }

    // Update stats
    const statsEl = document.getElementById(`stats-${col.key}`);
    if (statsEl && data.followersCount) {
      statsEl.textContent = `${fmtNum(data.followersCount)} followers`;
    }

    // Add verified badge if needed
    if (data.verified) {
      const avatarWrap = document.querySelector(`#col-${col.key} .col-avatar-wrap`);
      if (avatarWrap && !avatarWrap.querySelector('.col-verified')) {
        const vbadge = document.createElement('div');
        vbadge.className = 'col-verified';
        vbadge.textContent = '✓';
        avatarWrap.appendChild(vbadge);
      }
    }

    const fresh = posts.filter(p => !seen[col.key].has(p.id));
    if (!fresh.length) return;

    const loader = feed.querySelector('.deck-loading');
    if (loader) loader.remove();

    const frag = document.createDocumentFragment();
    fresh.forEach(post => {
      frag.appendChild(createPostCard(post, col.key, data));
      seen[col.key].add(post.id);
    });
    feed.insertBefore(frag, feed.firstChild);

  } catch(e) {
    const loader = feed.querySelector('.deck-loading');
    if (loader) {
      loader.innerHTML = '';
      const msg = document.createElement('div');
      msg.textContent = '⚠ Failed to load';
      msg.style.cssText = 'margin-bottom:8px;font-size:0.8rem;color:var(--text3);';
      const btn = document.createElement('button');
      btn.textContent = '↺ Retry';
      btn.style.cssText = 'font-size:0.72rem;padding:5px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;';
      btn.onmouseenter = () => btn.style.borderColor = 'var(--accent)';
      btn.onmouseleave = () => btn.style.borderColor = 'var(--border2)';
      btn.onclick = () => { loader.textContent = 'Retrying…'; loadColumn(col); };
      loader.appendChild(msg);
      loader.appendChild(btn);
    }
    console.warn('IG fetch error', col.key, e);
  }
}

// ── Fetch all, then load columns ──────────────────────────────────────────
async function updateLoop() {
  try {
    await fetchAllInstagram();
  } catch(e) {
    console.warn('Failed to fetch all Instagram data', e);
  }
  COLUMNS.forEach((col, i) => {
    setTimeout(() => loadColumn(col), i * 500);
  });
  setTimeout(updateLoop, 2 * 60 * 1000); // every 2 minutes
}

// ── Mobile tab bar ─────────────────────────────────────────────────────────
const IS_MOBILE = () => window.innerWidth <= 700;
let mobileActiveIndex = 0;

function buildMobileTabs() {
  const bar = document.getElementById('mobileTabBar');
  bar.innerHTML = '';
  COLUMNS.forEach((col, i) => {
    const tab = document.createElement('div');
    tab.className = 'mobile-tab' + (i === 0 ? ' active' : '');

    const initWrap = document.createElement('div');
    initWrap.className = 'mobile-tab-initial';
    initWrap.id = `tab-initial-${col.key}`;
    initWrap.textContent = col.label.charAt(0).toUpperCase();

    const img = document.createElement('img');
    img.id = `tab-avatar-${col.key}`;
    img.alt = col.label;
    initWrap.appendChild(img);

    const label = document.createElement('span');
    label.className = 'mobile-tab-label';
    label.textContent = col.label;

    tab.appendChild(initWrap);
    tab.appendChild(label);
    tab.addEventListener('click', () => switchMobileTab(i));
    bar.appendChild(tab);
  });
}

function switchMobileTab(newIndex, direction) {
  if (!IS_MOBILE() || newIndex === mobileActiveIndex) return;
  const dir = direction !== undefined ? direction : (newIndex > mobileActiveIndex ? 'right' : 'left');
  const animClass = dir === 'right' ? 'slide-from-right' : 'slide-from-left';
  const oldCol = document.getElementById(`col-${COLUMNS[mobileActiveIndex].key}`);
  if (oldCol) oldCol.classList.remove('mobile-active');
  const newCol = document.getElementById(`col-${COLUMNS[newIndex].key}`);
  if (newCol) {
    newCol.classList.add('mobile-active');
    newCol.classList.remove('slide-from-right', 'slide-from-left');
    void newCol.offsetWidth;
    newCol.classList.add(animClass);
    setTimeout(() => newCol.classList.remove(animClass), 300);
  }
  document.querySelectorAll('.mobile-tab').forEach((t, i) => t.classList.toggle('active', i === newIndex));
  const tabs = document.querySelectorAll('.mobile-tab');
  if (tabs[newIndex]) tabs[newIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  mobileActiveIndex = newIndex;
}

function applyMobileLayout() {
  COLUMNS.forEach((col, i) => {
    const el = document.getElementById(`col-${col.key}`);
    if (el) {
      if (IS_MOBILE()) el.classList.toggle('mobile-active', i === mobileActiveIndex);
      else el.classList.remove('mobile-active');
    }
  });
}

function setTabAvatar(colKey, url) {
  const img = document.getElementById(`tab-avatar-${colKey}`);
  if (!img) return;
  img.onload = () => img.classList.add('loaded');
  img.onerror = () => {};
  img.src = url;
}

// Touch swipe
(function initSwipe() {
  const container = document.getElementById('deckContainer');
  let tx = 0, ty = 0, swiping = false;
  container.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; swiping = false; }, { passive: true });
  container.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - tx, dy = e.touches[0].clientY - ty;
    if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) swiping = true;
  }, { passive: true });
  container.addEventListener('touchend', e => {
    if (!IS_MOBILE() || !swiping) return;
    const dx = e.changedTouches[0].clientX - tx;
    if (dx < -60 && mobileActiveIndex < COLUMNS.length - 1) switchMobileTab(mobileActiveIndex + 1, 'right');
    else if (dx > 60 && mobileActiveIndex > 0) switchMobileTab(mobileActiveIndex - 1, 'left');
    swiping = false;
  }, { passive: true });
})();

window.addEventListener('resize', applyMobileLayout);
buildMobileTabs();
applyMobileLayout();

updateLoop();
</script>
