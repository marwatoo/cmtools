<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Viewer — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    .md-layout {
      display: grid;
      grid-template-columns: 1fr 4fr;
      gap: 20px;
      margin-top: 16px;
      height: calc(100vh - 220px);
    }
    @media (max-width: 700px) {
      .md-layout { grid-template-columns: 1fr; height: auto; }
    }
    .md-layout.split {
      grid-template-columns: 1fr 1fr;
    }
    .md-layout.split .md-preview {
      max-width: 100%;
      margin: 0;
    }
    .md-layout.preview .md-editor {
      display: none;
    }
    .md-layout.preview {
      grid-template-columns: 1fr;
    }
    .md-layout.preview .md-preview {
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      overflow-x: hidden;
      height: auto;
      max-height: calc(100vh - 280px);
    }
    .md-layout.code .md-preview {
      display: none;
    }
    .md-layout.code {
      grid-template-columns: 1fr;
    }
    .md-layout.code .md-editor {
      display: flex;
      justify-content: center;
    }
    .md-layout.code .md-editor-inner {
      max-width: 900px;
      width: 100%;
    }
    .md-layout:not(.code) .md-editor {
      margin: 0;
      max-width: none;
    }
    .md-editor {
      display: flex;
      flex-direction: column;
    }
    .md-layout.code .md-editor-inner {
      max-width: 900px;
    }
    .md-editor-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .md-editor textarea {
      width: 100%;
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      background: var(--input-bg);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 16px;
      color: var(--text);
      resize: none;
      box-sizing: border-box;
    }
    .md-preview {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 24px;
      overflow-y: auto;
      overflow-x: hidden;
      height: 100%;
      max-height: calc(100vh - 280px);
      box-sizing: border-box;
    }
    .md-preview h1, .md-preview h2, .md-preview h3 { font-family: 'Syne', sans-serif; }
    .md-preview h1 { font-size: 1.8rem; margin-bottom: 16px; }
    .md-preview h2 { font-size: 1.4rem; margin: 20px 0 12px; }
    .md-preview h3 { font-size: 1.1rem; margin: 16px 0 8px; }
    .md-preview p { margin-bottom: 12px; line-height: 1.7; }
    .md-preview [dir="rtl"], .md-preview p:lang(ar), .md-preview p:lang(he) {
      direction: rtl;
      unicode-bidi: embed;
      text-align: right;
    }
    .md-preview ul, .md-preview ol { margin: 0 0 12px 20px; }
    .md-preview li { margin-bottom: 4px; }
    .md-preview a { color: var(--accent2); }
    .md-preview code {
      background: var(--bg3);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 0.9em;
    }
    .md-preview pre {
      background: transparent !important;
      padding: 16px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      margin: 12px 0;
    }
    .md-preview pre code {
      background: transparent !important;
      padding: 0;
    }
    .md-preview blockquote {
      border-left: 3px solid var(--accent);
      margin: 12px 0;
      padding: 8px 16px;
      color: var(--text2);
      background: var(--bg3);
      border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
    }
    .md-preview table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }
    .md-preview th, .md-preview td {
      border: 1px solid var(--border2);
      padding: 8px 12px;
      text-align: left;
    }
    .md-preview th { background: var(--bg3); }
    .md-preview img { max-width: 100%; border-radius: var(--radius-xs); }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 8px 14px;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: var(--radius-xs);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      border-color: var(--accent);
    }
    .btn.active {
      background: var(--accent);
      color: var(--btn-text);
      border-color: var(--accent);
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .md-layout, .md-editor, .md-preview, .tool-header {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header { animation-delay: 0.05s; }
    .md-layout { animation-delay: 0.1s; }
    .md-editor { animation-delay: 0.15s; }
    .md-preview { animation-delay: 0.2s; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Markdown Viewer</span>
    <span class="nav-num">preview</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
  </nav>
  <div class="tool-page">
    <div class="tool-header">
      <h1>Markdown Viewer</h1>
      <p>Write or paste markdown, see live preview. Load .md files, copy HTML.</p>
    </div>

    <div class="toolbar">
      <button class="btn active" id="viewPreview">👁 Preview</button>
      <button class="btn" id="viewCode">📝 Code</button>
      <button class="btn" id="splitBtn">⫿ Split</button>
      <button class="btn" id="loadFileBtn">📂 Load</button>
      <button class="btn" id="pasteBtn">📋 Paste</button>
      <button class="btn" id="copyHtmlBtn">📄 Copy HTML</button>
      <button class="btn" id="rtlBtn">↔ RTL</button>
      <button class="btn" id="clearBtn">🗑 Clear</button>
      <input type="file" id="fileInput" accept=".md,.markdown,.txt" style="display:none">
    </div>

    <div class="md-layout preview">
      <div class="md-editor">
        <div class="md-editor-inner">
          <textarea id="markdownInput" placeholder="# Write Markdown..."></textarea>
        </div>
      </div>
      <div class="md-preview" id="previewPane">
        <em>Preview appears here...</em>
      </div>
    </div>
  </div>

  <script>
    const mdInput = document.getElementById('markdownInput');
    const previewDiv = document.getElementById('previewPane');
    const fileInput = document.getElementById('fileInput');
    let viewMode = 'preview';
    let splitMode = false;

    const example = `# Welcome to Markdown ✨

## Features
- **Bold** and *italic* text
- ~~Strikethrough~~
- [Links](https://example.com)
- Inline \`code\`

## Code Block
\`\`\`javascript
const greet = (name) => {
  console.log(\`Hello, \${name}!\`);
};
greet('World');
\`\`\`

## Table
| Language | Level |
|----------|-------|
| JS       | ★★★   |
| Python   | ★★★   |

## Quote
> Design is thinking made visual.

## Image
![Placeholder](https://placehold.co/600x200/e8ff47/111?text=Markdown+Preview)`;

    function render() {
      const text = mdInput.value;
      if (!text.trim()) {
        previewDiv.innerHTML = '<em>Start typing to see preview...</em>';
        return;
      }
      try {
        marked.setOptions({ highlight: function(code, lang) {
          if (lang && hljs.getLanguage(lang)) {
            try { return hljs.highlight(code, { language: lang }).value; }
            catch(e) {}
          }
          try { return hljs.highlightAuto(code).value; }
          catch(e) { return code; }
        }});
        const html = marked.parse(text);
        previewDiv.innerHTML = html;
        previewDiv.querySelectorAll('pre code').forEach((block) => {
          hljs.highlightElement(block);
        });
      } catch(e) {
        previewDiv.innerHTML = '<span style="color:var(--accent3)">Error: ' + e.message + '</span>';
      }
    }

    function setView(mode) {
      viewMode = mode;
      splitMode = false;
      const layout = document.querySelector('.md-layout');
      const splitBtn = document.getElementById('splitBtn');
      layout.classList.remove('split', 'code', 'preview');
      splitBtn.classList.remove('active');
      document.getElementById('viewPreview').classList.remove('active');
      document.getElementById('viewCode').classList.remove('active');
      
      if (mode === 'preview') {
        document.getElementById('viewPreview').classList.add('active');
        layout.classList.add('preview');
      } else if (mode === 'code') {
        document.getElementById('viewCode').classList.add('active');
        layout.classList.add('code');
      }
    }

    mdInput.addEventListener('input', render);

    document.getElementById('viewPreview').addEventListener('click', () => setView('preview'));
    document.getElementById('viewCode').addEventListener('click', () => setView('code'));
    
    document.getElementById('splitBtn').addEventListener('click', () => {
      splitMode = !splitMode;
      const layout = document.querySelector('.md-layout');
      const btn = document.getElementById('splitBtn');
      if (splitMode) {
        layout.classList.remove('code', 'preview');
        layout.classList.add('split');
        btn.classList.add('active');
        document.getElementById('viewPreview').classList.remove('active');
        document.getElementById('viewCode').classList.remove('active');
        viewMode = 'split';
      } else {
        setView('preview');
      }
    });

    document.getElementById('pasteBtn').addEventListener('click', async () => {
      try {
        mdInput.value = await navigator.clipboard.readText();
        render();
      } catch(err) {
        alert('Paste denied. Use Ctrl+V to paste manually.');
      }
    });

    document.getElementById('loadFileBtn').addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => { mdInput.value = ev.target.result; render(); };
        reader.readAsText(file);
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      mdInput.value = ''; render();
    });

    let rtlMode = false;
    document.getElementById('rtlBtn').addEventListener('click', () => {
      rtlMode = !rtlMode;
      previewDiv.dir = rtlMode ? 'rtl' : 'ltr';
      document.getElementById('rtlBtn').classList.toggle('active', rtlMode);
    });

    document.getElementById('copyHtmlBtn').addEventListener('click', async () => {
      try {
        const html = marked.parse(mdInput.value);
        await navigator.clipboard.writeText(html);
        const btn = document.getElementById('copyHtmlBtn');
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.textContent = '📄 Copy HTML', 1200);
      } catch(err) {
        alert('Copy failed. Select manually.');
      }
    });

    mdInput.value = example;
    render();
  </script>
</body>
</html>
