<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Generator — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    
    

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    .nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px; background: var(--bg); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px; color: var(--text2);
      text-decoration: none; font-size: 0.85rem; font-weight: 500;
      padding: 6px 12px; border: 1px solid var(--border2);
      border-radius: var(--radius-xs); transition: all 0.2s;
    }
    .nav-back:hover { color: var(--text); border-color: var(--accent); }
    .nav-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; flex: 1; }
    .theme-toggle {
      margin-left: auto; width: 38px; height: 38px;
      border: 1px solid var(--border2); border-radius: 50%;
      background: transparent; color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* Page */
    .tool-page { max-width: 640px; margin: 0 auto; padding: 32px 24px 80px; }
    .tool-header { margin-bottom: 32px; }
    .tool-header h1 {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem;
      letter-spacing: -0.02em; margin-bottom: 6px;
    }
    .tool-header p { color: var(--text2); font-size: 0.9rem; }

    /* ── Password display ── */
    .pw-display-wrap {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .pw-display-wrap::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(232,255,71,0.03) 100%);
      pointer-events: none;
    }
    .pw-display-label {
      font-family: 'Syne', sans-serif; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase; color: var(--text3);
      margin-bottom: 12px;
    }
    .pw-output {
      font-family: 'DM Mono', monospace; font-size: 1.25rem; font-weight: 500;
      color: var(--text); word-break: break-all; line-height: 1.5;
      min-height: 60px; padding: 14px 16px;
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      display: flex; align-items: center;
      letter-spacing: 0.04em;
    }
    .pw-output.placeholder { color: var(--text3); font-size: 0.9rem; font-family: 'DM Sans', sans-serif; letter-spacing: 0; }

    /* Strength meter */
    .strength-wrap { margin-top: 14px; }
    .strength-bar-bg {
      height: 4px; background: var(--border2); border-radius: 100px; overflow: hidden;
    }
    .strength-bar {
      height: 100%; border-radius: 100px; transition: width 0.4s ease, background 0.4s ease;
      width: 0%;
    }
    .strength-info {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 7px; font-size: 0.75rem;
    }
    .strength-label { font-weight: 600; color: var(--text3); }
    .strength-entropy { color: var(--text3); font-family: 'DM Mono', monospace; font-size: 0.7rem; }

    /* ── Controls card ── */
    .controls-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
    }

    /* Section head */
    .section-head {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.09em;
      text-transform: uppercase; color: var(--text3);
      margin: 20px 0 12px; padding-bottom: 7px;
      border-bottom: 1px solid var(--border);
    }
    .section-head:first-child { margin-top: 0; }
    .section-head::before {
      content: ''; display: inline-block;
      width: 3px; height: 12px; background: var(--accent);
      border-radius: 2px; flex-shrink: 0;
    }

    /* Slider row */
    .srow {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .srow label {
      width: 100px; flex-shrink: 0;
      font-size: 0.78rem; font-weight: 500; color: var(--text2);
    }
    .sval {
      width: 58px; flex-shrink: 0; text-align: right;
      font-size: 0.8rem; font-variant-numeric: tabular-nums;
      font-family: 'DM Mono', monospace; color: var(--text3);
    }
    .step-btn {
      flex-shrink: 0; width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg3); color: var(--text2);
      font-size: 1rem; font-weight: 600; cursor: pointer; user-select: none;
      transition: background .15s, color .15s, border-color .15s; padding: 0;
    }
    .step-btn:hover { background: var(--accent); border-color: var(--accent); color: var(--btn-text); }

    input[type=range] {
      -webkit-appearance: none; appearance: none; flex: 1; min-width: 0;
      height: 3px; border-radius: 100px; background: var(--border2); outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 15px; height: 15px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent); cursor: pointer; transition: transform 0.12s;
    }
    input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.2); }

    /* Checkbox grid */
    .check-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px; margin-bottom: 4px;
    }
    .check-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: var(--input-bg); border: 1px solid var(--border2);
      border-radius: var(--radius-xs); cursor: pointer;
      transition: border-color .2s, background .2s; user-select: none;
    }
    .check-item:hover { border-color: var(--accent); background: var(--card-hover); }
    .check-item input[type=checkbox] { display: none; }
    .check-box {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1.5px solid var(--border2); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s; font-size: 0.7rem;
    }
    .check-item input:checked ~ .check-box { background: var(--accent); border-color: var(--accent); color: var(--btn-text); }
    .check-label { font-size: 0.8rem; font-weight: 500; color: var(--text2); }
    .check-item input:checked ~ .check-label { color: var(--text); }

    /* Preset buttons */
    .preset-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px; margin-bottom: 4px;
    }
    .preset-btn {
      padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius-xs); cursor: pointer;
      font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.04em; color: var(--text2); text-align: center;
      transition: all 0.15s;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--card-hover); }

    /* Custom exclude field */
    .field { margin-top: 12px; }
    .field label {
      display: block; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.04em;
      text-transform: uppercase; color: var(--text2); margin-bottom: 6px;
    }
    .field input[type=text] {
      width: 100%; padding: 9px 13px;
      background: var(--input-bg); border: 1px solid var(--border2);
      border-radius: var(--radius-xs); color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 0.88rem;
      outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text3); font-family: 'DM Sans', sans-serif; }

    /* Buttons */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 20px; border: none; border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.95rem;
      cursor: pointer; transition: all 0.2s; width: 100%; margin-bottom: 10px;
    }
    .btn-primary { background: var(--btn-bg); color: var(--btn-text); }
    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border2); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { margin-bottom: 0; }

    /* Batch passwords */
    .batch-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; margin-top: 24px;
    }
    .batch-list {
      margin-top: 14px; display: flex; flex-direction: column; gap: 6px;
    }
    .batch-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      font-family: 'DM Mono', monospace; font-size: 0.88rem; color: var(--text);
      cursor: pointer; transition: border-color 0.2s;
      user-select: none;
    }
    .batch-item:hover { border-color: var(--accent); }
    .batch-item .bi-num {
      font-size: 0.65rem; color: var(--text3); font-family: 'DM Sans', sans-serif;
      font-variant-numeric: tabular-nums; width: 16px; flex-shrink: 0; text-align: right;
    }
    .batch-item .bi-pw { flex: 1; word-break: break-all; }
    .batch-item .bi-copy { font-size: 0.75rem; color: var(--text3); flex-shrink: 0; transition: color 0.2s; }
    .batch-item:hover .bi-copy { color: var(--accent); }
    .batch-item.copied { border-color: var(--accent); }
    .batch-item.copied .bi-copy { color: var(--accent); }

    .copy-feedback-main {
      text-align: center; font-size: 0.78rem; color: var(--accent);
      height: 18px; margin-top: 4px; transition: opacity 0.3s;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .tool-header, .field, .check-grid, .preset-grid, .srow, .btn, .result-box {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header { animation-delay: 0.05s; }
    .field:nth-of-type(1) { animation-delay: 0.1s; }
    .check-grid { animation-delay: 0.15s; }
    .preset-grid { animation-delay: 0.2s; }
    .srow:nth-of-type(1) { animation-delay: 0.25s; }

    @media (max-width: 600px) {
      .tool-page { padding: 20px 16px 60px; }
      .check-grid { grid-template-columns: 1fr 1fr; }
      .preset-grid { grid-template-columns: 1fr 1fr; }
      .srow label { width: 80px; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  </style>
</head>
<body>

<nav class="nav">
  <a href="../index.html" class="nav-back">← Back</a>
  <span class="nav-title">Password Generator</span>
  <button class="theme-toggle" id="themeToggle"><span class="theme-icon">○</span></button>
</nav>

<div class="tool-page">
  <div class="tool-header">
    <h1>Password Generator</h1>
    <p>Generate cryptographically secure passwords with full control over length and character sets.</p>
  </div>

  <!-- Password display -->
  <div class="pw-display-wrap">
    <div class="pw-display-label">Generated Password</div>
    <div class="pw-output placeholder" id="pwOutput">Click Generate to create a password…</div>
    <div class="strength-wrap">
      <div class="strength-bar-bg">
        <div class="strength-bar" id="strengthBar"></div>
      </div>
      <div class="strength-info">
        <span class="strength-label" id="strengthLabel">—</span>
        <span class="strength-entropy" id="entropyLabel">—</span>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-card">

    <p class="section-head">Length</p>
    <div class="srow">
      <label>Characters</label>
      <button class="step-btn" data-target="lengthSlider" data-dir="-1">−</button>
      <input type="range" id="lengthSlider" min="4" max="128" step="1" value="16" />
      <button class="step-btn" data-target="lengthSlider" data-dir="1">+</button>
      <span class="sval" id="lengthVal">16</span>
    </div>

    <p class="section-head">Quick Presets</p>
    <div class="preset-grid">
      <button class="preset-btn" data-len="8">8 — Short</button>
      <button class="preset-btn" data-len="12">12 — Standard</button>
      <button class="preset-btn" data-len="16">16 — Secure</button>
      <button class="preset-btn" data-len="20">20 — Strong</button>
      <button class="preset-btn" data-len="32">32 — Max</button>
      <button class="preset-btn" data-len="64">64 — Ultra</button>
    </div>

    <p class="section-head">Character Sets</p>
    <div class="check-grid">
      <label class="check-item">
        <input type="checkbox" id="useUpper" checked>
        <span class="check-box">✓</span>
        <span class="check-label">Uppercase A–Z</span>
      </label>
      <label class="check-item">
        <input type="checkbox" id="useLower" checked>
        <span class="check-box">✓</span>
        <span class="check-label">Lowercase a–z</span>
      </label>
      <label class="check-item">
        <input type="checkbox" id="useNumbers" checked>
        <span class="check-box">✓</span>
        <span class="check-label">Numbers 0–9</span>
      </label>
      <label class="check-item">
        <input type="checkbox" id="useSymbols" checked>
        <span class="check-box">✓</span>
        <span class="check-label">Symbols !@#…</span>
      </label>
      <label class="check-item">
        <input type="checkbox" id="useSpaces">
        <span class="check-box">✓</span>
        <span class="check-label">Spaces</span>
      </label>
      <label class="check-item">
        <input type="checkbox" id="useBrackets">
        <span class="check-box">✓</span>
        <span class="check-label">Brackets ()[]</span>
      </label>
    </div>

    <div class="field">
      <label>Exclude characters</label>
      <input type="text" id="excludeChars" placeholder="e.g. 0Ol1I (ambiguous chars)…" />
    </div>

    <div class="field">
      <label>Must include (ensure at least one of each)</label>
      <input type="text" id="mustInclude" placeholder="e.g. @1A (at least one each)…" />
    </div>

  </div>

  <!-- Buttons -->
  <button class="btn btn-primary" id="generateBtn">⚡ Generate Password</button>
  <div class="btn-row">
    <button class="btn btn-secondary" id="copyBtn">⧉ Copy</button>
    <button class="btn btn-secondary" id="regenerateBtn">↺ Regenerate</button>
  </div>
  <div class="copy-feedback-main" id="copyFeedback"></div>

  <!-- Batch -->
  <div class="batch-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <div class="section-head" style="margin:0;border:none;padding:0;">Batch Generation</div>
    </div>
    <div class="srow" style="margin-top:14px;">
      <label>Count</label>
      <button class="step-btn" data-target="batchCount" data-dir="-1">−</button>
      <input type="range" id="batchCount" min="1" max="20" step="1" value="5" />
      <button class="step-btn" data-target="batchCount" data-dir="1">+</button>
      <span class="sval" id="batchCountVal">5</span>
    </div>
    <button class="btn btn-secondary" id="batchBtn" style="margin-top:4px;margin-bottom:0;">⊞ Generate Batch</button>
    <div class="batch-list" id="batchList"></div>
  </div>

</div>

<script>
  /* ── Theme ── */
  (function () {
    const KEY = 'mts-theme';
    const getTheme = () => localStorage.getItem(KEY) ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    const applyTheme = t => {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem(KEY, t);
      const i = document.querySelector('.theme-icon');
      if (i) i.textContent = t === 'dark' ? '○' : '☽';
    };
    applyTheme(getTheme());
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeToggle');
      if (btn) btn.addEventListener('click', () => {
        applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    });
  })();

  /* ── Slider sync ── */
  const lengthSlider = document.getElementById('lengthSlider');
  const lengthVal    = document.getElementById('lengthVal');
  const batchSlider  = document.getElementById('batchCount');
  const batchVal     = document.getElementById('batchCountVal');

  lengthSlider.addEventListener('input', () => { lengthVal.textContent = lengthSlider.value; });
  batchSlider.addEventListener('input', () => { batchVal.textContent = batchSlider.value; });

  /* ── Stepper buttons ── */
  document.querySelectorAll('.step-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const el  = document.getElementById(btn.dataset.target);
      const dir = parseInt(btn.dataset.dir, 10);
      const step = parseFloat(el.step) || 1;
      const val = Math.min(parseFloat(el.max), Math.max(parseFloat(el.min), parseFloat(el.value) + dir * step));
      el.value = val;
      el.dispatchEvent(new Event('input', { bubbles: true }));
    });
  });

  /* ── Presets ── */
  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const len = parseInt(btn.dataset.len, 10);
      lengthSlider.value = len;
      lengthVal.textContent = len;
    });
  });

  /* ── Password generation ── */
  const CHARS = {
    upper:    'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower:    'abcdefghijklmnopqrstuvwxyz',
    numbers:  '0123456789',
    symbols:  '!@#$%^&*_-+=.,?',
    spaces:   ' ',
    brackets: '()[]{}',
  };

  function buildCharset() {
    let charset = '';
    if (document.getElementById('useUpper').checked)    charset += CHARS.upper;
    if (document.getElementById('useLower').checked)    charset += CHARS.lower;
    if (document.getElementById('useNumbers').checked)  charset += CHARS.numbers;
    if (document.getElementById('useSymbols').checked)  charset += CHARS.symbols;
    if (document.getElementById('useSpaces').checked)   charset += CHARS.spaces;
    if (document.getElementById('useBrackets').checked) charset += CHARS.brackets;

    const exclude = document.getElementById('excludeChars').value;
    if (exclude) charset = charset.split('').filter(c => !exclude.includes(c)).join('');

    return [...new Set(charset.split(''))].join('');
  }

  function secureRandom(max) {
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] % max;
  }

  function generatePassword(len, charset) {
    if (!charset) return '';
    const must = document.getElementById('mustInclude').value.split('').filter(c => charset.includes(c));
    let pw = must.map(c => c); // ensure must-include chars
    while (pw.length < len) {
      pw.push(charset[secureRandom(charset.length)]);
    }
    // Shuffle securely
    for (let i = pw.length - 1; i > 0; i--) {
      const j = secureRandom(i + 1);
      [pw[i], pw[j]] = [pw[j], pw[i]];
    }
    return pw.slice(0, len).join('');
  }

  /* ── Strength calc ── */
  function calcStrength(pw, charset) {
    if (!pw) return { score: 0, label: '—', entropy: 0, color: 'var(--text3)' };
    const entropy = Math.log2(Math.pow(charset.length, pw.length));
    let score, label, color;
    if (entropy < 28)       { score = 10;  label = 'Weak';   color = 'var(--str-weak)'; }
    else if (entropy < 50)  { score = 35;  label = 'Fair';   color = 'var(--str-fair)'; }
    else if (entropy < 72)  { score = 65;  label = 'Good';   color = 'var(--str-good)'; }
    else if (entropy < 96)  { score = 82;  label = 'Strong'; color = 'var(--str-strong)'; }
    else                    { score = 100; label = 'Very Strong'; color = 'var(--str-strong)'; }
    return { score, label, entropy: Math.round(entropy), color };
  }

  /* ── Render ── */
  let lastPw = '';
  let lastCharset = '';

  function generate() {
    const len = parseInt(lengthSlider.value, 10);
    const charset = buildCharset();
    if (!charset) {
      document.getElementById('pwOutput').textContent = '⚠ Select at least one character set';
      document.getElementById('pwOutput').classList.add('placeholder');
      return;
    }
    const pw = generatePassword(len, charset);
    lastPw = pw;
    lastCharset = charset;

    const el = document.getElementById('pwOutput');
    el.textContent = pw;
    el.classList.remove('placeholder');

    const str = calcStrength(pw, charset);
    document.getElementById('strengthBar').style.width = str.score + '%';
    document.getElementById('strengthBar').style.background = str.color;
    document.getElementById('strengthLabel').textContent = str.label;
    document.getElementById('strengthLabel').style.color = str.color;
    document.getElementById('entropyLabel').textContent = str.entropy + ' bits entropy';
  }

  document.getElementById('generateBtn').addEventListener('click', generate);
  document.getElementById('regenerateBtn').addEventListener('click', generate);

  /* ── Copy ── */
  function showCopyFeedback(msg = '✓ Copied to clipboard!') {
    const fb = document.getElementById('copyFeedback');
    fb.textContent = msg;
    setTimeout(() => { fb.textContent = ''; }, 2000);
  }

  document.getElementById('copyBtn').addEventListener('click', () => {
    if (!lastPw) return;
    navigator.clipboard.writeText(lastPw).then(() => showCopyFeedback());
  });

  /* ── Batch ── */
  document.getElementById('batchBtn').addEventListener('click', () => {
    const count = parseInt(batchSlider.value, 10);
    const len = parseInt(lengthSlider.value, 10);
    const charset = buildCharset();
    if (!charset) return;

    const list = document.getElementById('batchList');
    list.innerHTML = '';
    for (let i = 0; i < count; i++) {
      const pw = generatePassword(len, charset);
      const item = document.createElement('div');
      item.className = 'batch-item';
      item.innerHTML = `<span class="bi-num">${i + 1}</span><span class="bi-pw">${pw}</span><span class="bi-copy">⧉</span>`;
      item.addEventListener('click', () => {
        navigator.clipboard.writeText(pw).then(() => {
          item.classList.add('copied');
          item.querySelector('.bi-copy').textContent = '✓';
          setTimeout(() => {
            item.classList.remove('copied');
            item.querySelector('.bi-copy').textContent = '⧉';
          }, 1800);
        });
      });
      list.appendChild(item);
    }
  });

  /* ── Auto-regen on option change ── */
  document.querySelectorAll('input[type=checkbox], #excludeChars, #mustInclude').forEach(el => {
    el.addEventListener('change', () => { if (lastPw) generate(); });
    el.addEventListener('input',  () => { if (lastPw) generate(); });
  });
  lengthSlider.addEventListener('input', () => { if (lastPw) generate(); });
</script>
</body>
</html>
