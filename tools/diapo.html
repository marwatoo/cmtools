<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diapo Overlay — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  (function() {
    var STORAGE_KEY = "mts-theme";
    var theme = localStorage.getItem(STORAGE_KEY);
    if (!theme) {
      theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    .file-list { list-style:none; margin:12px 0 20px; }
    .file-list li {
      display:flex; align-items:center; justify-content:space-between;
      font-size:0.82rem; color:var(--text2); padding:8px 12px;
      background:var(--card-bg); border:1px solid var(--border);
      border-radius:var(--radius-xs); margin-bottom:6px;
    }
    .file-list li.done { color:var(--accent); border-color:var(--accent); }
    .file-list li.processing { color:var(--accent2); }
    .progress-bar {
      height:3px; background:var(--border); border-radius:10px; margin:12px 0 20px; overflow:hidden;
    }
    .progress-fill {
      height:100%; background:var(--accent); transition:width 0.3s; width:0%;
    }
    canvas { display:none; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .tool-header, .file-list, .progress-bar, .mode-tabs, .btn {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header { animation-delay: 0.05s; }
    .file-list { animation-delay: 0.1s; }
    .progress-bar { animation-delay: 0.15s; }
    .mode-tabs { animation-delay: 0.2s; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Diapo Overlay</span>

    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">○</span></button>
  </nav>

  <div class="tool-page">
    <div class="tool-header">
      <h1>Diapo Overlay</h1>
      <p>Batch-process images to 1080×1350 portrait format with logo overlay. Auto-downloads each file.</p>
    </div>

    <label class="upload-zone" id="uploadZone" for="uploadInput">
      <div class="upload-icon">◧</div>
      <div class="upload-text">Choose one or more images<br><span style="font-size:0.8rem;color:var(--text3);">Multiple selection supported</span></div>
      <input type="file" id="uploadInput" accept="image/*" multiple />
    </label>

    <ul class="file-list" id="fileList"></ul>
    <div class="progress-bar" id="progressBar" style="display:none;">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <button class="btn btn-primary" id="processBtn" disabled>◧ Generate & Download Images</button>
    <div id="doneMsg" style="display:none;margin-top:12px;text-align:center;font-size:0.9rem;color:var(--accent);">
      ✓ Done! All images downloaded.
    </div>

    <canvas id="canvas" width="1080" height="1350"></canvas>
  </div>

  <script>
    const uploadInput = document.getElementById('uploadInput');
    const uploadZone  = document.getElementById('uploadZone');
    const processBtn  = document.getElementById('processBtn');
    const fileListEl  = document.getElementById('fileList');
    const progressBar = document.getElementById('progressBar');
    const progressFill= document.getElementById('progressFill');
    const doneMsg     = document.getElementById('doneMsg');
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');

    const W = 1080, H = 1350;
    let files = [];

    const logoImg = new Image();
    logoImg.src = '../assets/diapo/logo.png';

    uploadInput.addEventListener('change', () => {
      files = [...uploadInput.files];
      renderFileList();
    });

    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault(); uploadZone.classList.remove('dragover');
      files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/'));
      renderFileList();
    });

    function renderFileList() {
      fileListEl.innerHTML = '';
      doneMsg.style.display = 'none';
      if (!files.length) { processBtn.disabled = true; return; }
      files.forEach(f => {
        const li = document.createElement('li');
        li.id = 'file-' + f.name.replace(/\W/g,'_');
        li.innerHTML = `<span>📄 ${f.name}</span><span>${(f.size/1024).toFixed(0)} KB</span>`;
        fileListEl.appendChild(li);
      });
      processBtn.disabled = false;
      uploadZone.classList.add('has-file');
    }

    function loadImg(src) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = src;
      });
    }

    async function processFile(file, index) {
      const liId = 'file-' + file.name.replace(/\W/g,'_');
      const li = document.getElementById(liId);
      if (li) { li.classList.add('processing'); li.querySelector('span').textContent = '⏳ ' + file.name; }

      const img = await loadImg(URL.createObjectURL(file));

      ctx.clearRect(0, 0, W, H);
      const scale = Math.max(W / img.width, H / img.height);
      const iw = img.width * scale, ih = img.height * scale;
      ctx.drawImage(img, (W - iw) / 2, (H - ih) / 2, iw, ih);

      if (logoImg.complete && logoImg.naturalWidth) {
        ctx.drawImage(logoImg, 0, 0, W, H);
      } else {
        await new Promise(r => { logoImg.onload = r; });
        ctx.drawImage(logoImg, 0, 0, W, H);
      }

      const now = new Date();
      const ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') +
                 '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') +
                 String(now.getSeconds()).padStart(2,'0') + '_' + index;

      await new Promise(resolve => {
        canvas.toBlob(blob => {
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `diapo_${ts}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          resolve();
        }, 'image/png');
      });

      if (li) { li.classList.remove('processing'); li.classList.add('done'); li.querySelector('span').textContent = '✓ ' + file.name; }
    }

    processBtn.addEventListener('click', async () => {
      if (!files.length) return;
      processBtn.disabled = true;
      processBtn.textContent = 'Processing…';
      doneMsg.style.display = 'none';
      progressBar.style.display = 'block';

      for (let i = 0; i < files.length; i++) {
        try {
          await processFile(files[i], i);
        } catch(e) {
          console.warn('Error processing', files[i].name, e);
        }
        progressFill.style.width = ((i + 1) / files.length * 100) + '%';
        if (i < files.length - 1) await new Promise(r => setTimeout(r, 400));
      }

      processBtn.disabled = false;
      processBtn.textContent = '◧ Generate & Download Images';
      doneMsg.style.display = 'block';
    });
  </script>
</body>
</html>
