<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Deck — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --text:#e8e8f0; --text2:#8888a8; --text3:#555570;
      --accent:#e8ff47; --accent2:#7c6bff; --accent3:#ff6b6b;
      --card-bg:#13131c; --card-hover:#1e1e2e;
      --btn-bg:#e8ff47; --btn-text:#0a0a0f;
      --shadow:0 4px 32px rgba(0,0,0,0.5);
      --radius:16px; --radius-sm:10px; --radius-xs:6px;
    }
    [data-theme="light"] {
      --bg:#f4f4f0; --bg2:#ffffff; --bg3:#ebebeb;
      --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.13);
      --text:#111118; --text2:#555570; --text3:#aaaacc;
      --accent:#3a2fff; --accent2:#7c6bff; --accent3:#ff4444;
      --card-bg:#ffffff; --card-hover:#f0f0ff;
      --btn-bg:#111118; --btn-text:#ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Nav ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--text2); text-decoration: none;
      font-size: 0.85rem; font-weight: 500;
      padding: 6px 12px; border: 1px solid var(--border2);
      border-radius: var(--radius-xs); transition: all 0.2s;
    }
    .nav-back:hover { color: var(--text); border-color: var(--accent); }
    .nav-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1rem; flex: 1;
    }
    .nav-x-icon { color: var(--text2); font-size: 1rem; }
    .theme-toggle {
      width: 38px; height: 38px;
      border: 1px solid var(--border2); border-radius: 50%;
      background: transparent; color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Deck layout ── */
    .deck-container {
      display: flex; overflow-x: auto;
      height: calc(100vh - 57px);
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .deck-column {
      flex: 0 0 320px; display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg2); overflow: hidden;
    }
    .deck-col-header {
      position: sticky; top: 0;
      padding: 14px 16px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      z-index: 2; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }
    .deck-col-header h2 {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.95rem; color: var(--accent);
    }
    .deck-col-header .handle {
      font-size: 0.72rem; color: var(--text3); margin-top: 2px;
    }
    .deck-col-badge {
      font-size: 0.7rem; padding: 2px 8px;
      background: var(--bg3); border-radius: 100px; color: var(--text2);
      display: flex; align-items: center; gap: 4px;
    }
    .deck-pulse {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .deck-col-feed {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .deck-loading {
      padding: 24px 16px; text-align: center;
      font-size: 0.8rem; color: var(--text3);
    }

    /* ── Tweet card ── */
    .tweet-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 14px;
      margin-bottom: 10px; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .tweet-card:hover { background: var(--card-hover); border-color: var(--border2); }

    .tweet-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px;
    }
    .tweet-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg3); flex-shrink: 0;
      object-fit: cover; border: 1px solid var(--border2);
    }
    .tweet-handle {
      font-size: 0.78rem; color: var(--text3);
    }
    .tweet-date {
      font-size: 0.7rem; color: var(--text3);
      margin-left: auto; white-space: nowrap;
    }

    .tweet-text {
      font-size: 0.88rem; color: var(--text);
      line-height: 1.5; margin-bottom: 10px;
      word-break: break-word;
    }
    .tweet-text a { color: var(--accent); text-decoration: none; }
    .tweet-text a:hover { text-decoration: underline; }

    /* Media */
    .tweet-media { margin-bottom: 10px; position: relative; }
    .tweet-img {
      width: 100%; border-radius: 8px;
      aspect-ratio: 16/9; object-fit: cover;
      background: var(--bg3); display: block;
    }
    .tweet-img-grid {
      display: grid; gap: 3px; margin-bottom: 10px;
      border-radius: 8px; overflow: hidden;
    }
    .tweet-img-grid.count-2 { grid-template-columns: 1fr 1fr; }
    .tweet-img-grid.count-3 { grid-template-columns: 1fr 1fr; }
    .tweet-img-grid.count-3 .grid-img:first-child { grid-row: span 2; }
    .tweet-img-grid.count-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
    .grid-img {
      width: 100%; aspect-ratio: 1/1; object-fit: cover;
      display: block; background: var(--bg3);
    }

    /* Video placeholder */
    .tweet-video-wrap {
      width: 100%; aspect-ratio: 16/9; border-radius: 8px;
      background: var(--bg3); display: flex; align-items: center;
      justify-content: center; margin-bottom: 10px;
      border: 1px solid var(--border2); position: relative;
      overflow: hidden;
    }
    .tweet-video-wrap video {
      width: 100%; height: 100%; object-fit: cover;
      border-radius: 8px;
    }
    .tweet-video-wrap .play-overlay {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35); border-radius: 8px;
      pointer-events: none;
    }
    .play-btn-icon {
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(0,0,0,0.6); display: flex;
      align-items: center; justify-content: center;
      font-size: 1.2rem; border: 2px solid rgba(255,255,255,0.5);
    }

    /* Tags row */
    .tweet-tags {
      display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .tweet-tag {
      font-size: 0.65rem; padding: 2px 7px;
      border-radius: 100px; font-weight: 600;
      letter-spacing: 0.03em; text-transform: uppercase;
      border: 1px solid; display: flex; align-items: center; gap: 3px;
    }
    .tag-video   { color: #ff6b6b; border-color: rgba(255,107,107,0.4); background: rgba(255,107,107,0.08); }
    .tag-image   { color: var(--accent2); border-color: rgba(124,107,255,0.4); background: rgba(124,107,255,0.08); }
    .tag-images  { color: var(--accent2); border-color: rgba(124,107,255,0.4); background: rgba(124,107,255,0.08); }
    .tag-link    { color: var(--accent); border-color: rgba(232,255,71,0.3); background: rgba(232,255,71,0.06); }
    .tag-retweet { color: var(--text2); border-color: var(--border2); background: var(--bg3); }
    .tag-thread  { color: #f0a500; border-color: rgba(240,165,0,0.4); background: rgba(240,165,0,0.08); }

    /* Linked card preview */
    .tweet-link-card {
      border: 1px solid var(--border2); border-radius: 8px;
      overflow: hidden; text-decoration: none; display: block;
      margin-bottom: 10px; transition: border-color 0.2s;
    }
    .tweet-link-card:hover { border-color: var(--accent); }
    .tweet-link-card-img { width: 100%; height: 100px; object-fit: cover; display: block; }
    .tweet-link-card-body { padding: 8px 10px; }
    .tweet-link-card-domain { font-size: 0.65rem; color: var(--text3); margin-bottom: 2px; }
    .tweet-link-card-title  { font-size: 0.8rem; color: var(--text); font-weight: 600; line-height: 1.3; }

    /* Action buttons */
    .tweet-btns {
      display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px;
    }
    .tweet-btn {
      font-size: 0.68rem; padding: 4px 9px;
      border: 1px solid var(--border2); border-radius: var(--radius-xs);
      background: var(--bg3); color: var(--text2); cursor: pointer;
      transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .tweet-btn:hover  { border-color: var(--accent); color: var(--accent); }
    .tweet-btn.copied { background: var(--accent); color: var(--btn-text); border-color: var(--accent); }
    .tweet-btn.open-x { color: var(--text3); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px; backdrop-filter: blur(5px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); max-width: 620px; width: 100%;
      max-height: 90vh; overflow-y: auto; padding: 24px;
      position: relative; scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text2); width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .modal-close:hover { color: var(--text); border-color: var(--accent); }
    .modal-tweet-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; padding-right: 40px;
    }
    .modal-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--bg3); object-fit: cover;
    }
    .modal-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
    .modal-handle { font-size: 0.8rem; color: var(--text3); }
    .modal-text {
      font-size: 0.95rem; line-height: 1.6;
      color: var(--text); margin-bottom: 14px; word-break: break-word;
    }
    .modal-text a { color: var(--accent); }
    .modal-media-grid {
      display: grid; gap: 4px; margin-bottom: 14px;
      border-radius: 10px; overflow: hidden;
    }
    .modal-media-grid.count-1 { grid-template-columns: 1fr; }
    .modal-media-grid.count-2 { grid-template-columns: 1fr 1fr; }
    .modal-media-grid.count-3 { grid-template-columns: 1fr 1fr; }
    .modal-media-grid.count-3 img:first-child { grid-row: span 2; }
    .modal-media-grid.count-4 { grid-template-columns: 1fr 1fr; }
    .modal-media-grid img { width: 100%; object-fit: cover; aspect-ratio: 1; display: block; }
    .modal-media-grid.count-1 img { aspect-ratio: 16/9; }
    .modal-footer {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; border-top: 1px solid var(--border);
      padding-top: 14px; margin-top: 4px;
    }
    .modal-date { font-size: 0.78rem; color: var(--text3); flex: 1; }
    .modal-open-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: var(--radius-xs);
      background: var(--btn-bg); color: var(--btn-text);
      font-size: 0.78rem; font-weight: 600; text-decoration: none;
      transition: opacity 0.2s;
    }
    .modal-open-btn:hover { opacity: 0.85; }
    .modal-copy-btn {
      padding: 7px 14px; border-radius: var(--radius-xs);
      border: 1px solid var(--border2); background: var(--bg3);
      color: var(--text2); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .modal-copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-copy-btn.copied { background: var(--accent); color: var(--btn-text); border-color: var(--accent); }
    .modal-video-wrap {
      width: 100%; aspect-ratio: 16/9; border-radius: 10px;
      background: var(--bg3); margin-bottom: 14px; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .modal-video-wrap video { width: 100%; height: 100%; object-fit: contain; }

    /* Scrollbar webkit */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    @media (max-width: 480px) {
      .deck-column { flex: 0 0 280px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">𝕏 Deck</span>
    <span class="nav-x-icon" style="font-size:0.75rem;color:var(--text3);">via nitter</span>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
    </div>
  </nav>

  <div class="deck-container" id="deckContainer"></div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

<script>
// ── Theme ─────────────────────────────────────────────────────────────────
(function(){
  const KEY = 'mts-theme';
  function getTheme(){
    return localStorage.getItem(KEY) ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  }
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem(KEY, t);
    const icon = document.querySelector('.theme-icon');
    if (icon) icon.textContent = t === 'dark' ? '☽' : '○';
  }
  applyTheme(getTheme());
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', () => {
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  });
})();

// ── Config ─────────────────────────────────────────────────────────────────
const COLUMNS = [
  { key: 'le360fr',      handle: '@le360fr',      label: 'Le360 FR',    nitter: 'le360fr' },
  { key: 'le360ar',      handle: '@le360ar',      label: 'Le360 AR',    nitter: 'le360ar' },
  { key: 'le360sport',   handle: '@le360sport',   label: 'Sport',       nitter: 'le360sport' },
  { key: 'le360es',      handle: '@le360es',      label: 'Espagnol',    nitter: 'le360es' },
  { key: 'le360_afrique',handle: '@le360_afrique',label: 'Afrique',     nitter: 'le360_afrique' },
];

const seen = {};   // key → Set of tweet IDs

// ── Fetch attempt matrix ───────────────────────────────────────────────────
// xcancel.com is the most reliable Nitter instance in 2026.
// We race multiple proxy+instance combos; first valid RSS wins.
// Staggered by 250ms each so we don't hammer any single proxy.
const ATTEMPTS = [
  h => `https://corsproxy.io/?${encodeURIComponent(`https://xcancel.com/${h}/rss`)}`,
  h => `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://xcancel.com/${h}/rss`)}`,
  h => `https://corsproxy.io/?${encodeURIComponent(`https://nitter.poast.org/${h}/rss`)}`,
  h => `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://nitter.poast.org/${h}/rss`)}`,
  h => `https://corsproxy.io/?${encodeURIComponent(`https://nitter.privacydev.net/${h}/rss`)}`,
  h => `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://nitter.privacydev.net/${h}/rss`)}`,
];

async function tryFetch(url, timeoutMs = 8000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const res = await fetch(url, { signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    if (!res.ok) return null;
    const text = await res.text();
    if (!text.includes('<item')) return null;
    const start = text.search(/<\?xml|<rss/i);
    return start !== -1 ? text.slice(start) : null;
  } catch(e) {
    clearTimeout(timer);
    return null;
  }
}

// Race all attempts with staggered starts — first valid XML wins
async function fetchFeed(nitterHandle) {
  return new Promise((resolve, reject) => {
    let done = false;
    let failed = 0;

    ATTEMPTS.forEach((makeFn, i) => {
      setTimeout(async () => {
        if (done) return;
        const xml = await tryFetch(makeFn(nitterHandle));
        if (done) return;
        if (xml) {
          done = true;
          resolve(xml);
        } else {
          failed++;
          if (failed === ATTEMPTS.length) reject(new Error('All attempts failed for @' + nitterHandle));
        }
      }, i * 250);
    });
  });
}

// ── Parse nitter RSS ───────────────────────────────────────────────────────
function parseNitterRSS(xmlText, nitterHandle) {
  const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
  const channelTitle = doc.querySelector('channel > title')?.textContent?.trim() || nitterHandle;
  const items = [...doc.querySelectorAll('item')];

  return items.slice(0, 20).map(item => {
    const title   = item.querySelector('title')?.textContent?.trim() || '';
    const link    = item.querySelector('link')?.textContent?.trim() || '';
    const pubDate = item.querySelector('pubDate')?.textContent?.trim() || '';
    const creator = item.querySelector('creator')?.textContent?.trim() ||
                    doc.querySelector('channel > title')?.textContent?.trim() || nitterHandle;

    // Nitter puts HTML content in <description>
    const descRaw = item.querySelector('description')?.textContent || '';
    const parsed  = parseDescription(descRaw, link);

    // Build tweet ID from link
    const idMatch = link.match(/\/status\/(\d+)/);
    const tweetId = idMatch ? idMatch[1] : link;

    // Convert nitter link → x.com link
    const xLink = link.replace(/https?:\/\/[^/]+/, 'https://x.com');

    return {
      id: tweetId,
      title,
      link: xLink,
      nitterLink: link,
      pubDate,
      creator: creator.replace(/^\//, ''),
      channelTitle,
      nitterHandle,
      text:        parsed.text,
      images:      parsed.images,
      videoUrl:    parsed.videoUrl,
      hasVideo:    parsed.hasVideo,
      externalLink:parsed.externalLink,
      isRetweet:   title.startsWith('RT by '),
    };
  });
}

// ── Parse <description> HTML from Nitter ──────────────────────────────────
// Nitter description contains an HTML fragment with the tweet text + media
function parseDescription(html, itemLink) {
  const div = document.createElement('div');
  div.innerHTML = html;

  // Images: Nitter wraps them in <a><img ...></a>
  const imgEls = [...div.querySelectorAll('img')];
  const images = imgEls
    .map(img => {
      let src = img.src || img.getAttribute('src') || '';
      // Nitter serves images as /pic/... — convert to real URL
      if (src.startsWith('/pic/')) {
        // Extract original URL from path like /pic/media%2F...
        try {
          const inner = decodeURIComponent(src.replace('/pic/', ''));
          if (inner.startsWith('http')) return inner;
          return `https://pbs.twimg.com/${inner}`;
        } catch(e) { return ''; }
      }
      if (src.includes('nitter') && src.includes('/pic/')) {
        try {
          const after = src.split('/pic/')[1];
          const inner = decodeURIComponent(after);
          if (inner.startsWith('http')) return inner;
          return `https://pbs.twimg.com/${inner}`;
        } catch(e) { return ''; }
      }
      return src;
    })
    .filter(src => src && !src.includes('emoji') && !src.includes('data:'));

  // Video: look for <video> tag in description
  const videoEl = div.querySelector('video');
  let videoUrl = '';
  let hasVideo = false;
  if (videoEl) {
    hasVideo = true;
    videoUrl = videoEl.querySelector('source')?.src ||
               videoEl.src ||
               videoEl.getAttribute('data-src') || '';
  }
  // Nitter sometimes puts a gif/video as img with .mp4 extension
  if (!hasVideo) {
    const mp4img = imgEls.find(img => (img.src||'').endsWith('.mp4'));
    if (mp4img) { hasVideo = true; videoUrl = mp4img.src; }
  }

  // External link card: last <a> that looks like an outside URL
  let externalLink = null;
  const anchors = [...div.querySelectorAll('a')];
  for (const a of anchors.reverse()) {
    const href = a.href || '';
    if (href && !href.includes('nitter') && !href.includes('twitter.com')
        && !href.includes('x.com') && href.startsWith('http')
        && !href.endsWith('.jpg') && !href.endsWith('.png') && !href.endsWith('.mp4')) {
      externalLink = { url: href, text: a.textContent.trim() };
      break;
    }
  }

  // Clean text: remove images and known nitter UI elements
  imgEls.forEach(img => img.closest('a')?.remove() || img.remove());
  videoEl?.remove();
  // Remove pic.twitter.com links
  anchors.forEach(a => {
    if ((a.href||'').includes('nitter') || (a.textContent||'').includes('pic.twitter'))
      a.remove();
  });

  const text = div.textContent?.trim().replace(/\s+/g, ' ') || '';

  return { text, images, videoUrl, hasVideo, externalLink };
}

function formatDate(ds) {
  if (!ds) return '';
  try {
    const d = new Date(ds);
    return d.toLocaleString('fr-FR', { hour12: false, day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return ds; }
}

// ── Copy helper ────────────────────────────────────────────────────────────
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
  });
}

// ── Detect media tags ──────────────────────────────────────────────────────
function getMediaTags(tweet) {
  const tags = [];
  if (tweet.isRetweet) tags.push({ cls: 'tag-retweet', icon: '🔁', label: 'RT' });
  if (tweet.hasVideo)  tags.push({ cls: 'tag-video',   icon: '▶',  label: 'Video' });
  else if (tweet.images.length > 1) tags.push({ cls: 'tag-images', icon: '⊞', label: `${tweet.images.length} Photos` });
  else if (tweet.images.length === 1) tags.push({ cls: 'tag-image', icon: '📷', label: 'Photo' });
  if (tweet.externalLink) tags.push({ cls: 'tag-link', icon: '↗', label: 'Link' });
  return tags;
}

// ── Build card ─────────────────────────────────────────────────────────────
function createTweetCard(tweet) {
  const card = document.createElement('div');
  card.className = 'tweet-card';

  // Header: avatar + handle + date
  const header = document.createElement('div');
  header.className = 'tweet-header';

  const avatar = document.createElement('div');
  avatar.style.cssText = 'width:36px;height:36px;border-radius:50%;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1rem;border:1px solid var(--border2);color:var(--text3);';
  avatar.textContent = '𝕏';
  header.appendChild(avatar);

  const info = document.createElement('div');
  info.style.cssText = 'display:flex;flex-direction:column;min-width:0;flex:1;';
  const handleEl = document.createElement('div');
  handleEl.className = 'tweet-handle';
  handleEl.textContent = `@${tweet.nitterHandle}`;
  info.appendChild(handleEl);
  header.appendChild(info);

  const dateEl = document.createElement('div');
  dateEl.className = 'tweet-date';
  dateEl.textContent = formatDate(tweet.pubDate);
  header.appendChild(dateEl);

  card.appendChild(header);

  // Media tags
  const mediaTags = getMediaTags(tweet);
  if (mediaTags.length) {
    const tagsRow = document.createElement('div');
    tagsRow.className = 'tweet-tags';
    mediaTags.forEach(t => {
      const span = document.createElement('span');
      span.className = `tweet-tag ${t.cls}`;
      span.textContent = `${t.icon} ${t.label}`;
      tagsRow.appendChild(span);
    });
    card.appendChild(tagsRow);
  }

  // Tweet text (truncated on card)
  if (tweet.text) {
    const p = document.createElement('div');
    p.className = 'tweet-text';
    const display = tweet.text.length > 220 ? tweet.text.slice(0, 220) + '…' : tweet.text;
    p.textContent = display;
    card.appendChild(p);
  }

  // Media preview
  if (tweet.hasVideo) {
    const vw = document.createElement('div');
    vw.className = 'tweet-video-wrap';
    if (tweet.videoUrl && !tweet.videoUrl.endsWith('.m3u8')) {
      const video = document.createElement('video');
      video.src = tweet.videoUrl;
      video.preload = 'metadata';
      video.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:8px;';
      vw.appendChild(video);
    }
    const overlay = document.createElement('div');
    overlay.className = 'play-overlay';
    const playIcon = document.createElement('div');
    playIcon.className = 'play-btn-icon';
    playIcon.textContent = '▶';
    overlay.appendChild(playIcon);
    vw.appendChild(overlay);
    card.appendChild(vw);
  } else if (tweet.images.length > 0) {
    if (tweet.images.length === 1) {
      const img = document.createElement('img');
      img.className = 'tweet-img';
      img.src = tweet.images[0];
      img.loading = 'lazy';
      img.alt = '';
      img.onerror = function(){ this.style.display='none'; };
      card.appendChild(img);
    } else {
      const grid = document.createElement('div');
      const cnt = Math.min(tweet.images.length, 4);
      grid.className = `tweet-img-grid count-${cnt}`;
      tweet.images.slice(0, 4).forEach(src => {
        const img = document.createElement('img');
        img.className = 'grid-img';
        img.src = src; img.loading = 'lazy'; img.alt = '';
        img.onerror = function(){ this.parentNode.removeChild(this); };
        grid.appendChild(img);
      });
      card.appendChild(grid);
    }
  }

  // External link card preview
  if (tweet.externalLink) {
    const lc = document.createElement('a');
    lc.className = 'tweet-link-card';
    lc.href = tweet.externalLink.url;
    lc.target = '_blank'; lc.rel = 'noopener';
    lc.addEventListener('click', e => e.stopPropagation());
    const body = document.createElement('div');
    body.className = 'tweet-link-card-body';
    const domain = document.createElement('div');
    domain.className = 'tweet-link-card-domain';
    try { domain.textContent = new URL(tweet.externalLink.url).hostname; } catch(e) { domain.textContent = ''; }
    const title = document.createElement('div');
    title.className = 'tweet-link-card-title';
    title.textContent = tweet.externalLink.text || tweet.externalLink.url;
    body.appendChild(domain); body.appendChild(title);
    lc.appendChild(body);
    card.appendChild(lc);
  }

  // Buttons
  const btns = document.createElement('div');
  btns.className = 'tweet-btns';

  const copyLinkBtn = document.createElement('button');
  copyLinkBtn.className = 'tweet-btn';
  copyLinkBtn.textContent = 'Copy Link';
  copyLinkBtn.addEventListener('click', e => { e.stopPropagation(); copyText(tweet.link, copyLinkBtn); });
  btns.appendChild(copyLinkBtn);

  const copyTextBtn = document.createElement('button');
  copyTextBtn.className = 'tweet-btn';
  copyTextBtn.textContent = 'Copy Text';
  copyTextBtn.addEventListener('click', e => { e.stopPropagation(); copyText(tweet.text, copyTextBtn); });
  btns.appendChild(copyTextBtn);

  const copyBothBtn = document.createElement('button');
  copyBothBtn.className = 'tweet-btn';
  copyBothBtn.textContent = 'Copy Both';
  copyBothBtn.addEventListener('click', e => { e.stopPropagation(); copyText(`${tweet.text}\n${tweet.link}`, copyBothBtn); });
  btns.appendChild(copyBothBtn);

  const openBtn = document.createElement('a');
  openBtn.className = 'tweet-btn open-x';
  openBtn.textContent = '↗ Open';
  openBtn.href = tweet.link;
  openBtn.target = '_blank'; openBtn.rel = 'noopener';
  openBtn.addEventListener('click', e => e.stopPropagation());
  btns.appendChild(openBtn);

  card.appendChild(btns);

  // Click → modal
  card.addEventListener('click', () => openModal(tweet));

  return card;
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(tweet) {
  const overlay = document.getElementById('modalOverlay');
  const body    = document.getElementById('modalBody');
  body.innerHTML = '';

  // Header
  const header = document.createElement('div');
  header.className = 'modal-tweet-header';

  const avatar = document.createElement('div');
  avatar.style.cssText = 'width:44px;height:44px;border-radius:50%;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border:1px solid var(--border2);color:var(--text3);';
  avatar.textContent = '𝕏';
  header.appendChild(avatar);

  const info = document.createElement('div');
  const name = document.createElement('div');
  name.className = 'modal-name';
  name.textContent = tweet.creator || tweet.nitterHandle;
  const handle = document.createElement('div');
  handle.className = 'modal-handle';
  handle.textContent = `@${tweet.nitterHandle}`;
  info.appendChild(name); info.appendChild(handle);
  header.appendChild(info);
  body.appendChild(header);

  // Tags
  const mediaTags = getMediaTags(tweet);
  if (mediaTags.length) {
    const tagsRow = document.createElement('div');
    tagsRow.className = 'tweet-tags';
    tagsRow.style.marginBottom = '12px';
    mediaTags.forEach(t => {
      const span = document.createElement('span');
      span.className = `tweet-tag ${t.cls}`;
      span.textContent = `${t.icon} ${t.label}`;
      tagsRow.appendChild(span);
    });
    body.appendChild(tagsRow);
  }

  // Full text
  if (tweet.text) {
    const p = document.createElement('div');
    p.className = 'modal-text';
    // Linkify URLs
    p.innerHTML = tweet.text.replace(
      /(https?:\/\/[^\s<>"']+)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>'
    );
    body.appendChild(p);
  }

  // Video
  if (tweet.hasVideo) {
    const vw = document.createElement('div');
    vw.className = 'modal-video-wrap';
    if (tweet.videoUrl && !tweet.videoUrl.includes('.m3u8')) {
      const video = document.createElement('video');
      video.src = tweet.videoUrl;
      video.controls = true;
      video.style.cssText = 'width:100%;height:100%;object-fit:contain;';
      vw.appendChild(video);
      const note = document.createElement('div');
      note.style.cssText = 'font-size:0.72rem;color:var(--text3);margin-bottom:14px;';
      note.textContent = 'Video may not load due to cross-origin restrictions. Open on X for full playback.';
      body.appendChild(vw);
      body.appendChild(note);
    } else {
      // HLS or no URL
      vw.style.cssText += 'flex-direction:column;gap:8px;';
      const icon = document.createElement('div');
      icon.style.cssText = 'font-size:2rem;color:var(--text3);';
      icon.textContent = '▶';
      const note = document.createElement('div');
      note.style.cssText = 'font-size:0.8rem;color:var(--text3);text-align:center;max-width:200px;';
      note.textContent = 'Video playback requires opening on X.com';
      vw.appendChild(icon); vw.appendChild(note);
      body.appendChild(vw);
    }
  }

  // Images grid
  if (!tweet.hasVideo && tweet.images.length > 0) {
    const grid = document.createElement('div');
    const cnt = Math.min(tweet.images.length, 4);
    grid.className = `modal-media-grid count-${cnt}`;
    tweet.images.slice(0, 4).forEach(src => {
      const img = document.createElement('img');
      img.src = src; img.alt = '';
      img.onerror = function(){ this.style.display='none'; };
      grid.appendChild(img);
    });
    body.appendChild(grid);
  }

  // External link
  if (tweet.externalLink) {
    const lc = document.createElement('a');
    lc.className = 'tweet-link-card';
    lc.href = tweet.externalLink.url;
    lc.target = '_blank'; lc.rel = 'noopener';
    lc.style.marginBottom = '14px';
    const lbody = document.createElement('div');
    lbody.className = 'tweet-link-card-body';
    const dom = document.createElement('div');
    dom.className = 'tweet-link-card-domain';
    try { dom.textContent = new URL(tweet.externalLink.url).hostname; } catch(e){}
    const ltitle = document.createElement('div');
    ltitle.className = 'tweet-link-card-title';
    ltitle.textContent = tweet.externalLink.text || tweet.externalLink.url;
    lbody.appendChild(dom); lbody.appendChild(ltitle);
    lc.appendChild(lbody);
    body.appendChild(lc);
  }

  // Footer
  const footer = document.createElement('div');
  footer.className = 'modal-footer';

  const date = document.createElement('div');
  date.className = 'modal-date';
  date.textContent = formatDate(tweet.pubDate);
  footer.appendChild(date);

  const copyBtn = document.createElement('button');
  copyBtn.className = 'modal-copy-btn';
  copyBtn.textContent = 'Copy Link';
  copyBtn.addEventListener('click', () => copyText(tweet.link, copyBtn));
  footer.appendChild(copyBtn);

  const copyTextBtnModal = document.createElement('button');
  copyTextBtnModal.className = 'modal-copy-btn';
  copyTextBtnModal.textContent = 'Copy Text';
  copyTextBtnModal.addEventListener('click', () => copyText(tweet.text, copyTextBtnModal));
  footer.appendChild(copyTextBtnModal);

  const openBtn = document.createElement('a');
  openBtn.className = 'modal-open-btn';
  openBtn.href = tweet.link;
  openBtn.target = '_blank'; openBtn.rel = 'noopener';
  openBtn.textContent = '↗ Open on 𝕏';
  footer.appendChild(openBtn);

  body.appendChild(footer);
  overlay.classList.remove('hidden');
}

document.getElementById('modalClose').addEventListener('click', () =>
  document.getElementById('modalOverlay').classList.add('hidden'));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.add('hidden');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.add('hidden');
});

// ── Build columns ──────────────────────────────────────────────────────────
const container = document.getElementById('deckContainer');

COLUMNS.forEach(col => {
  seen[col.key] = new Set();

  const colEl = document.createElement('div');
  colEl.className = 'deck-column';
  colEl.id = `col-${col.key}`;

  colEl.innerHTML = `
    <div class="deck-col-header">
      <div>
        <h2>${col.label}</h2>
        <div class="handle">${col.handle}</div>
      </div>
      <span class="deck-col-badge"><span class="deck-pulse"></span>live</span>
    </div>
    <div class="deck-col-feed" id="feed-${col.key}">
      <div class="deck-loading">Loading…</div>
    </div>`;

  container.appendChild(colEl);
});

// ── Update single column ───────────────────────────────────────────────────
async function updateColumn(col) {
  const feed = document.getElementById(`feed-${col.key}`);
  try {
    const xml    = await fetchFeed(col.nitter);
    const tweets = parseNitterRSS(xml, col.nitter);
    const fresh  = tweets.filter(t => !seen[col.key].has(t.id));
    if (!fresh.length) return;

    const loader = feed.querySelector('.deck-loading');
    if (loader) loader.remove();

    const frag = document.createDocumentFragment();
    fresh.forEach(t => {
      frag.appendChild(createTweetCard(t));
      seen[col.key].add(t.id);
    });
    feed.insertBefore(frag, feed.firstChild);
  } catch(e) {
    const loader = feed.querySelector('.deck-loading');
    if (loader) {
      loader.innerHTML = '';
      const msg = document.createElement('div');
      msg.textContent = '⚠ Failed to load';
      msg.style.cssText = 'margin-bottom:8px;font-size:0.8rem;color:var(--text3);';
      const btn = document.createElement('button');
      btn.textContent = '↺ Retry';
      btn.style.cssText = 'font-size:0.72rem;padding:5px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;';
      btn.onmouseenter = () => btn.style.borderColor = 'var(--accent)';
      btn.onmouseleave = () => btn.style.borderColor = 'var(--border2)';
      btn.onclick = () => { loader.textContent = 'Retrying…'; updateColumn(col); };
      loader.appendChild(msg);
      loader.appendChild(btn);
    }
    console.warn('Feed error', col.key, e);
  }
}

// ── Parallel update loop — each column races its own attempts independently
async function updateLoop() {
  await Promise.allSettled(COLUMNS.map(col => updateColumn(col)));
  setTimeout(updateLoop, 45000);
}

updateLoop();
</script>
