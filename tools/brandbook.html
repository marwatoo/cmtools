<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  (function() {
    var STORAGE_KEY = "mts-theme";
    var theme = localStorage.getItem(STORAGE_KEY);
    if (!theme) {
      theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
  <link rel="stylesheet" href="../assets/global.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script src="../assets/theme.js"></script>
  <style>
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .brandbook-layout, .brandbook-header, .brandbook-frame, .brandbook-info {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .brandbook-layout { animation-delay: 0.05s; }
    .brandbook-header { animation-delay: 0.1s; }
    .brandbook-frame { animation-delay: 0.15s; }
    .brandbook-info { animation-delay: 0.2s; }

    .brandbook-layout {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 16px;
    }
    .brandbook-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
    }
    .brandbook-title {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brandbook-title .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #ff7a14, #ff9a4a);
      border-radius: 6px;
    }
    .brandbook-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 8px 14px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: var(--radius-xs);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn.secondary:hover { border-color: var(--accent); }
    .brandbook-frame {
      width: 100%;
      height: calc(100vh - 280px);
      min-height: 500px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #1a1a24;
    }
    .brandbook-info {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
    }
    .brandbook-info h3 {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .color-swatch {
      aspect-ratio: 1;
      border-radius: var(--radius-xs);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 8px;
      font-size: 0.7rem;
    }
    .color-swatch span {
      background: rgba(0,0,0,0.6);
      padding: 2px 6px;
      border-radius: 4px;
      color: #fff;
    }
  </style>
</head>

  </nav>
  <div class="tool-page">

    </div>

      <div class="brandbook-header">
        <div class="brandbook-title">

          <a href="https://www.figma.com/proto/gEaGwQNnsp6icCVRIt5ljR/360-Brandbook?node-id=3-12963" class="btn" target="_blank" rel="noopener">Open in Figma ↗</a>
