<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snippets — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  (function() {
    var STORAGE_KEY = "mts-theme";
    var theme = localStorage.getItem(STORAGE_KEY);
    if (!theme) {
      theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
  <link rel="stylesheet" href="../assets/global.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script src="../assets/theme.js"></script>
  <style>
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .snippets-page { opacity: 0; transform: translateY(12px); animation: fadeUp 0.5s ease forwards; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Snippets & Copy Pad</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">○</span></button>
  </nav>

  <div class="snippets-page">
    <div class="tool-header">
      <h1>Snippets</h1>
      <p>Click any item to copy it to your clipboard instantly.</p>
    </div>

    <div class="snippets-grid" id="snippetsGrid"></div>
  </div>

  <script>
    const snippets = [
      { label: '#ff7a14',              text: '#ff7a14' },
      { label: 'Article en story ↑',   text: 'Article en story ↑' },
      { label: 'Article en commentaire ⭣', text: 'Article en commentaire ⭣' },
      { label: 'm³',                   text: 'm³' },
      { label: '« »',                  text: '« »' },
      { label: '[…]',                  text: '[…]' },
      { label: '|',                    text: '|' },
      { label: '→',                    text: '→' },
      { label: '⭣ المقال في التعليق', text: '⭣ المقال في التعليق' },
      { label: 'المزيد من التفاصيل ↑', text: 'المزيد من التفاصيل ↑' },
      { label: 'م³',                   text: 'م³' },
      { label: '—',                    text: '—' },
      { label: '-',                    text: '-' },
      { label: 'Chronique de ',        text: 'Chronique de ' },
      { label: 'FLASH — ',             text: 'FLASH — ' },
      { label: 'Artículo en comentarios ⭣', text: 'Artículo en comentarios ⭣' },
      { label: 'Artículo en story ↑',  text: 'Artículo en story ↑' },
      { label: 'Crónica de',           text: 'Crónica de' },
    ];

    const grid = document.getElementById('snippetsGrid');

    snippets.forEach(({ label, text }) => {
      const el = document.createElement('div');
      el.className = 'snippet-item';
      el.dir = /[\u0600-\u06FF]/.test(text) ? 'rtl' : 'ltr';
      el.innerHTML = `
        <span class="snippet-copied-label">Copied!</span>
        <span class="snippet-text">${label}</span>`;

      el.addEventListener('click', () => {
        navigator.clipboard.writeText(text).then(() => {
          el.classList.add('copied');
          setTimeout(() => el.classList.remove('copied'), 1000);
        });
      });

      grid.appendChild(el);
    });
  </script>
</body>
</html>
