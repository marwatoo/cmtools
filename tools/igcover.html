<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Sport Cover — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  (function() {
    var STORAGE_KEY = "mts-theme";
    var theme = localStorage.getItem(STORAGE_KEY);
    if (!theme) {
      theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
  <link rel="stylesheet" href="../assets/global.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script src="../assets/theme.js"></script>
  <style>
    .tool-header, .upload-zone, .field, .btn-row, .canvas-wrap {
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header { animation-delay: 0.05s; }
    .upload-zone { animation-delay: 0.1s; }
    .field { animation-delay: 0.15s; }
    .btn-row { animation-delay: 0.2s; }
    .canvas-wrap { animation-delay: 0.25s; }
    .canvas-wrap { position: relative; user-select: none; -webkit-user-select: none; }
    .canvas-wrap canvas { touch-action: none; }
    .drag-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text3);
      background: var(--bg2);
      padding: 4px 12px;
      border-radius: var(--radius-xs);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 2;
    }
    .canvas-wrap:hover .drag-hint { opacity: 1; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:var(--accent); border-radius:50%; cursor:pointer; border:2px solid var(--bg); box-shadow:0 1px 4px rgba(0,0,0,0.3); }
    input[type="range"]::-moz-range-thumb { width:18px; height:18px; background:var(--accent); border-radius:50%; cursor:pointer; border:2px solid var(--bg); box-shadow:0 1px 4px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

  <nav class="nav">
    <span class="nav-title">IG Sport Cover</span>
    <button class="theme-toggle" id="themeToggle" aria-label="Switch between dark and light theme"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
  </nav>

  <div class="tool-page">
    <div class="tool-header">
      <h1>IG Sport Cover</h1>
      <p>Create 1080×1920 Instagram Sport covers with branding overlay and Arabic text.</p>
    </div>

    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">⬆</div>
      <div class="upload-text" id="uploadText">Drag an image here or <span class="upload-browse">choose a file</span></div>
      <input type="file" id="upload" accept="image/*" />
    </div>

    <div class="field">
      <label>Arabic text (2 lines max)</label>
      <textarea id="arabicText" placeholder="Type Arabic text here…" rows="3" dir="rtl"></textarea>
    </div>

    <div id="dlWrap" style="margin-top:16px; overflow:hidden; max-height:0; opacity:0; transition:max-height .25s ease, opacity .25s ease;">
      <a class="btn btn-success" id="downloadLink" style="width:100%; justify-content:center; margin-bottom:0;">↓ Download Image</a>
    </div>

    <div class="canvas-wrap" style="aspect-ratio:9/16; margin-top:16px;">
      <canvas id="canvas" width="1080" height="1920" style="width:100%;height:auto;display:block;"></canvas>
      <div class="drag-hint" id="dragHint">Scroll/pinch to zoom · Drag to reposition</div>
    </div>

    <div class="field" style="margin-top:12px;">
      <label>Zoom</label>
      <div style="display:flex;align-items:center;gap:12px;">
        <input type="range" id="zoomSlider" min="10" max="300" value="100" style="flex:1;height:6px;-webkit-appearance:none;appearance:none;background:var(--border2);border-radius:10px;outline:none;">
        <span id="zoomValue" style="font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--accent);min-width:40px;text-align:right;">100%</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
      <div class="field">
        <label>Position X</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="range" id="posXSlider" min="-100" max="100" value="0" style="flex:1;height:6px;-webkit-appearance:none;appearance:none;background:var(--border2);border-radius:10px;outline:none;">
          <span id="posXValue" style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text2);min-width:30px;text-align:right;">0</span>
        </div>
      </div>
      <div class="field">
        <label>Position Y</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="range" id="posYSlider" min="-100" max="100" value="0" style="flex:1;height:6px;-webkit-appearance:none;appearance:none;background:var(--border2);border-radius:10px;outline:none;">
          <span id="posYValue" style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text2);min-width:30px;text-align:right;">0</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const upload         = document.getElementById('upload');
    const canvas         = document.getElementById('canvas');
    const ctx            = canvas.getContext('2d');
    const dlLink         = document.getElementById('downloadLink');
    const dlWrap         = document.getElementById('dlWrap');
    const arabicText     = document.getElementById('arabicText');
    const dropzone       = document.getElementById('dropzone');
    const uploadText     = document.getElementById('uploadText');

    const W = 1080, H = 1920;
    let currentFile = null;
    let loadedImg = null;
    let imgW = 0, imgH = 0;
    let imgOffsetX = 0, imgOffsetY = 0;
    let imgZoom = 1;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragOffsetStartX = 0, dragOffsetStartY = 0;
    let isPinching = false;
    let pinchStartDist = 0;
    let pinchStartZoom = 1;

    const brandingImg = new Image();
    brandingImg.src = '../assets/overlays/branding.png';

    async function loadFont() {
      try {
        const f = new FontFace('LamaSans', `url(../fonts/LamaSans-ExtraBold.ttf)`);
        await f.load();
        document.fonts.add(f);
      } catch(e) { console.warn('LamaSans not found, using fallback.'); }
    }
    const fontReady = loadFont();

    function loadImage(src) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = src;
      });
    }

    function enableFile(file) {
      currentFile = file;
      imgOffsetX = 0; imgOffsetY = 0;
      imgZoom = 1;
      loadedImg = null;
      dropzone.classList.add('has-file');
      uploadText.textContent = '✓ ' + file.name;
      document.getElementById('posXSlider').value = 0;
      document.getElementById('posXValue').textContent = '0';
      document.getElementById('posYSlider').value = 0;
      document.getElementById('posYValue').textContent = '0';
      previewFile(file);
    }

    function previewFile(file) {
      const img = new Image();
      img.onload = () => drawAll(img);
      img.src = URL.createObjectURL(file);
    }

    async function drawAll(img) {
      loadedImg = img;
      imgW = img.naturalWidth  || img.width;
      imgH = img.naturalHeight || img.height;
      // Fit image to cover the canvas (like CSS background-size: cover)
      const scaleW = W / imgW;
      const scaleH = H / imgH;
      imgZoom = Math.max(scaleW, scaleH);
      document.getElementById('zoomSlider').value = Math.round(imgZoom * 100);
      document.getElementById('zoomValue').textContent = Math.round(imgZoom * 100) + '%';
      imgOffsetX = 0; imgOffsetY = 0;
      renderFrame();
    }

    let _rafPending = false;
    let _commitTimer = null;
    let _brandingReady = false;
    let _fontReady = false;

    // Pre-resolve flags so drawFrame never awaits anything
    brandingImg.onload = () => { _brandingReady = true; };
    if (brandingImg.complete && brandingImg.naturalWidth) _brandingReady = true;
    fontReady.then(() => { _fontReady = true; });

    // Fast fully-synchronous draw — used every gesture frame
    function drawFrame() {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      if (loadedImg) {
        const baseW = imgW * imgZoom;
        const baseH = imgH * imgZoom;
        const cx = W / 2, cy = H / 2;
        const dx = cx - baseW / 2 + imgOffsetX;
        const dy = cy - baseH / 2 + imgOffsetY;
        ctx.drawImage(loadedImg, dx, dy, baseW, baseH);
      }
      if (_brandingReady) ctx.drawImage(brandingImg, 0, 0, W, H);
      if (_fontReady) drawArabicText();
    }

    // RAF-throttled call for gestures
    function scheduleRender() {
      if (_rafPending) return;
      _rafPending = true;
      requestAnimationFrame(() => { _rafPending = false; drawFrame(); });
    }

    // Full render — used on load / text change; defers expensive toDataURL until idle
    async function renderFrame() {
      if (!_brandingReady || !_fontReady) {
        await Promise.all([
          new Promise(r => { if (_brandingReady) r(); else brandingImg.onload = () => { _brandingReady = true; r(); }; }),
          fontReady.then(() => { _fontReady = true; })
        ]);
      }
      drawFrame();
      if (loadedImg) {
        dlWrap.style.maxHeight = '60px';
        dlWrap.style.opacity = '1';
        clearTimeout(_commitTimer);
        _commitTimer = setTimeout(() => {
          const now = new Date();
          const ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') +
                     '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
          dlLink.href = canvas.toDataURL('image/png');
          dlLink.download = `ig_cover_${ts}.png`;
        }, 400);
      }
    }

    function drawArabicText() {
      const text = arabicText.value.trim();
      if (!text) return;
      const marginX = 65, maxWidth = W - 2 * marginX;
      ctx.font = '900 48pt LamaSans, Arial';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.direction = 'rtl';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3; ctx.shadowBlur = 8;

      const words = text.split(' ');
      let line = '', lines = [];
      words.forEach(word => {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth) { if (line) lines.push(line); line = word; }
        else line = test;
      });
      if (line) lines.push(line);
      lines = lines.slice(0, 2);
      lines.forEach((l, i) => ctx.fillText(l, W / 2, 1480 + i * 110));
      ctx.shadowColor = 'transparent'; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0;
    }

    dropzone.addEventListener('click', () => upload.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) enableFile(e.dataTransfer.files[0]);
    });
    upload.addEventListener('change', () => { if (upload.files[0]) enableFile(upload.files[0]); });

    arabicText.addEventListener('input', () => { if (loadedImg) renderFrame(); });

    canvas.addEventListener('mousedown', onDragStart);
    canvas.addEventListener('mousemove', onDragMove);
    canvas.addEventListener('mouseup', onDragEnd);
    canvas.addEventListener('mouseleave', onDragEnd);
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onDragEnd);

    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
    }

    function onDragStart(e) {
      if (!loadedImg) return;
      isDragging = true;
      const coords = getCanvasCoords(e);
      dragStartX = coords.x;
      dragStartY = coords.y;
      dragOffsetStartX = imgOffsetX;
      dragOffsetStartY = imgOffsetY;
    }

    function onDragMove(e) {
      if (!isDragging || !loadedImg) return;
      const coords = getCanvasCoords(e);
      imgOffsetX = dragOffsetStartX + (coords.x - dragStartX);
      imgOffsetY = dragOffsetStartY + (coords.y - dragStartY);
      scheduleRender();
      syncSliders();
    }

    let pinchMidX = 0, pinchMidY = 0;
    let pinchOffsetStartX = 0, pinchOffsetStartY = 0;

    function getTouchMid(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      return { x: (mx - rect.left) * scaleX, y: (my - rect.top) * scaleY };
    }

    function onTouchStart(e) {
      if (!loadedImg) return;
      if (e.touches.length === 2) {
        e.preventDefault();
        isPinching = true;
        isDragging = false;
        pinchStartDist = getTouchDist(e);
        pinchStartZoom = imgZoom;
        const mid = getTouchMid(e);
        pinchMidX = mid.x;
        pinchMidY = mid.y;
        pinchOffsetStartX = imgOffsetX;
        pinchOffsetStartY = imgOffsetY;
        return;
      }
      if (e.touches.length === 1 && !isPinching) {
        e.preventDefault();
        const coords = getCanvasCoords(e);
        isDragging = true;
        dragStartX = coords.x;
        dragStartY = coords.y;
        dragOffsetStartX = imgOffsetX;
        dragOffsetStartY = imgOffsetY;
      }
    }

    function onTouchMove(e) {
      if (!loadedImg) return;
      if (isPinching && e.touches.length === 2) {
        e.preventDefault();
        var dist = getTouchDist(e);
        var ratio = dist / pinchStartDist;
        var newZoom = Math.max(0.1, Math.min(30, pinchStartZoom * ratio));
        // Anchor zoom to pinch midpoint
        var imgCX = pinchMidX - pinchOffsetStartX;
        var imgCY = pinchMidY - pinchOffsetStartY;
        var scaleRatio = newZoom / pinchStartZoom;
        imgOffsetX = pinchMidX - imgCX * scaleRatio;
        imgOffsetY = pinchMidY - imgCY * scaleRatio;
        imgZoom = newZoom;
        document.getElementById('zoomSlider').value = Math.round(imgZoom * 100);
        document.getElementById('zoomValue').textContent = Math.round(imgZoom * 100) + '%';
        scheduleRender();
        syncSliders();
        return;
      }
      if (isDragging && e.touches.length === 1 && !isPinching) {
        e.preventDefault();
        const coords = getCanvasCoords(e);
        imgOffsetX = dragOffsetStartX + (coords.x - dragStartX);
        imgOffsetY = dragOffsetStartY + (coords.y - dragStartY);
        scheduleRender();
        syncSliders();
      }
    }

    function onDragEnd() {
      isDragging = false;
      isPinching = false;
      syncSliders();
      if (loadedImg) renderFrame();
    }

    function syncSliders() {
      if (!loadedImg) return;
      var baseW = imgW * imgZoom, baseH = imgH * imgZoom;
      var maxOffX = baseW / 2, maxOffY = baseH / 2;
      var xPct = Math.round((imgOffsetX / maxOffX) * 100);
      var yPct = Math.round((imgOffsetY / maxOffY) * 100);
      xPct = Math.max(-100, Math.min(100, xPct));
      yPct = Math.max(-100, Math.min(100, yPct));
      document.getElementById('posXSlider').value = xPct;
      document.getElementById('posXValue').textContent = xPct;
      document.getElementById('posYSlider').value = yPct;
      document.getElementById('posYValue').textContent = yPct;
    }

    document.getElementById('posXSlider').addEventListener('input', function() {
      if (!loadedImg) return;
      var pct = parseInt(this.value);
      var baseW = imgW * imgZoom;
      imgOffsetX = (pct / 100) * (baseW / 2);
      document.getElementById('posXValue').textContent = pct;
      renderFrame();
    });

    document.getElementById('posYSlider').addEventListener('input', function() {
      if (!loadedImg) return;
      var pct = parseInt(this.value);
      var baseH = imgH * imgZoom;
      imgOffsetY = (pct / 100) * (baseH / 2);
      document.getElementById('posYValue').textContent = pct;
      renderFrame();
    });

    document.getElementById('zoomSlider').addEventListener('input', function() {
      if (!loadedImg) return;
      var newZoom = parseInt(this.value) / 100;
      var cx = W / 2, cy = H / 2;
      var oldW = imgW * imgZoom, oldH = imgH * imgZoom;
      var newW = imgW * newZoom, newH = imgH * newZoom;
      imgOffsetX = imgOffsetX * (newZoom / imgZoom) + (cx - newW / 2) - (cx - oldW / 2) * (newZoom / imgZoom);
      imgOffsetY = imgOffsetY * (newZoom / imgZoom) + (cy - newH / 2) - (cy - oldH / 2) * (newZoom / imgZoom);
      imgZoom = newZoom;
      document.getElementById('zoomValue').textContent = Math.round(newZoom * 100) + '%';
      renderFrame();
      syncSliders();
    });

    canvas.addEventListener('wheel', function(e) {
      if (!loadedImg) return;
      e.preventDefault();
      var delta = e.deltaY > 0 ? -0.05 : 0.05;
      var newZoom = Math.max(0.1, Math.min(30, imgZoom + delta));
      var coords = getCanvasCoords(e);
      var imgCX = coords.x - imgOffsetX;
      var imgCY = coords.y - imgOffsetY;
      var scaleRatio = newZoom / imgZoom;
      imgOffsetX = coords.x - imgCX * scaleRatio;
      imgOffsetY = coords.y - imgCY * scaleRatio;
      imgZoom = newZoom;
      document.getElementById('zoomSlider').value = Math.round(newZoom * 100);
      document.getElementById('zoomValue').textContent = Math.round(newZoom * 100) + '%';
      scheduleRender();
      syncSliders();
    }, { passive: false });

    function getTouchDist(e) {
      if (e.touches.length < 2) return 0;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }
  </script>
</body>
</html>
