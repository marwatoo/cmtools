<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Sport Cover — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .tool-header, .upload-zone, .field, .btn-row, .canvas-wrap {
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header { animation-delay: 0.05s; }
    .upload-zone { animation-delay: 0.1s; }
    .field { animation-delay: 0.15s; }
    .btn-row { animation-delay: 0.2s; }
    .canvas-wrap { animation-delay: 0.25s; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">IG Sport Cover</span>
    <span class="nav-num">02 / 04</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
  </nav>

  <div class="tool-page">
    <div class="tool-header">
      <h1>IG Sport Cover</h1>
      <p>Create 1080×1920 Instagram Sport covers with branding overlay and Arabic text.</p>
    </div>

    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">⬆</div>
      <div class="upload-text" id="uploadText">Drag an image here or <span class="upload-browse">choose a file</span></div>
      <input type="file" id="upload" accept="image/*" />
    </div>

    <div class="field">
      <label>Arabic text (2 lines max)</label>
      <textarea id="arabicText" placeholder="Type Arabic text here…" rows="3" dir="rtl"></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="processBtn">◈ Generate Image</button>
      <a class="btn btn-success" id="downloadLink" style="display:none;">↓ Download Image</a>
    </div>

    <div class="canvas-wrap" style="aspect-ratio:9/16">
      <canvas id="canvas" width="1080" height="1920" style="width:100%;height:auto;display:block;"></canvas>
    </div>
  </div>

  <script>
    const upload     = document.getElementById('upload');
    const processBtn = document.getElementById('processBtn');
    const canvas     = document.getElementById('canvas');
    const ctx        = canvas.getContext('2d');
    const dlLink     = document.getElementById('downloadLink');
    const arabicText = document.getElementById('arabicText');
    const dropzone   = document.getElementById('dropzone');
    const uploadText = document.getElementById('uploadText');

    const W = 1080, H = 1920;
    let currentFile = null;

    const brandingImg = new Image();
    brandingImg.src = '../assets/ig/branding.png';

    async function loadFont() {
      try {
        const f = new FontFace('LamaSans', `url(../fonts/LamaSans-ExtraBold.ttf)`);
        await f.load();
        document.fonts.add(f);
      } catch(e) { console.warn('LamaSans not found, using fallback.'); }
    }
    const fontReady = loadFont();

    function loadImage(src) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.onload = () => res(img);
        img.onerror = rej;
        img.src = src;
      });
    }

    function enableFile(file) {
      currentFile = file;
      dropzone.classList.add('has-file');
      uploadText.textContent = '✓ ' + file.name;
      previewFile(file);
    }

    function previewFile(file) {
      const img = new Image();
      img.onload = () => drawAll(img);
      img.src = URL.createObjectURL(file);
    }

    async function drawAll(img) {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      const scale = Math.max(W / img.width, H / img.height);
      const iw = img.width * scale, ih = img.height * scale;
      ctx.drawImage(img, (W - iw) / 2, (H - ih) / 2, iw, ih);

      if (brandingImg.complete && brandingImg.naturalWidth) {
        ctx.drawImage(brandingImg, 0, 0, W, H);
      } else {
        await new Promise(r => { brandingImg.onload = r; });
        ctx.drawImage(brandingImg, 0, 0, W, H);
      }

      await fontReady;
      drawArabicText();
    }

    function drawArabicText() {
      const text = arabicText.value.trim();
      if (!text) return;
      const marginX = 65, maxWidth = W - 2 * marginX;
      ctx.font = '900 48pt LamaSans, Arial';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.direction = 'rtl';
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3; ctx.shadowBlur = 8;

      const words = text.split(' ');
      let line = '', lines = [];
      words.forEach(word => {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxWidth) { if (line) lines.push(line); line = word; }
        else line = test;
      });
      if (line) lines.push(line);
      lines = lines.slice(0, 2);
      lines.forEach((l, i) => ctx.fillText(l, W / 2, 1480 + i * 110));
      ctx.shadowColor = 'transparent'; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0; ctx.shadowBlur = 0;
    }

    dropzone.addEventListener('click', () => upload.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) enableFile(e.dataTransfer.files[0]);
    });
    upload.addEventListener('change', () => { if (upload.files[0]) enableFile(upload.files[0]); });

    processBtn.addEventListener('click', () => {
      if (!currentFile) { alert('Please select an image first.'); return; }
      processBtn.disabled = true;
      processBtn.textContent = 'Processing…';
      const img = new Image();
      img.onload = async () => {
        await drawAll(img);
        const now = new Date();
        const ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') +
                   '_' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
        dlLink.href = canvas.toDataURL('image/png');
        dlLink.download = `ig_cover_${ts}.png`;
        dlLink.style.display = 'flex';
        processBtn.disabled = false;
        processBtn.textContent = '◈ Generate Image';
      };
      img.src = URL.createObjectURL(currentFile);
    });
  </script>
</body>
</html>
