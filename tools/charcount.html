<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Counter — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    .char-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 20px;
      margin-top: 16px;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .tool-header, .char-layout, .char-editor, .char-stats {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header { animation-delay: 0.05s; }
    .char-layout { animation-delay: 0.1s; }
    .char-editor { animation-delay: 0.15s; }
    .char-stats { animation-delay: 0.2s; }

    @media (max-width: 750px) {
      .char-layout { grid-template-columns: 1fr; }
    }
    .char-editor {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .char-textarea {
      width: 100%;
      min-height: 180px;
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: none;
    }
    .char-textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .char-actions {
      display: flex;
      gap: 8px;
    }
    .btn {
      padding: 8px 14px;
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: var(--radius-xs);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow2); }
    .btn.secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border2);
    }
    .btn.secondary:hover { border-color: var(--accent); }
    .char-wordcount {
      font-size: 0.75rem;
      color: var(--text3);
    }
    .char-stats {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .stat-row {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .stat-row:hover { border-color: var(--border2); }
    .stat-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg3);
      border-radius: var(--radius-xs);
      font-size: 0.9rem;
    }
    .stat-info { flex: 1; }
    .stat-name {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text2);
      margin-bottom: 2px;
    }
    .stat-num {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
    }
    .stat-limit {
      font-size: 0.65rem;
      color: var(--text3);
      text-align: right;
      min-width: 60px;
    }
    .stat-barwrap {
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .stat-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.15s, background 0.2s;
    }
    .stat-bar.ok { background: var(--accent); }
    .stat-bar.warn { background: #fbbf24; }
    .stat-bar.over { background: var(--accent3); }
    .stat-row.over .stat-num { color: var(--accent3); }
    .stat-row.warn .stat-num { color: #fbbf24; }
    .platform-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 3px;
      margin-bottom: 12px;
    }
    .platform-tab {
      flex: 1;
      padding: 7px 10px;
      background: transparent;
      color: var(--text2);
      border: none;
      border-radius: calc(var(--radius-xs) - 2px);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.15s;
    }
    .platform-tab:hover { color: var(--text); }
    .platform-tab.active {
      background: var(--accent);
      color: var(--btn-text);
    }
    .preset-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .preset-btn {
      padding: 5px 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      color: var(--text2);
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Character Counter</span>
    <span class="nav-num">limits</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
  </nav>
  <div class="tool-page">
    <div class="tool-header">
      <h1>Character Counter</h1>
      <p>Check character limits for social media. Type below to count live.</p>
    </div>

    <div class="platform-tabs">
      <button class="platform-tab active" data-plat="twitter">𝕏 Twitter</button>
      <button class="platform-tab" data-plat="linkedin">in LinkedIn</button>
      <button class="platform-tab" data-plat="instagram">📷 Instagram</button>
      <button class="platform-tab" data-plat="facebook">f Facebook</button>
    </div>

    <div class="char-layout">
      <div class="char-editor">
        <textarea class="char-textarea" id="textInput" placeholder="Type your text here..."></textarea>
        <div class="char-actions">
          <button class="btn" id="copyBtn">📋 Copy</button>
          <button class="btn secondary" id="clearBtn">🗑 Clear</button>
        </div>
        <div class="char-wordcount" id="wordCount">0 words</div>
      </div>

      <div class="char-stats">
        <div class="stat-row" id="stat-twitter">
          <div class="stat-icon">𝕏</div>
          <div class="stat-info">
            <div class="stat-name">Twitter / X</div>
            <div class="stat-num" id="twitter-num">0</div>
            <div class="stat-barwrap"><div class="stat-bar" id="twitter-bar"></div></div>
          </div>
          <div class="stat-limit">280 max</div>
        </div>

        <div class="stat-row" id="stat-linkedin">
          <div class="stat-icon">in</div>
          <div class="stat-info">
            <div class="stat-name">LinkedIn</div>
            <div class="stat-num" id="linkedin-num">0</div>
            <div class="stat-barwrap"><div class="stat-bar" id="linkedin-bar"></div></div>
          </div>
          <div class="stat-limit">3000 max</div>
        </div>

        <div class="stat-row" id="stat-instagram">
          <div class="stat-icon">📷</div>
          <div class="stat-info">
            <div class="stat-name">Instagram</div>
            <div class="stat-num" id="instagram-num">0</div>
            <div class="stat-barwrap"><div class="stat-bar" id="instagram-bar"></div></div>
          </div>
          <div class="stat-limit">2200 max</div>
        </div>

        <div class="stat-row" id="stat-facebook">
          <div class="stat-icon">f</div>
          <div class="stat-info">
            <div class="stat-name">Facebook</div>
            <div class="stat-num" id="facebook-num">0</div>
            <div class="stat-barwrap"><div class="stat-bar" id="facebook-bar"></div></div>
          </div>
          <div class="stat-limit">63K max</div>
        </div>
      </div>
    </div>

    <div style="margin-top: 16px;">
      <span style="font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3);">Quick presets</span>
      <div class="preset-list">
        <button class="preset-btn" data-text="🧵 Thread 🧵">Thread</button>
        <button class="preset-btn" data-text="📝 New post: ">New post</button>
        <button class="preset-btn" data-text="❓ Question: ">Question</button>
        <button class="preset-btn" data-text="💡 Tip: ">Tip</button>
        <button class="preset-btn" data-text="🔥 Hot take: ">Hot take</button>
        <button class="preset-btn" data-text="👀 Check this: ">Check this</button>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('textInput');
    const platforms = {
      twitter: { limit: 280, num: 'twitter-num', bar: 'twitter-bar', row: 'stat-twitter' },
      linkedin: { limit: 3000, num: 'linkedin-num', bar: 'linkedin-bar', row: 'stat-linkedin' },
      instagram: { limit: 2200, num: 'instagram-num', bar: 'instagram-bar', row: 'stat-instagram' },
      facebook: { limit: 63206, num: 'facebook-num', bar: 'facebook-bar', row: 'stat-facebook' }
    };

    function update() {
      const text = input.value;
      const len = text.length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById('wordCount').textContent = words + ' word' + (words !== 1 ? 's' : '');

      Object.values(platforms).forEach(p => {
        const pct = Math.min((len / p.limit) * 100, 100);
        document.getElementById(p.num).textContent = len;
        const bar = document.getElementById(p.bar);
        bar.style.width = pct + '%';
        bar.className = 'stat-bar ' + (len > p.limit ? 'over' : len > p.limit * 0.9 ? 'warn' : 'ok');
        const row = document.getElementById(p.row);
        row.className = 'stat-row ' + (len > p.limit ? 'over' : len > p.limit * 0.9 ? 'warn' : '');
      });
    }

    document.querySelectorAll('.platform-tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.platform-tab').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
      });
    });

    document.querySelectorAll('.preset-btn').forEach(b => {
      b.addEventListener('click', () => { input.value = b.dataset.text; update(); });
    });

    document.getElementById('copyBtn').addEventListener('click', async () => {
      await navigator.clipboard.writeText(input.value);
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Copied!';
      setTimeout(() => btn.textContent = '📋 Copy', 1200);
    });

    document.getElementById('clearBtn').addEventListener('click', () => { input.value = ''; update(); });
    input.addEventListener('input', update);
    update();
  </script>
</body>
</html>
