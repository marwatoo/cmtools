<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le360 Deck — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  (function() {
    var STORAGE_KEY = "mts-theme";
    var theme = localStorage.getItem(STORAGE_KEY);
    if (!theme) {
      theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
  <link rel="stylesheet" href="../assets/global.css" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <script src="../assets/theme.js"></script>
  <style>
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .deck-container {
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.5s ease 0.1s forwards;
    }

    /* RTL modal */
    .modal-box.rtl { direction: rtl; text-align: right; }
    .modal-box.rtl .modal-close { right: auto; left: 16px; }
    .modal-box.rtl h2 { padding-right: 0; padding-left: 40px; }
    .modal-box.rtl .slider-prev { left: auto; right: 10px; }
    .modal-box.rtl .slider-next { right: auto; left: 10px; }

    /* RTL columns */
    .deck-column.rtl { direction: rtl; text-align: right; }
    .deck-column.rtl .deck-card h3 { text-align: right; }
    .deck-column.rtl .deck-card-date { text-align: right; }

    /* ════════════════════════════════════════
       MOBILE — TAB-BASED SINGLE COLUMN VIEW
    ════════════════════════════════════════ */

    .mobile-tab-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 52px;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      z-index: 90;
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      align-items: stretch;
    }
    .mobile-tab-bar::-webkit-scrollbar { display: none; }

    .mobile-tab {
      flex: 0 0 auto;
      min-width: 72px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px; padding: 5px 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .mobile-tab:hover { background: var(--bg3); }
    .mobile-tab.active { border-bottom-color: var(--accent); }

    .mobile-tab-dot {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--bg3); border: 1.5px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 0.58rem; color: var(--accent2);
      transition: border-color 0.15s, color 0.15s;
    }
    .mobile-tab.active .mobile-tab-dot { border-color: var(--accent); color: var(--accent); }

    .mobile-tab-label {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.5rem; color: var(--text3);
      white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; max-width: 72px;
      transition: color 0.15s;
    }
    .mobile-tab.active .mobile-tab-label { color: var(--accent); }

    @keyframes slideInFromRight { from { transform: translateX(28px); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes slideInFromLeft  { from { transform: translateX(-28px); opacity:0; } to { transform: translateX(0); opacity:1; } }
    .deck-column.slide-from-right { animation: slideInFromRight 0.22s cubic-bezier(0.4,0,0.2,1) forwards; }
    .deck-column.slide-from-left  { animation: slideInFromLeft  0.22s cubic-bezier(0.4,0,0.2,1) forwards; }

    @media (max-width: 700px) {

      /* Kill the fadeUp re-trigger when columns are shown/hidden via mobile-active */
      .deck-column {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      .nav { padding: 10px 14px; gap: 8px; }
      .nav-back { padding: 5px 9px; font-size: 0.78rem; }
      .nav-title { font-size: 0.88rem; }
      .nav-num { display: none; }
      .theme-toggle { width: 32px; height: 32px; }

      .mobile-tab-bar { display: flex; }

      .deck-container {
        display: block;
        height: calc(100vh - 53px);
        overflow: hidden;
        position: relative;
      }
      .deck-column {
        position: absolute; inset: 0;
        min-width: unset !important; max-width: unset !important;
        width: 100%; border-right: none;
        display: none; flex-direction: column;
        padding-bottom: 52px;
      }
      .deck-column.mobile-active { display: flex; }
      .deck-col-feed { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

      /* Cards: compact on mobile */
      .deck-card { padding: 10px; }
      .deck-card-img { aspect-ratio: 16/9; }
      .deck-btn { font-size: 0.64rem; padding: 3px 7px; }

      /* Modal: bottom sheet */
      .modal-overlay { padding: 0 !important; align-items: flex-end !important; }
      .modal-box {
        max-width: 100% !important; width: 100% !important;
        max-height: 92vh !important;
        border-radius: var(--radius) var(--radius) 0 0 !important;
        padding: 20px 16px 28px !important;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Le360 Deck</span>
    <span class="nav-num">03 / 04</span>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <a href="snippets.html" style="font-size:0.78rem;color:var(--text2);text-decoration:none;padding:5px 10px;border:1px solid var(--border2);border-radius:6px;">⌨ Snippets</a>
      <button class="theme-toggle" id="themeToggle" style="margin-left:0;"><svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    </div>
  </nav>

  <!-- Deck columns container -->
  <div class="deck-container" id="deckContainer"></div>

  <!-- Mobile tab bar -->
  <div class="mobile-tab-bar" id="mobileTabBar"></div>

  <!-- Article Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose">×</button>
      <div id="modalBody">Loading…</div>
    </div>
  </div>

  <script>
    // ── CORS proxies (raced in parallel) ──────────────────────────────────
    const PROXIES = [
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];

    const sources = {
      FR:       'https://fr.le360.ma/arc/outboundfeeds/google-news-feed/',
      AR:       'https://ar.le360.ma/arc/outboundfeeds/google-news-feed/',
      Sport_AR: 'https://ar.sport.le360.ma/arc/outboundfeeds/google-news-feed/',
      Sport_FR: 'https://sport.le360.ma/arc/outboundfeeds/google-news-feed/',
      AFRIQUE:  'https://afrique.le360.ma/arc/outboundfeeds/google-news-feed/',
      Es:       'https://es.le360.ma/arc/outboundfeeds/google-news-feed/category/actualites-es/'
    };

    const labels = { AR:'Arabe', FR:'Français', AFRIQUE:'Afrique', Sport_AR:'Sport Ar', Sport_FR:'Sport Fr', Es:'Espagnol' };
    const cache  = {};
    const CACHE_KEY = 'le360deck_cache';
    const CACHE_TTL = 5 * 60 * 1000; // 5 min

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (Date.now() - data.ts < CACHE_TTL) {
          Object.entries(data.feeds || {}).forEach(([k, articles]) => {
            cache[k] = new Set(articles.map(a => a.link));
            const feed = document.getElementById(`feed-${k}`);
            if (feed && articles.length) {
              const loader = feed.querySelector('.deck-loading');
              if (loader) loader.remove();
              const frag = document.createDocumentFragment();
              articles.forEach((a, i) => frag.appendChild(createCard(a, i === 0)));
              feed.appendChild(frag);
            }
          });
        }
      } catch(e) {}
    }

    function saveCache() {
      try {
        const data = { ts: Date.now(), feeds: {} };
        Object.entries(cache).forEach(([k, links]) => {
          const feed = document.getElementById(`feed-${k}`);
          if (feed) {
            const cards = feed.querySelectorAll('.deck-card');
            const articles = [];
            cards.forEach(c => {
              const link = c.querySelector('.copy-link')?.dataset.link || '';
              const title = c.querySelector('h3')?.textContent || '';
              if (link) articles.push({ link, title });
            });
            data.feeds[k] = articles.slice(0, 12);
          }
        });
        localStorage.setItem(CACHE_KEY, JSON.stringify(data));
      } catch(e) {}
    }

    // ── Build columns ──────────────────────────────────────────────────────
    const container = document.getElementById('deckContainer');

    Object.keys(sources).forEach(key => {
      const col = document.createElement('div');
      col.className = 'deck-column' + (key === 'AR' || key === 'Sport_AR' ? ' rtl' : '');
      col.id = `col-${key}`;
      col.innerHTML = `
        <div class="deck-col-header">
          <h2>${labels[key]}</h2>
          <span class="deck-col-badge"><span class="deck-pulse"></span>live</span>
        </div>
        <div class="deck-col-feed" id="feed-${key}">
          <div class="deck-loading">Loading…</div>
        </div>`;
      container.appendChild(col);
    });

    // ── Fetch with proxy race (fastest wins) ──────────────────────────────
    async function fetchWithProxy(url) {
      const cacheBuster = '?_t=' + Date.now();
      const bustUrl = url + (url.includes('?') ? '&' : '') + cacheBuster;
      const results = PROXIES.map(proxy =>
        fetch(proxy(bustUrl), { signal: AbortSignal.timeout(12000) })
          .then(res => { if (!res.ok) throw new Error('not ok'); return res.text(); })
          .then(text => { if (!text) throw new Error('empty'); return text; })
      );
      return Promise.any(results);
    }

    function extractImagesFromHTML(html) {
      const d = document.createElement('div');
      d.innerHTML = html;
      return [...d.querySelectorAll('img')].map(i => i.src).filter(Boolean);
    }

    function imgFromDescription(desc) {
      if (!desc) return '';
      const d = document.createElement('div'); d.innerHTML = desc;
      return d.querySelector('img')?.src || '';
    }

    async function fetchArticles(key, url) {
      const text = await fetchWithProxy(url);
      const doc  = new DOMParser().parseFromString(text, 'text/xml');
      return [...doc.querySelectorAll('item')].slice(0, 12).map(item => {
        let content = '';
        try {
          const nodes = item.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/', 'encoded');
          if (nodes.length) content = nodes[0].textContent;
        } catch(e) {}
        const desc = item.querySelector('description')?.textContent || '';
        const media = item.querySelector('media\\:content, content');

        // RSS <link> is a text node sibling of atom:link — querySelector('link') often returns ''
        // Walk child nodes to find the real text value
        let link = '';
        for (const node of item.childNodes) {
          if (node.nodeName === 'link') {
            link = (node.textContent || '').trim();
            if (link) break;
          }
        }
        // Fallback: guid if it looks like a URL
        if (!link) {
          const guid = item.querySelector('guid')?.textContent?.trim() || '';
          if (guid.startsWith('http')) link = guid;
        }

        return {
          title: item.querySelector('title')?.textContent || '',
          link,
          img:   media?.getAttribute('url') || imgFromDescription(desc) || '',
          date:  item.querySelector('pubDate')?.textContent || '',
          content: content || desc || '<p>No content.</p>',
          description: desc,
          contentImages: extractImagesFromHTML(content),
          _isRtl: key === 'AR' || key === 'Sport_AR'
        };
      });
    }

    function formatDate(ds) {
      try { return new Date(ds).toLocaleString('fr-FR', { hour12: false }); }
      catch(e) { return ds; }
    }

    // ── Copy helper ────────────────────────────────────────────────────────
    function copyToClipboard(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        const orig = btn.textContent;
        btn.textContent = '✓ Copied';
        setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1200);
      });
    }

    function extractYouTubeLink(html) {
      if (!html) return '';
      const d = document.createElement('div');
      d.innerHTML = html;
      const ytMatch = d.innerHTML.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      return ytMatch ? `https://youtu.be/${ytMatch[1]}` : '';
    }

    // ── Render card ────────────────────────────────────────────────────────
    function createCard(article, eager = false) {
      const card = document.createElement('div');
      card.className = 'deck-card';
      const fallback = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="320" height="180"><rect fill="%23222"/></svg>';
      const hasCarousel = article.contentImages.length > 1;

      const img = document.createElement('img');
      img.className = 'deck-card-img';
      img.src = article.img || fallback;
      img.loading = eager ? 'eager' : 'lazy';
      img.fetchPriority = eager ? 'high' : 'auto';
      img.alt = '';
      img.onerror = `this.src='${fallback}'`;
      card.appendChild(img);

      const h3 = document.createElement('h3');
      h3.textContent = article.title;
      card.appendChild(h3);

      const date = document.createElement('div');
      date.className = 'deck-card-date';
      date.textContent = formatDate(article.date);
      card.appendChild(date);

      const btns = document.createElement('div');
      btns.className = 'deck-card-btns';

      const copyLink = document.createElement('button');
      copyLink.className = 'deck-btn copy-link';
      copyLink.textContent = 'Copy Link';
      copyLink.dataset.link = article.link;
      btns.appendChild(copyLink);

      const copyTitle = document.createElement('button');
      copyTitle.className = 'deck-btn copy-title';
      copyTitle.textContent = 'Copy Title';
      copyTitle.dataset.title = article.title;
      btns.appendChild(copyTitle);

      const copyBoth = document.createElement('button');
      copyBoth.className = 'deck-btn copy-both';
      copyBoth.textContent = 'Copy Title + Link';
      copyBoth.dataset.title = article.title;
      copyBoth.dataset.link = article.link;
      btns.appendChild(copyBoth);

      const ytLink = extractYouTubeLink(article.content);
      if (ytLink) {
        const copyTitleYt = document.createElement('button');
        copyTitleYt.className = 'deck-btn copy-title-yt';
        copyTitleYt.textContent = 'Copy Title + YT Link';
        copyTitleYt.dataset.title = article.title;
        copyTitleYt.dataset.ytlink = ytLink;
        btns.appendChild(copyTitleYt);
      }

      if (hasCarousel) {
        const carousel = document.createElement('span');
        carousel.className = 'deck-btn carousel-tag';
        carousel.textContent = 'Carousel';
        btns.appendChild(carousel);
      }

      card.appendChild(btns);

      // Open modal on card click (not buttons)
      card.addEventListener('click', e => {
        if (e.target.closest('.deck-card-btns')) return;
        openModal(article);
      });

      copyLink.addEventListener('click', e => {
        e.stopPropagation();
        copyToClipboard(copyLink.dataset.link, copyLink);
      });

      copyTitle.addEventListener('click', e => {
        e.stopPropagation();
        copyToClipboard(copyTitle.dataset.title, copyTitle);
      });
      
      copyBoth.addEventListener('click', e => {
        e.stopPropagation();
        copyToClipboard(`${copyBoth.dataset.title}\n${copyBoth.dataset.link}`, copyBoth);
      });

      const copyTitleYt = card.querySelector('.copy-title-yt');
      if (copyTitleYt) {
        copyTitleYt.addEventListener('click', e => {
          e.stopPropagation();
          copyToClipboard(`${copyTitleYt.dataset.title}\n${copyTitleYt.dataset.ytlink}`, copyTitleYt);
        });
      }

      return card;
    }

    // ── Update loop ────────────────────────────────────────────────────────
    async function updateColumn(key, url, isRetry = false) {
      const feed = document.getElementById(`feed-${key}`);
      if (!cache[key]) cache[key] = new Set();

      try {
        const articles = await fetchArticles(key, url);
        const fresh = articles.filter(a => a.link && !cache[key].has(a.link));
        if (!fresh.length) return;

        // Remove loading placeholder if present
        const loader = feed.querySelector('.deck-loading');
        if (loader) loader.remove();

        const frag = document.createDocumentFragment();
        fresh.forEach((a, i) => {
          frag.appendChild(createCard(a, i === 0 && !feed.querySelector('.deck-card')));
          cache[key].add(a.link);
        });
        feed.insertBefore(frag, feed.firstChild);
      } catch(e) {
        // Silent retry once before showing error
        if (!isRetry) {
          setTimeout(() => updateColumn(key, url, true), 3000);
          return;
        }
        const loader = feed.querySelector('.deck-loading');
        if (loader) {
          loader.innerHTML = '';
          const msg = document.createElement('div');
          msg.textContent = '⚠ Failed to load';
          msg.style.cssText = 'margin-bottom:8px;font-size:0.8rem;color:var(--text3);';
          const btn = document.createElement('button');
          btn.textContent = '↺ Retry';
          btn.style.cssText = 'font-size:0.72rem;padding:5px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;';
          btn.onclick = () => { loader.textContent = 'Retrying…'; updateColumn(key, url, false); };
          loader.appendChild(msg);
          loader.appendChild(btn);
        }
        console.warn('Feed error', key, e);
      }
    }

    async function updateLoop() {
      await Promise.allSettled(Object.entries(sources).map(([k, u]) => updateColumn(k, u)));
      saveCache();
      setTimeout(updateLoop, 30000);
    }

    // Load from cache immediately, then fetch fresh
    loadCache();
    setTimeout(() => {
      const keys = Object.keys(sources);
      keys.forEach((key, i) => {
        setTimeout(() => updateColumn(key, sources[key]), i * 300);
      });
      setTimeout(updateLoop, 15000);
    }, 200);

    // ── Modal ──────────────────────────────────────────────────────────────
    function openModal(article) {
      const overlay = document.getElementById('modalOverlay');
      const body    = document.getElementById('modalBody');
      const hasCarousel = article.contentImages.length > 1;
      const isRTL = article._isRtl;

      let mediaHTML = '';
      if (hasCarousel) {
        mediaHTML = `<div class="slider">
          ${article.contentImages.map((src, i) => `<img src="${src}" class="slide ${i===0?'active':''}" alt="">`).join('')}
          <button class="slider-btn slider-prev">&#10094;</button>
          <button class="slider-btn slider-next">&#10095;</button>
        </div>`;
      } else if (article.img) {
        mediaHTML = `<img class="modal-img" src="${article.img}" alt="">`;
      }

      let contentHTML = article.content;
      if (hasCarousel) {
        const tmp = document.createElement('div'); tmp.innerHTML = article.content;
        tmp.querySelectorAll('img').forEach(img => { if (article.contentImages.includes(img.src)) img.remove(); });
        contentHTML = tmp.innerHTML;
      }

      body.innerHTML = `
        <h2>${article.title}</h2>
        ${mediaHTML}
        <div class="modal-meta">Published: ${formatDate(article.date)}</div>
        <a class="modal-link" href="${article.link}" target="_blank" rel="noopener">Open full article →</a>
        <hr style="border:none;border-top:1px solid var(--border);margin:16px 0;">
        <div class="modal-content-html">${contentHTML}</div>`;

      overlay.classList.remove('hidden');
      body.closest('.modal-box').classList.toggle('rtl', isRTL);

      // Load Twitter widgets on-demand
      if (!window.twttr?.widgets) {
        const s = document.createElement('script');
        s.src = 'https://platform.twitter.com/widgets.js';
        s.charset = 'utf-8';
        s.onload = () => window.twttr?.widgets?.load(body);
        document.head.appendChild(s);
      } else {
        twttr.widgets.load(body);
      }

      // Slider
      const slides = body.querySelectorAll('.slide');
      if (slides.length > 1) {
        let cur = 0;
        const show = i => slides.forEach((s,j) => s.classList.toggle('active', j===i));
        body.querySelector('.slider-prev').onclick = () => { cur = (cur - 1 + slides.length) % slides.length; show(cur); };
        body.querySelector('.slider-next').onclick = () => { cur = (cur + 1) % slides.length; show(cur); };
      }
    }

    document.getElementById('modalClose').addEventListener('click', () =>
      document.getElementById('modalOverlay').classList.add('hidden'));
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay'))
        document.getElementById('modalOverlay').classList.add('hidden');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('modalOverlay').classList.add('hidden');
    });
    // ── Mobile tab bar ────────────────────────────────────────────────────
    const COLS_LIST = Object.keys(sources);
    const IS_MOBILE = () => window.innerWidth <= 700;
    let mobileActiveIndex = 0;

    function buildMobileTabs() {
      const bar = document.getElementById('mobileTabBar');
      bar.innerHTML = '';
      COLS_LIST.forEach((key, i) => {
        const tab = document.createElement('div');
        tab.className = 'mobile-tab' + (i === 0 ? ' active' : '');

        const dot = document.createElement('div');
        dot.className = 'mobile-tab-dot';
        dot.textContent = labels[key].charAt(0).toUpperCase();

        const lbl = document.createElement('span');
        lbl.className = 'mobile-tab-label';
        lbl.textContent = labels[key];

        tab.appendChild(dot);
        tab.appendChild(lbl);
        tab.addEventListener('click', () => switchMobileTab(i));
        bar.appendChild(tab);
      });
    }

    function switchMobileTab(newIndex, direction) {
      if (!IS_MOBILE() || newIndex === mobileActiveIndex) return;
      const dir = direction !== undefined ? direction : (newIndex > mobileActiveIndex ? 'right' : 'left');
      const animClass = dir === 'right' ? 'slide-from-right' : 'slide-from-left';
      const oldCol = document.getElementById(`col-${COLS_LIST[mobileActiveIndex]}`);
      if (oldCol) oldCol.classList.remove('mobile-active');
      const newCol = document.getElementById(`col-${COLS_LIST[newIndex]}`);
      if (newCol) {
        newCol.classList.add('mobile-active');
        newCol.classList.remove('slide-from-right', 'slide-from-left');
        void newCol.offsetWidth;
        newCol.classList.add(animClass);
        setTimeout(() => newCol.classList.remove(animClass), 300);
      }
      document.querySelectorAll('.mobile-tab').forEach((t, i) => t.classList.toggle('active', i === newIndex));
      const tabs = document.querySelectorAll('.mobile-tab');
      if (tabs[newIndex]) tabs[newIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      mobileActiveIndex = newIndex;
    }

    function applyMobileLayout() {
      COLS_LIST.forEach((key, i) => {
        const el = document.getElementById(`col-${key}`);
        if (el) {
          if (IS_MOBILE()) el.classList.toggle('mobile-active', i === mobileActiveIndex);
          else el.classList.remove('mobile-active');
        }
      });
    }

    // Touch swipe
    (function initSwipe() {
      const container = document.getElementById('deckContainer');
      let tx = 0, ty = 0, swiping = false;
      container.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; swiping = false; }, { passive: true });
      container.addEventListener('touchmove', e => {
        const dx = e.touches[0].clientX - tx, dy = e.touches[0].clientY - ty;
        if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) swiping = true;
      }, { passive: true });
      container.addEventListener('touchend', e => {
        if (!IS_MOBILE() || !swiping) return;
        const dx = e.changedTouches[0].clientX - tx;
        const activeCol = document.getElementById(`col-${COLS_LIST[mobileActiveIndex]}`);
        const isRtlSwipe = activeCol?.classList.contains('rtl');
        if (dx < -60 && mobileActiveIndex < COLS_LIST.length - 1) switchMobileTab(mobileActiveIndex + 1, isRtlSwipe ? 'left' : 'right');
        else if (dx > 60 && mobileActiveIndex > 0) switchMobileTab(mobileActiveIndex - 1, isRtlSwipe ? 'right' : 'left');
        swiping = false;
      }, { passive: true });
    })();

    window.addEventListener('resize', applyMobileLayout);
    buildMobileTabs();
    applyMobileLayout();
  </script>
</body>
</html>
