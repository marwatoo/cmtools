<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Le360 Nitter Deck – Reloaded</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .nav, .deck-container, .deck-header, .slide, .modal-box {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .nav { animation-delay: 0.05s; }
    .deck-container { animation-delay: 0.1s; }
    .deck-header:nth-of-type(1) { animation-delay: 0.15s; }
    .slide:nth-of-type(1) { animation-delay: 0.2s; }

    :root {
      --bg: #0b0b12; --surface: #16162a; --border: #2a2a40; --border2: #333;
      --text: #e1e1f0; --text2: #999; --accent: #6ab0f3;
    }
    [data-theme="light"] {
      --bg: #f5f5ff; --surface: #fff; --border: #ddd; --border2: #ccc; --text: #111; --text2: #555; --accent: #1a73e8;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .nav {
      display: flex; align-items: center; padding: 0 16px; height: 56px;
      background: var(--surface); border-bottom: 1px solid var(--border); gap: 12px; flex-shrink: 0;
    }
    .nav-back, .nav-title, .nav-num { color: var(--text); text-decoration: none; font-size: 0.9rem; }
    .nav-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; margin-right: auto; }
    .nav-num { color: var(--text2); font-size: 0.75rem; }
    .theme-toggle {
      background: none; border: 1px solid var(--border2); border-radius: 6px;
      color: var(--text); padding: 5px 10px; cursor: pointer; font-size: 0.9rem;
    }
    .deck-container {
      flex: 1; display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px; padding: 16px; overflow-y: auto; align-content: start;
    }
    .deck-column {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      display: flex; flex-direction: column; min-height: 0; overflow: hidden;
    }
    .deck-col-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 600;
      font-family: 'Syne', sans-serif; flex-shrink: 0; gap: 8px;
    }
    .deck-col-badge {
      font-size: 0.7rem; background: var(--border2); padding: 3px 8px; border-radius: 12px;
      display: flex; align-items: center; gap: 4px; white-space: nowrap;
    }
    .deck-pulse { width: 8px; height: 8px; background: #4f9; border-radius: 50%; display: inline-block; }
    .deck-col-feed {
      flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px;
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    }
    .deck-loading, .deck-error {
      color: var(--text2); font-size: 0.8rem; padding: 16px; text-align: center;
    }
    .deck-error { color: var(--danger, #f25c5c); }
    .retry-btn {
      background: var(--accent); color: #000; border: none; padding: 4px 12px;
      border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-left: 8px;
    }
    .deck-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      overflow: hidden; cursor: pointer; transition: border 0.2s; flex-shrink: 0;
    }
    .deck-card:hover { border-color: var(--accent); }
    .deck-card h3 {
      font-size: 0.88rem; padding: 10px 10px 4px; line-height: 1.35;
      display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
    }
    .deck-card-date { font-size: 0.7rem; color: var(--text2); padding: 0 10px 8px; }
    .deck-card-img, .no-image-placeholder {
      width: 100%; height: 140px; object-fit: cover; background: #1a1a2e;
    }
    .no-image-placeholder { display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #444; }
    .deck-card-btns { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 10px 10px; }
    .deck-btn {
      font-size: 0.65rem; background: var(--border2); border: none; color: var(--text);
      padding: 4px 8px; border-radius: 5px; cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .deck-btn:hover { background: var(--accent); color: #000; }
    .deck-btn.copied { background: #4f9; color: #000; }
    .carousel-tag { background: transparent; border: 1px dashed var(--border2); cursor: default; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--surface); border-radius: 16px; max-width: 700px; width: 90%;
      max-height: 85vh; overflow-y: auto; padding: 24px; position: relative;
    }
    .modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 1.8rem; color: var(--text2); cursor: pointer; }
    .modal-img, .slider img { max-width: 100%; border-radius: 10px; margin: 10px 0; }
    .slider { position: relative; }
    .slide { display: none; } .slide.active { display: block; }
    .slider-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(0,0,0,0.6); color: white; border: none; font-size: 1.5rem;
      padding: 6px 12px; cursor: pointer; border-radius: 4px;
    }
    .slider-prev { left: 8px; } .slider-next { right: 8px; }
    .modal-link { color: var(--accent); text-decoration: underline; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Le360 Nitter Deck 🔄</span>
    <span class="nav-num">🐦 RSS</span>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <button class="theme-toggle" id="themeToggle">☽</button>
    </div>
  </nav>

  <div class="deck-container" id="deckContainer"></div>

  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose">×</button>
      <div id="modalBody">Loading…</div>
    </div>
  </div>

  <script>
    (function() {
      // Theme toggle
      const toggle = document.getElementById('themeToggle');
      toggle.addEventListener('click', () => {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        toggle.textContent = next === 'dark' ? '☽' : '☀';
      });

      // --- Nitter instances with CORS-friendly behaviour ---
      const NITTER_INSTANCES = [
        'https://nitter.net',
        'https://nitter.poast.org',
        'https://nitter.1d4.us',
        'https://nitter.space',
        'https://nitter.privacydev.net',
        'https://nitter.mstdn.social'
      ];

      // --- Reliable CORS proxies (in order of preference) ---
      const PROXIES = [
        url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,   // usually very reliable
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://proxy.cors.sh/${url}`,
      ];

      const accounts = {
        le360fr:      { handle:'le360fr',      label:'Français 🇫🇷' },
        le360ar:      { handle:'le360ar',      label:'Arabe 🇲🇦' },
        le360sport:   { handle:'le360sport',   label:'Sport ⚽' },
        le360afrique: { handle:'le360afrique', label:'Afrique 🌍' },
        le360es:      { handle:'le360es',      label:'Espagnol 🇪🇸' }
      };

      const cache = {};
      // Keep track of which nitter instance works per account
      const instanceMap = {};

      // Build columns
      const container = document.getElementById('deckContainer');
      Object.keys(accounts).forEach(key => {
        const acc = accounts[key];
        const col = document.createElement('div');
        col.className = 'deck-column';
        col.id = `col-${key}`;
        col.innerHTML = `
          <div class="deck-col-header">
            <h2>${acc.label} 🐦</h2>
            <span class="deck-col-badge"><span class="deck-pulse"></span>live</span>
          </div>
          <div class="deck-col-feed" id="feed-${key}">
            <div class="deck-loading">⏳ Loading…</div>
          </div>`;
        container.appendChild(col);
        // Initialize instance index
        instanceMap[key] = 0;
        cache[key] = new Set();
      });

      // ---------- Smart fetch: try direct → proxies, with fallback instances ----------
      async function fetchWithFallback(accountKey) {
        const handle = accounts[accountKey].handle;
        let lastError = null;

        // Try each nitter instance
        for (let i = 0; i < NITTER_INSTANCES.length; i++) {
          const instance = NITTER_INSTANCES[instanceMap[accountKey] % NITTER_INSTANCES.length];
          const rssUrl = `${instance}/${handle}/rss`;
          const busted = rssUrl + (rssUrl.includes('?')?'&':'?') + '_t=' + Date.now();

          // 1) Direct attempt (fastest)
          try {
            const resp = await fetch(busted, { signal: AbortSignal.timeout(8000) });
            if (resp.ok) {
              const text = await resp.text();
              if (text.includes('<rss') || text.includes('<feed') || text.includes('<item') || text.includes('<entry')) {
                // success – remember this working instance
                instanceMap[accountKey] = NITTER_INSTANCES.indexOf(instance);
                return text;
              }
            }
          } catch (e) { /* direct blocked */ }

          // 2) Proxy fallback for this instance
          for (const proxy of PROXIES) {
            try {
              const proxyUrl = proxy(busted);
              const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
              if (resp.ok) {
                const text = await resp.text();
                if (text.includes('<rss') || text.includes('<feed') || text.includes('<item') || text.includes('<entry')) {
                  instanceMap[accountKey] = NITTER_INSTANCES.indexOf(instance);
                  return text;
                }
              }
            } catch (e) { lastError = e; }
          }

          // Move to next instance for next attempt
          instanceMap[accountKey]++;
        }

        throw new Error(`All instances & proxies failed. Last error: ${lastError?.message || 'unknown'}`);
      }

      function extractImages(html) {
        if (!html) return [];
        const d = document.createElement('div'); d.innerHTML = html;
        return [...d.querySelectorAll('img')].map(i => i.src).filter(Boolean);
      }

      async function fetchTweets(accountKey) {
        const xml = await fetchWithFallback(accountKey);
        const doc = new DOMParser().parseFromString(xml, 'text/xml');
        if (doc.querySelector('parsererror')) throw new Error('XML parse error');
        let items = [...doc.querySelectorAll('item')];
        if (items.length === 0) {
          const entries = [...doc.querySelectorAll('entry')];
          return entries.slice(0,6).map(e => {
            const content = e.querySelector('content')?.textContent || e.querySelector('summary')?.textContent || '';
            const imgs = extractImages(content);
            return {
              title: e.querySelector('title')?.textContent || '',
              link: e.querySelector('link[rel="alternate"]')?.getAttribute('href') || e.querySelector('link')?.getAttribute('href') || '',
              content, date: e.querySelector('published')?.textContent || e.querySelector('updated')?.textContent || '',
              img: imgs[0] || '', contentImages: imgs
            };
          });
        }
        return items.slice(0,6).map(item => {
          const title = item.querySelector('title')?.textContent || '';
          const link = item.querySelector('link')?.textContent || '';
          const desc = item.querySelector('description')?.textContent || '';
          let content = '';
          try { const enc = item.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/','encoded'); if(enc.length) content = enc[0].textContent; } catch(e){}
          const mediaUrl = item.querySelector('media\\:content, content[url]')?.getAttribute('url') || '';
          const combined = content || desc;
          const imgs = extractImages(combined);
          return { title, link, img: mediaUrl || imgs[0] || '', date: item.querySelector('pubDate')?.textContent || '', content: combined, description: desc, contentImages: imgs };
        });
      }

      function formatDate(ds) {
        try { return new Date(ds).toLocaleString('fr-FR',{hour12:false,day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
        catch(e){ return ds; }
      }

      function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          btn.classList.add('copied'); const orig = btn.textContent; btn.textContent='✓ Copied';
          setTimeout(() => { btn.classList.remove('copied'); btn.textContent=orig; },1200);
        }).catch(() => {
          const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        });
      }

      function createCard(tweet) {
        const card = document.createElement('div');
        card.className = 'deck-card';
        const hasImg = tweet.img && tweet.img.startsWith('http');
        if (hasImg) {
          const img = document.createElement('img'); img.className='deck-card-img'; img.src=tweet.img; img.loading='lazy';
          img.onerror = () => { img.remove(); const ph = document.createElement('div'); ph.className='no-image-placeholder'; ph.textContent='🐦'; card.prepend(ph); };
          card.appendChild(img);
        } else {
          const ph = document.createElement('div'); ph.className='no-image-placeholder'; ph.textContent='🐦';
          card.appendChild(ph);
        }
        const h3 = document.createElement('h3'); h3.textContent = tweet.title; card.appendChild(h3);
        const date = document.createElement('div'); date.className='deck-card-date'; date.textContent = formatDate(tweet.date); card.appendChild(date);
        const btns = document.createElement('div'); btns.className='deck-card-btns';
        const copyLink = document.createElement('button'); copyLink.className='deck-btn copy-link'; copyLink.textContent='Copy Link'; copyLink.dataset.link=tweet.link; btns.appendChild(copyLink);
        const copyTitle = document.createElement('button'); copyTitle.className='deck-btn copy-title'; copyTitle.textContent='Copy Text'; copyTitle.dataset.title=tweet.title; btns.appendChild(copyTitle);
        const copyBoth = document.createElement('button'); copyBoth.className='deck-btn copy-both'; copyBoth.textContent='Copy Text+Link'; copyBoth.dataset.title=tweet.title; copyBoth.dataset.link=tweet.link; btns.appendChild(copyBoth);
        if (tweet.contentImages.length>1) { const tag = document.createElement('span'); tag.className='deck-btn carousel-tag'; tag.textContent='📷 '+tweet.contentImages.length; btns.appendChild(tag); }
        card.appendChild(btns);
        card.addEventListener('click', e => { if(!e.target.closest('.deck-card-btns')) openModal(tweet); });
        copyLink.addEventListener('click', e => { e.stopPropagation(); copyText(copyLink.dataset.link, copyLink); });
        copyTitle.addEventListener('click', e => { e.stopPropagation(); copyText(copyTitle.dataset.title, copyTitle); });
        copyBoth.addEventListener('click', e => { e.stopPropagation(); copyText(`${copyBoth.dataset.title}\n${copyBoth.dataset.link}`, copyBoth); });
        return card;
      }

      // Update a single column
      async function updateColumn(key) {
        const feed = document.getElementById(`feed-${key}`);
        if (!cache[key]) cache[key] = new Set();
        try {
          const tweets = await fetchTweets(key);
          const fresh = tweets.filter(t => !cache[key].has(t.link));
          // Remove loading/error messages
          feed.querySelectorAll('.deck-loading, .deck-error').forEach(el => el.remove());
          if (fresh.length === 0) {
            if (!feed.querySelector('.deck-loading')) {
              const msg = document.createElement('div'); msg.className = 'deck-loading'; msg.textContent = '✓ Up to date';
              feed.appendChild(msg);
            }
            return;
          }
          const frag = document.createDocumentFragment();
          fresh.reverse().forEach(t => { frag.appendChild(createCard(t)); cache[key].add(t.link); });
          feed.insertBefore(frag, feed.firstChild);
          while (feed.children.length > 30) feed.removeChild(feed.lastChild);
        } catch (e) {
          console.warn(key, e);
          feed.querySelectorAll('.deck-loading, .deck-error').forEach(el => el.remove());
          const errDiv = document.createElement('div');
          errDiv.className = 'deck-error';
          errDiv.innerHTML = `⚠ ${e.message.substring(0,40)} <button class="retry-btn" data-key="${key}">↻ Retry</button>`;
          feed.appendChild(errDiv);
          // Attach retry listener
          errDiv.querySelector('.retry-btn').addEventListener('click', () => {
            errDiv.remove();
            const loader = document.createElement('div'); loader.className = 'deck-loading'; loader.textContent = '⏳ Retrying…';
            feed.appendChild(loader);
            updateColumn(key);
          });
        }
      }

      // Global refresh
      function refreshAll() {
        Object.keys(accounts).forEach(k => updateColumn(k));
        setTimeout(refreshAll, 30000); // 30 seconds (slower to avoid rate limits)
      }
      refreshAll();

      // Modal (unchanged)
      function openModal(tweet) {
        const overlay = document.getElementById('modalOverlay');
        const body = document.getElementById('modalBody');
        let mediaHTML = '';
        if (tweet.contentImages.length > 1) {
          mediaHTML = `<div class="slider">${tweet.contentImages.map((s,i)=>`<img src="${s}" class="slide ${i===0?'active':''}" alt="" loading="lazy">`).join('')}<button class="slider-btn slider-prev">&#10094;</button><button class="slider-btn slider-next">&#10095;</button></div>`;
        } else if (tweet.img) {
          mediaHTML = `<img class="modal-img" src="${tweet.img}" alt="">`;
        }
        let contentHTML = tweet.content || tweet.description || '';
        if (tweet.contentImages.length > 1) {
          const tmp = document.createElement('div'); tmp.innerHTML = contentHTML;
          tmp.querySelectorAll('img').forEach(img => { if(tweet.contentImages.includes(img.src)) img.remove(); });
          contentHTML = tmp.innerHTML;
        }
        const tweetId = tweet.link.split('/').pop() || '';
        const twitterUrl = 'https://twitter.com/i/status/' + tweetId;
        body.innerHTML = `<h2 style="word-wrap:break-word;">${tweet.title}</h2>${mediaHTML}<div class="modal-meta">📅 ${formatDate(tweet.date)}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;"><a class="modal-link" href="${twitterUrl}" target="_blank">🔗 Twitter/X →</a><a class="modal-link" href="${tweet.link}" target="_blank" style="opacity:0.7;">📡 Nitter →</a></div>
          <hr style="border-color:var(--border);"><div class="modal-content-html">${contentHTML}</div>`;
        overlay.classList.remove('hidden');
        const slides = body.querySelectorAll('.slide');
        if (slides.length>1) {
          let cur=0; const show=i=>slides.forEach((s,j)=>s.classList.toggle('active',j===i));
          body.querySelector('.slider-prev').onclick=()=>{ cur=(cur-1+slides.length)%slides.length; show(cur); };
          body.querySelector('.slider-next').onclick=()=>{ cur=(cur+1)%slides.length; show(cur); };
        }
        document.getElementById('modalBox').scrollTop = 0;
      }

      document.getElementById('modalClose').addEventListener('click', ()=> document.getElementById('modalOverlay').classList.add('hidden'));
      document.getElementById('modalOverlay').addEventListener('click', e=> { if(e.target===e.currentTarget) document.getElementById('modalOverlay').classList.add('hidden'); });
      document.addEventListener('keydown', e=> { if(e.key==='Escape') document.getElementById('modalOverlay').classList.add('hidden'); });
    })();
  </script>
</body>
</html>
