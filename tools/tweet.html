<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le360 — TweetDeck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e0f11;
      --bg2:       #16181c;
      --bg3:       #1e2026;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.13);
      --text:      #e8eaf0;
      --text2:     #8b90a0;
      --text3:     #555a68;
      --accent:    #1d9bf0;
      --accent-bg: rgba(29,155,240,0.1);
      --card-hover:#1a1d23;
      --radius:    10px;
      --radius-sm: 7px;
    }

    [data-theme="light"] {
      --bg:        #f5f6f8;
      --bg2:       #ffffff;
      --bg3:       #eceef2;
      --border:    rgba(0,0,0,0.07);
      --border2:   rgba(0,0,0,0.13);
      --text:      #0f1117;
      --text2:     #555a68;
      --text3:     #9099aa;
      --card-hover:#f0f2f5;
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      flex-shrink: 0;
      z-index: 10;
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 17px;
      color: var(--accent);
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .nav-logo span { color: var(--text); }

    .nav-sep { color: var(--border2); margin: 0 4px; }

    .nav-title {
      font-size: 13px;
      color: var(--text2);
      font-weight: 400;
    }

    .nav-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text3);
      padding: 3px 9px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .theme-btn {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      color: var(--text2);
      cursor: pointer;
      padding: 5px 10px;
      font-size: 14px;
      transition: background 0.15s;
    }

    .theme-btn:hover { background: var(--bg3); }

    /* ── Deck ── */
    #deck {
      display: flex;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
    }

    #deck::-webkit-scrollbar { height: 6px; }
    #deck::-webkit-scrollbar-track { background: var(--bg); }
    #deck::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    .col {
      min-width: 290px;
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .col:last-child { border-right: none; }

    .col-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .col-icon {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--accent-bg);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .col-icon svg { width: 13px; height: 13px; fill: var(--accent); }

    .col-name {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }

    .col-handle {
      font-size: 11px;
      color: var(--text3);
      margin-left: 2px;
    }

    .col-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3);
      background: var(--bg3);
      border-radius: 20px;
      padding: 2px 7px;
    }

    .col-feed {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
    }

    .col-feed::-webkit-scrollbar { width: 4px; }
    .col-feed::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    /* ── Tweet Card ── */
    .tweet {
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .tweet:hover { background: var(--card-hover); }

    .tw-header {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px;
    }

    .tw-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      font-family: 'Syne', sans-serif;
    }

    .tw-user {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .tw-handle {
      font-size: 11px;
      color: var(--text3);
      font-weight: 400;
    }

    .tw-text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
    }

    /* ── Media ── */
    .media-wrap {
      margin-top: 9px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .media-wrap img,
    .media-wrap video {
      width: 100%;
      display: block;
      max-height: 200px;
      object-fit: cover;
    }

    .media-grid {
      display: grid;
      gap: 2px;
      margin-top: 9px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .media-grid.g2 { grid-template-columns: 1fr 1fr; }
    .media-grid.g3 { grid-template-columns: 1fr 1fr; }
    .media-grid.g3 .mi-0 { grid-column: 1 / -1; }
    .media-grid.g4 { grid-template-columns: 1fr 1fr; }
    .media-grid img,
    .media-grid video {
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
    }

    .play-wrap {
      position: relative;
      cursor: pointer;
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      transition: opacity 0.15s;
    }

    .play-wrap:hover .play-overlay { opacity: 0.8; }

    .play-circle {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex; align-items: center; justify-content: center;
    }

    .play-circle svg { margin-left: 3px; }

    /* ── Footer ── */
    .tw-footer {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 9px;
    }

    .tw-date {
      font-size: 11px;
      color: var(--text3);
      flex: 1;
    }

    .tw-btn {
      font-size: 11px;
      padding: 3px 9px;
      border: 1px solid var(--border2);
      border-radius: 20px;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }

    .tw-btn:hover {
      background: var(--accent-bg);
      color: var(--accent);
      border-color: var(--accent);
    }

    .tw-btn.copied {
      color: #22c55e;
      border-color: #22c55e;
    }

    /* ── States ── */
    .state {
      padding: 24px 16px;
      text-align: center;
      font-size: 12px;
      color: var(--text3);
    }

    .state svg {
      width: 22px; height: 22px;
      fill: var(--text3);
      display: block;
      margin: 0 auto 8px;
    }

    .spin {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="#">Le<span>360</span></a>
    <span class="nav-sep">·</span>
    <span class="nav-title">TweetDeck</span>
    <div class="nav-right">
      <div class="live-badge"><div class="live-dot"></div>Live</div>
      <button class="theme-btn" id="themeBtn">☽</button>
    </div>
  </nav>

  <div id="deck"></div>

  <script>
    // ── Theme toggle ──────────────────────────────────────────────────────
    const themeBtn = document.getElementById('themeBtn');
    themeBtn.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      themeBtn.textContent = isDark ? '☀' : '☽';
    });

    // ── Config ────────────────────────────────────────────────────────────
    const PROXIES = [
      u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
      u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`
    ];

    const sources = {
      FR:      { url: 'https://nitter.net/le360fr/rss',       label: 'Français',  handle: '@le360fr' },
      AR:      { url: 'https://nitter.net/le360ar/rss',       label: 'Arabe',     handle: '@le360ar' },
      Sport:   { url: 'https://nitter.net/le360sport/rss',    label: 'Sport',     handle: '@le360sport' },
      ES:      { url: 'https://nitter.net/le360es/rss',       label: 'Espagnol',  handle: '@le360es' },
      AFRIQUE: { url: 'https://nitter.net/le360_afrique/rss', label: 'Afrique',   handle: '@le360_afrique' }
    };

    const seen = {};
    const counts = {};

    // ── Build columns ─────────────────────────────────────────────────────
    const deck = document.getElementById('deck');
    const twitterSVG = `<svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>`;

    Object.keys(sources).forEach(k => {
      seen[k] = new Set();
      counts[k] = 0;
      const s = sources[k];
      const col = document.createElement('div');
      col.className = 'col';
      col.id = 'col-' + k;

      col.innerHTML = `
        <div class="col-head">
          <div class="col-icon">${twitterSVG}</div>
          <div>
            <div class="col-name">${s.label}</div>
            <div class="col-handle">${s.handle}</div>
          </div>
          <span class="col-count" id="cnt-${k}">0</span>
        </div>
        <div class="col-feed" id="feed-${k}">
          <div class="state"><div class="spin"></div>Chargement…</div>
        </div>`;
      deck.appendChild(col);
    });

    // ── Fetch ─────────────────────────────────────────────────────────────
    async function fetchProxy(url) {
      const bust = url + (url.includes('?') ? '&' : '?') + '_t=' + Date.now();
      for (const proxy of PROXIES) {
        try {
          const res = await fetch(proxy(bust), { signal: AbortSignal.timeout(9000) });
          if (res.ok) return await res.text();
        } catch(e) { /* try next */ }
      }
      throw new Error('All proxies failed');
    }

    // ── Parse ─────────────────────────────────────────────────────────────
    function parseMedia(html) {
      if (!html) return [];
      const d = document.createElement('div');
      d.innerHTML = html;
      const items = [];
      d.querySelectorAll('img').forEach(img => {
        const src = img.src || img.getAttribute('src') || '';
        if (src && !src.includes('/pic/static') && !src.includes('emoji')) {
          items.push({ type: 'img', src });
        }
      });
      d.querySelectorAll('video').forEach(v => {
        const src = v.src || v.querySelector('source')?.src || '';
        if (src) items.push({ type: 'video', src, poster: v.poster || '' });
      });
      return items;
    }

    function parseItems(xmlText) {
      const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
      return [...doc.querySelectorAll('item')].slice(0, 25).map(item => {
        const desc = item.querySelector('description')?.textContent || '';
        const content = (() => {
          try {
            const ns = item.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/', 'encoded');
            return ns.length ? ns[0].textContent : '';
          } catch(e) { return ''; }
        })();

        // Clean text
        const tmp = document.createElement('div');
        tmp.innerHTML = desc;
        tmp.querySelectorAll('img, video, a.attachment').forEach(el => el.remove());
        const text = tmp.textContent.trim();

        const media = parseMedia(content || desc);
        const link  = item.querySelector('link')?.textContent?.trim() || '';
        const creator = item.querySelector('creator')?.textContent || item.querySelector('author')?.textContent || '';
        const user = creator.replace(/ \(.*\)/, '').replace('@', '') || link.split('/')[3] || '';

        return {
          text, link, media, user,
          date: item.querySelector('pubDate')?.textContent || ''
        };
      });
    }

    // ── Format ────────────────────────────────────────────────────────────
    function fmtDate(d) {
      try {
        return new Date(d).toLocaleString('fr-FR', {
          day: '2-digit', month: 'short',
          hour: '2-digit', minute: '2-digit'
        });
      } catch(e) { return d; }
    }

    function initials(handle) {
      return (handle || '?').replace('@','').slice(0,2).toUpperCase();
    }

    // ── Copy button ───────────────────────────────────────────────────────
    function makeBtn(label, getText) {
      const b = document.createElement('button');
      b.className = 'tw-btn';
      b.textContent = label;
      b.addEventListener('click', e => {
        e.stopPropagation();
        navigator.clipboard.writeText(getText()).then(() => {
          b.textContent = '✓ Copié';
          b.classList.add('copied');
          setTimeout(() => {
            b.textContent = label;
            b.classList.remove('copied');
          }, 1300);
        });
      });
      return b;
    }

    // ── Media element ─────────────────────────────────────────────────────
    function makeMediaEl(m, small) {
      if (m.type === 'img') {
        const img = document.createElement('img');
        img.src = m.src;
        img.loading = 'lazy';
        img.alt = '';
        img.onerror = () => { try { img.parentElement.remove(); } catch(e) {} };
        return img;
      }

      // Video
      const wrap = document.createElement('div');
      wrap.className = 'play-wrap';

      const vid = document.createElement('video');
      vid.src = m.src;
      vid.poster = m.poster;
      vid.preload = 'none';
      vid.muted = true;
      vid.loop = true;
      vid.playsInline = true;
      if (small) { vid.style.height = '100px'; vid.style.objectFit = 'cover'; }

      const overlay = document.createElement('div');
      overlay.className = 'play-overlay';
      overlay.innerHTML = `<div class="play-circle"><svg width="11" height="13" viewBox="0 0 11 13" fill="#222"><polygon points="0,0 11,6.5 0,13"/></svg></div>`;

      let playing = false;
      wrap.addEventListener('click', e => {
        e.stopPropagation();
        if (!playing) {
          vid.controls = true;
          vid.play();
          overlay.style.display = 'none';
          playing = true;
        }
      });

      wrap.appendChild(vid);
      wrap.appendChild(overlay);
      return wrap;
    }

    // ── Tweet card ────────────────────────────────────────────────────────
    function createTweet(tw) {
      const card = document.createElement('div');
      card.className = 'tweet';

      // Header
      const header = document.createElement('div');
      header.className = 'tw-header';

      const avatar = document.createElement('div');
      avatar.className = 'tw-avatar';
      avatar.textContent = initials(tw.user);

      const meta = document.createElement('div');
      meta.innerHTML = `<div class="tw-user">${tw.user}</div><div class="tw-handle">@${tw.user}</div>`;

      header.appendChild(avatar);
      header.appendChild(meta);
      card.appendChild(header);

      // Text
      const txt = document.createElement('div');
      txt.className = 'tw-text';
      txt.textContent = tw.text;
      card.appendChild(txt);

      // Media
      const n = Math.min(tw.media.length, 4);
      if (n === 1) {
        const wrap = document.createElement('div');
        wrap.className = 'media-wrap';
        wrap.appendChild(makeMediaEl(tw.media[0], false));
        card.appendChild(wrap);
      } else if (n > 1) {
        const grid = document.createElement('div');
        grid.className = `media-grid g${n}`;
        tw.media.slice(0, n).forEach((m, i) => {
          const el = makeMediaEl(m, true);
          if (i === 0 && n === 3) el.classList ? el.classList.add('mi-0') : (el.style.gridColumn = '1 / -1');
          grid.appendChild(el);
        });
        card.appendChild(grid);
      }

      // Footer
      const footer = document.createElement('div');
      footer.className = 'tw-footer';

      const date = document.createElement('div');
      date.className = 'tw-date';
      date.textContent = fmtDate(tw.date);

      footer.appendChild(date);
      footer.appendChild(makeBtn('Lien', () => tw.link));
      footer.appendChild(makeBtn('Texte', () => tw.text));
      card.appendChild(footer);

      card.addEventListener('click', () => window.open(tw.link, '_blank'));
      return card;
    }

    // ── Load column ───────────────────────────────────────────────────────
    async function loadCol(k) {
      const { url } = sources[k];
      const feed = document.getElementById('feed-' + k);
      const cntEl = document.getElementById('cnt-' + k);

      try {
        const xml = await fetchProxy(url);
        const items = parseItems(xml);
        const fresh = items.filter(t => t.link && !seen[k].has(t.link));
        if (!fresh.length) return;

        const loader = feed.querySelector('.state');
        if (loader) loader.remove();

        const frag = document.createDocumentFragment();
        fresh.forEach(t => {
          frag.appendChild(createTweet(t));
          seen[k].add(t.link);
          counts[k]++;
        });
        feed.insertBefore(frag, feed.firstChild);
        cntEl.textContent = counts[k];

      } catch(e) {
        const loader = feed.querySelector('.state');
        if (loader) {
          loader.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>Nitter indisponible`;
        }
      }
    }

    // ── Refresh loop ──────────────────────────────────────────────────────
    async function loop() {
      await Promise.allSettled(Object.keys(sources).map(k => loadCol(k)));
      setTimeout(loop, 20000);
    }

    loop();
  </script>
</body>
</html>
