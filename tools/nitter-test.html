<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Nitter Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .tool-header, .test-box { opacity: 0; transform: translateY(12px); animation: fadeUp 0.5s ease forwards; }
    .tool-header { animation-delay: 0.05s; }
    .test-box { animation-delay: 0.1s; }
    .tool-page { max-width: 640px; }
    .test-box { padding: 24px; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
    .test-btn { padding: 12px 24px; background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; }
    .test-btn:hover { opacity: 0.88; }
    #result { margin-top: 16px; padding: 16px; background: var(--bg3); border-radius: var(--radius-sm); font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; }
    .success { color: #22c55e; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
<nav class="nav">
  <a href="../index.html" class="nav-back">← Back</a>
  <span class="nav-title">Nitter Test</span>
  <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
</nav>
<div class="tool-page">
  <div class="tool-header">
    <h1>Nitter Fetch Test</h1>
    <p>Testing CORS for nitter RSS feed</p>
  </div>
  <div class="test-box">
    <input type="text" id="username" value="le360fr" style="width:100%;padding:12px;background:var(--input-bg);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);margin-bottom:12px;" />
    <button class="test-btn" onclick="testFetch()">Test Fetch</button>
    <div id="result"></div>
  </div>
</div>
<script>
async function testFetch() {
  const u = document.getElementById('username').value.trim();
  const result = document.getElementById('result');
  result.textContent = 'Fetching...';
  result.className = '';
  
  try {
    const res = await fetch(`https://nitter.net/${u}/rss`, {
      headers: { 'User-Agent': 'Mozilla/5.0', 'Accept': 'application/rss+xml' }
    });
    const text = await res.text();
    if (text.startsWith('<?xml')) {
      result.textContent = 'SUCCESS: Account exists\n' + text.slice(0, 500);
      result.className = 'success';
    } else {
      result.textContent = 'ACCOUNT NOT FOUND (returned HTML)';
      result.className = 'error';
    }
  } catch (err) {
    result.textContent = 'ERROR: ' + err.message;
    result.className = 'error';
  }
}
testFetch();
</script>
</body>
</html>
