<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insta Post — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px;
    }
    .mode-tab {
      flex: 1;
      padding: 9px 14px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius-xs);
      transition: all .2s;
    }
    .mode-tab:hover  { color: var(--text); background: var(--bg3); }
    .mode-tab.active { background: var(--btn-bg); color: var(--btn-text); }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }

    .field textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }

    #dlWrap {
      margin-top: 16px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .25s ease, opacity .25s ease;
    }
    #dlWrap.visible { max-height: 60px; opacity: 1; }
    #dlWrap .btn    { width: 100%; margin-bottom: 0; justify-content: center; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Insta Post</span>
    <span class="nav-num">1080 × 1350</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
  </nav>

  <div class="tool-page">
    <div class="tool-header">
      <h1>Instagram Post</h1>
      <p>Visuels 1080×1350 — shadow + le360 auto, texte centré, marges 33px, mot en couleur.</p>
    </div>

    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="fr">🇫🇷 Français</button>
      <button class="mode-tab"        data-mode="ar">🇲🇦 Arabe</button>
    </div>

    <div class="notice" id="modeNotice">
      <span id="modeNoticeIcon">🇫🇷</span>&nbsp;
      <span id="modeNoticeText"><strong>Mode Français</strong> — DIN Condensed Bold, centré, marges 33px</span>
    </div>

    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">⬆</div>
      <div class="upload-text" id="uploadText">Glisser une image ici ou <span class="upload-browse">choisir un fichier</span></div>
      <input type="file" id="upload" accept="image/*" />
    </div>

    <div class="field">
      <label id="labelText">Texte</label>
      <textarea id="txtMain" placeholder="PRODUCTION CÉRÉALIÈRE: PRÈS DE 90 MILLIONS DE QUINTAUX ATTENDUS EN 2025-2026"></textarea>
    </div>

    <div class="row2">
      <div class="field">
        <label>Mot(s) en couleur <span style="color:#ff7a14">█</span></label>
        <input type="text" id="highlightWord" placeholder="ex: 90 MILLIONS" />
      </div>
      <div class="field">
        <label>Taille de police (px)</label>
        <input type="number" id="fontSize" value="107" min="20" max="300" step="1" />
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Interligne (px)</label>
        <input type="number" id="lineSpacing" value="0" min="-60" max="200" step="1" />
      </div>
      <div class="field">
        <label>Position logo Y (%)</label>
        <input type="number" id="logoY" value="0" min="-50" max="50" step="1" />
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Position texte Y (%)</label>
        <input type="number" id="textY" value="90" min="10" max="100" step="1" />
      </div>
    </div>

    <div id="dlWrap">
      <button class="btn btn-success" id="dlBtn">↓ Télécharger le post Instagram</button>
    </div>

    <div class="canvas-wrap" style="aspect-ratio:4/5; margin-top:16px;">
      <canvas id="canvas" width="1080" height="1350" style="width:100%;height:auto;display:block;"></canvas>
    </div>
  </div>

  <script>
    const W = 1080, H = 1350;
    const ORANGE = '#ff7a14';
    const MARGIN = 33;
    const TXT_W  = W - MARGIN * 2;

    const canvas        = document.getElementById('canvas');
    const ctx           = canvas.getContext('2d');
    const upload        = document.getElementById('upload');
    const dropzone      = document.getElementById('dropzone');
    const uploadText    = document.getElementById('uploadText');
    const dlWrap        = document.getElementById('dlWrap');
    const dlBtn         = document.getElementById('dlBtn');
    const txtMain       = document.getElementById('txtMain');
    const hlWordEl      = document.getElementById('highlightWord');
    const fontSizeEl    = document.getElementById('fontSize');
    const lineSpacingEl = document.getElementById('lineSpacing');
    const logoYEl       = document.getElementById('logoY');
    const textYEl       = document.getElementById('textY');
    const modeTabs      = document.getElementById('modeTabs');
    const modeNoticeIcon = document.getElementById('modeNoticeIcon');
    const modeNoticeText = document.getElementById('modeNoticeText');
    const labelText     = document.getElementById('labelText');

    let currentFile = null;
    let currentMode = 'fr';

    const MODES = {
      fr: {
        icon: '🇫🇷', label: 'Mode Français',
        desc: 'DIN Condensed Bold, centré, marges 33px',
        font: 'DINCondensedBold',
        fallback: 'Impact, Helvetica Neue, Helvetica',
        dir: 'ltr', upper: true,
        lbl: 'Texte',
        ph: 'PRODUCTION CÉRÉALIÈRE: PRÈS DE 90 MILLIONS DE QUINTAUX ATTENDUS EN 2025-2026',
      },
      ar: {
        icon: '🇲🇦', label: 'Mode Arabe',
        desc: 'Somar Bold, centré, marges 33px',
        font: 'SomarBold',
        fallback: 'Arial',
        dir: 'rtl', upper: false,
        lbl: 'النص',
        ph: 'مندوبية التخطيط: أسعار الخضر والمحروقات ارتفعت بأزيد من 9% في شهر واحد',
      },
    };

    // ── Fonts ────────────────────────────────────────────────────────────────
    async function loadFonts() {
      const list = [
        { name: 'DINCondensedBold', url: '../fonts/DINCondensed-Bold.ttf' },
        { name: 'SomarBold',        url: '../fonts/Somar-Bold.otf' },
      ];
      for (const { name, url } of list) {
        try {
          const f = new FontFace(name, `url(${url})`);
          await f.load();
          document.fonts.add(f);
        } catch(e) { console.warn('Font not loaded:', name); }
      }
    }
    const fontsReady = loadFonts();

    // ── Image helpers ────────────────────────────────────────────────────────
    function loadImg(src) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => res(img);
        img.onerror = () => rej(new Error('Cannot load: ' + src));
        img.src = src;
      });
    }

    const imgCache = {};
    function getCached(key, src) {
      if (!imgCache[key]) {
        imgCache[key] = loadImg(src).catch(err => {
          delete imgCache[key];
          return Promise.reject(err);
        });
      }
      return imgCache[key];
    }
    getCached('shadow', '../assets/overlays/shadow.png').catch(() => {});
    getCached('logo',   '../assets/overlays/le360.png').catch(() => {});

    // ── Word-wrap ────────────────────────────────────────────────────────────
    function wrapText(text, maxW) {
      const words = text.split(' ');
      const lines = [];
      let line = '';
      for (const word of words) {
        const candidate = line ? line + ' ' + word : word;
        if (ctx.measureText(candidate).width <= maxW) {
          line = candidate;
        } else {
          if (line) lines.push(line);
          line = word;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    // ── Draw ─────────────────────────────────────────────────────────────────
    async function draw() {
      if (!currentFile) { updateDlBtn(); return; }

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      const bg    = await loadImg(URL.createObjectURL(currentFile));
      const scale = Math.max(W / bg.width, H / bg.height);
      ctx.drawImage(bg, (W - bg.width * scale) / 2, (H - bg.height * scale) / 2, bg.width * scale, bg.height * scale);

      try {
        const sh = await getCached('shadow', '../assets/overlays/shadow.png');
        ctx.drawImage(sh, 0, 0, W, H);
      } catch(_) {
        const g = ctx.createLinearGradient(0, H * 0.4, 0, H);
        g.addColorStop(0,   'rgba(0,0,0,0)');
        g.addColorStop(0.4, 'rgba(0,0,0,0.65)');
        g.addColorStop(1,   'rgba(0,0,0,0.92)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }

      const logoOffsetY = (parseFloat(logoYEl.value) || 0) / 100 * H;
      try {
        const logo = await getCached('logo', '../assets/overlays/le360.png');
        ctx.drawImage(logo, 0, logoOffsetY, W, H);
      } catch(_) {
        ctx.save();
        ctx.font = 'bold 38px Arial';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.direction = 'ltr';
        ctx.fillText('le360', W / 2, H * 0.775 + logoOffsetY);
        ctx.restore();
      }

      await fontsReady;
      drawText();
      updateDlBtn();
    }

    // ── Text ─────────────────────────────────────────────────────────────────
    function drawText() {
      const cfg  = MODES[currentMode];
      const raw  = txtMain.value.trim();
      if (!raw) return;

      const text    = cfg.upper ? raw.toUpperCase() : raw;
      const hlRaw   = hlWordEl.value.trim();
      const hl      = hlRaw ? (cfg.upper ? hlRaw.toUpperCase() : hlRaw) : '';
      const px      = Math.max(20, parseInt(fontSizeEl.value, 10) || 107);
      const spacing = parseInt(lineSpacingEl.value, 10) || 0;
      const lineH   = Math.round(px * 1.16) + spacing;
      const fontStr = `normal ${px}px ${cfg.font}, ${cfg.fallback}`;

      ctx.save();
      ctx.font      = fontStr;
      ctx.direction = 'ltr';
      ctx.textAlign = 'center';

      const lines  = wrapText(text, TXT_W);
      const anchorY = H * ((parseFloat(textYEl.value) || 90) / 100);
      const startY  = anchorY - lines.length * lineH + lineH;

      lines.forEach((line, i) => {
        const y = startY + i * lineH;
        if (hl) {
          drawHighlightedLine(line, hl, W / 2, y, fontStr);
        } else {
          withShadow(() => {
            ctx.fillStyle = '#fff';
            ctx.fillText(line, W / 2, y);
          });
        }
      });

      ctx.restore();
    }

    // ── Highlighted line ─────────────────────────────────────────────────────
    // Render using an off-screen canvas with direction=rtl so the browser
    // lays out the Arabic text natively. Then scan pixel columns to find
    // where the highlight word starts, and redraw that region in orange.
    //
    // For LTR: use the same word-by-word approach as before (reliable).
    // For RTL: draw white on offscreen with direction=rtl, then draw
    //          the highlight word alone on a second offscreen with direction=rtl
    //          and use its actualBoundingBox to find its position in the full line.
    function drawHighlightedLine(line, hl, cx, y, fontStr) {
      ctx.font      = fontStr;
      ctx.direction = 'ltr';
      ctx.textAlign = 'center';

      const isRTL = MODES[currentMode].dir === 'rtl';

      if (!isRTL) {
        // ── LTR: word-by-word ──────────────────────────────────────────────
        ctx.textAlign = 'left';
        const words  = line.split(' ');
        const spaceW = ctx.measureText(' ').width;
        const widths = words.map(w => ctx.measureText(w).width);
        const totalW = widths.reduce((s, w) => s + w, 0) + spaceW * (words.length - 1);
        let x = cx - totalW / 2;
        for (let i = 0; i < words.length; i++) {
          const isHL = hl && words[i] === hl;
          withShadow(() => {
            ctx.fillStyle = isHL ? ORANGE : '#fff';
            ctx.fillText(words[i], x, y);
          });
          x += widths[i] + spaceW;
        }
      } else {
        // ── RTL: draw white line, then overdraw highlight word ─────────────
        // Step 1: draw full line in white (browser handles RTL word order)
        withShadow(() => {
          ctx.fillStyle = '#fff';
          ctx.fillText(line, cx, y);
        });

        if (!hl || line.indexOf(hl) === -1) return;

        // Step 2: use an offscreen canvas with direction=rtl to measure
        // where the highlight word lands within the full line.
        const os  = document.createElement('canvas');
        os.width  = W; os.height = 1;
        const oc  = os.getContext('2d');
        oc.font      = fontStr;
        oc.direction = 'rtl';
        oc.textAlign = 'center';

        // measureText on the full line with rtl gives us the total width
        const fullW = oc.measureText(line).width;
        const hlW   = oc.measureText(hl).width;

        // Build prefix: in RTL the string is rendered right-to-left,
        // so "prefix" = text that appears to the RIGHT of our word.
        // That's everything BEFORE hl in the string (lower char indices).
        const hlCharIdx = line.indexOf(hl);
        const before    = line.slice(0, hlCharIdx).trimEnd(); // text right of hl visually
        const after     = line.slice(hlCharIdx + hl.length).trimStart(); // text left of hl visually

        const beforeW = before.length ? oc.measureText(before).width + oc.measureText(' ').width : 0;
        const afterW  = after.length  ? oc.measureText(after).width  + oc.measureText(' ').width : 0;

        // In RTL with textAlign=center anchored at cx:
        // block right edge = cx + fullW/2
        // word right edge  = blockRight - beforeW   (before is to the right)
        // word center      = wordRight - hlW/2
        const blockRight = cx + fullW / 2;
        const hlCx       = blockRight - beforeW - hlW / 2;

        ctx.textAlign = 'center';
        withShadow(() => {
          ctx.fillStyle = ORANGE;
          ctx.fillText(hl, hlCx, y);
        });
      }
    }

    function withShadow(fn) {
      ctx.shadowColor   = 'rgba(0,0,0,0.85)';
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 3;
      ctx.shadowBlur    = 14;
      fn();
      ctx.shadowColor   = 'transparent';
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.shadowBlur    = 0;
    }

    // ── Mode ─────────────────────────────────────────────────────────────────
    function setMode(mode) {
      currentMode = mode;
      const cfg   = MODES[mode];
      document.querySelectorAll('.mode-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.mode === mode)
      );
      modeNoticeIcon.textContent = cfg.icon;
      modeNoticeText.innerHTML   = `<strong>${cfg.label}</strong> — ${cfg.desc}`;
      labelText.textContent      = cfg.lbl;
      txtMain.placeholder        = cfg.ph;
      txtMain.dir                = cfg.dir;
      hlWordEl.dir               = cfg.dir;
      dlWrap.classList.remove('visible');
      draw();
    }

    function updateDlBtn() {
      dlWrap.classList.toggle('visible', !!(currentFile && txtMain.value.trim()));
    }

    // ── Download ─────────────────────────────────────────────────────────────
    dlBtn.addEventListener('click', () => {
      try {
        const now = new Date();
        const ts  = now.getFullYear()
          + String(now.getMonth()+1).padStart(2,'0')
          + String(now.getDate()).padStart(2,'0')
          + '_' + String(now.getHours()).padStart(2,'0')
          + String(now.getMinutes()).padStart(2,'0')
          + String(now.getSeconds()).padStart(2,'0');
        const a   = document.createElement('a');
        a.href     = canvas.toDataURL('image/jpeg', 0.94);
        a.download = `insta_post_${currentMode}_${ts}.jpeg`;
        a.click();
      } catch(e) { alert('Erreur : ' + e.message); }
    });

    // ── Events ───────────────────────────────────────────────────────────────
    modeTabs.addEventListener('click', e => {
      const tab = e.target.closest('.mode-tab');
      if (tab) setMode(tab.dataset.mode);
    });

    dropzone.addEventListener('click',    () => upload.click());
    dropzone.addEventListener('dragover', e  => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave',() => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) enableFile(e.dataTransfer.files[0]);
    });
    upload.addEventListener('change', () => { if (upload.files[0]) enableFile(upload.files[0]); });

    function enableFile(file) {
      currentFile = file;
      dropzone.classList.add('has-file');
      uploadText.textContent = '✓ ' + file.name;
      draw();
    }

    txtMain.addEventListener('input',       draw);
    hlWordEl.addEventListener('input',      draw);
    fontSizeEl.addEventListener('input',    draw);
    lineSpacingEl.addEventListener('input', draw);
    logoYEl.addEventListener('input',       draw);
    textYEl.addEventListener('input',       draw);

    setMode('fr');
  </script>
</body>
</html>
