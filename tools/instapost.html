<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le360 Post — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px;
    }
    .mode-tab {
      flex: 1;
      padding: 9px 14px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius-xs);
      transition: all .2s;
    }
    .mode-tab:hover  { color: var(--text); background: var(--bg3); }
    .mode-tab.active { background: var(--btn-bg); color: var(--btn-text); }

    .field textarea {
      resize: vertical;
      min-height: 80px;
      line-height: 1.5;
    }

    /* ── Slider rows — follow global.css design system ── */
    .srow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .srow label {
      width: 130px;
      flex-shrink: 0;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text2);
    }
    .srow .sval {
      width: 54px;
      flex-shrink: 0;
      text-align: right;
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      color: var(--text3);
    }
    .srow-group-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* Range input — accent track + thumb, matches theme */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      min-width: 0;
      height: 4px;
      border-radius: 100px;
      background: var(--border2);
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 1px var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
    }
    input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.15); }
    input[type=range]:hover::-moz-range-thumb     { transform: scale(1.15); }
    input[type=range]:focus { outline: none; }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 480px) { .row2 { grid-template-columns: 1fr; } }

    /* ── Two-column editor layout ── */
    .editor-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 28px;
      align-items: start;
      padding: 28px 24px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .editor-controls {
      min-width: 0;
    }

    .editor-preview {
      position: sticky;
      top: 73px;
      min-width: 0;
    }

    #dlWrap {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .35s ease, opacity .35s ease;
      margin-top: 12px;
    }
    #dlWrap.visible { max-height: 60px; opacity: 1; }
    #dlWrap .btn    { width: 100%; margin-bottom: 0; justify-content: center; }

    @media (max-width: 860px) {
      .editor-layout {
        grid-template-columns: 1fr;
        padding: 20px 16px 60px;
      }
      .editor-preview {
        position: static;
        order: -1;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Le360 Post</span>
    <span class="nav-num">1080 × 1350</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
  </nav>

  <div class="tool-page wide">
    <div style="padding: 28px 24px 0; max-width: 1200px; margin: 0 auto;">
      <div class="tool-header" style="margin-bottom:20px;">
        <h1>Le360 Post</h1>
        <p>1080×1350 visuals — shadow + le360 auto, centered text, 33px margins, word in color.</p>
      </div>

      <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="fr">🇫🇷 French</button>
      <button class="mode-tab"        data-mode="ar">🇲🇦 Arabic</button>
    </div>

    <div class="notice" id="modeNotice">
      <span id="modeNoticeIcon">🇫🇷</span>&nbsp;
      <span id="modeNoticeText"><strong>French Mode</strong> — DIN Condensed Bold, centered</span>
    </div>
    </div><!-- /top section -->

    <div class="editor-layout">
    <div class="editor-controls">

    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">⬆</div>
      <div class="upload-text" id="uploadText">Drag an image here or <span class="upload-browse">choose a file</span></div>
      <input type="file" id="upload" accept="image/*" />
    </div>

    <div class="field">
      <label id="labelText">Text</label>
      <textarea id="txtMain" placeholder="GRAIN PRODUCTION: NEARLY 90 MILLION QUINTALS EXPECTED IN 2025-2026"></textarea>
    </div>

    <div class="row2">
      <div class="field">
        <label>Highlighted word(s) <span style="color:#ff7a14">█</span></label>
        <input type="text" id="highlightWord" placeholder="e.g. 90 MILLION" />
      </div>
    </div>

    <p class="srow-group-title">Text</p>

    <div class="srow">
      <label>Font size</label>
      <input type="range" id="fontSize" min="20" max="300" step="1" value="107" />
      <span class="sval" id="fontSizeVal">107 px</span>
    </div>
    <div class="srow">
      <label>Line spacing</label>
      <input type="range" id="lineSpacing" min="-60" max="200" step="1" value="0" />
      <span class="sval" id="lineSpacingVal">0 px</span>
    </div>
    <div class="srow">
      <label>Text Y position</label>
      <input type="range" id="textY" min="10" max="100" step="1" value="90" />
      <span class="sval" id="textYVal">90 %</span>
    </div>

    <p class="srow-group-title">Logo</p>

    <div class="srow">
      <label>Logo Y position</label>
      <input type="range" id="logoY" min="-50" max="50" step="1" value="0" />
      <span class="sval" id="logoYVal">0 %</span>
    </div>

    <p class="srow-group-title">Image</p>

    <div class="srow">
      <label>Zoom</label>
      <input type="range" id="imgZoom" min="50" max="300" step="1" value="100" />
      <span class="sval" id="imgZoomVal">100 %</span>
    </div>
    <div class="srow">
      <label>X offset</label>
      <input type="range" id="imgX" min="-540" max="540" step="1" value="0" />
      <span class="sval" id="imgXVal">0 px</span>
    </div>
    <div class="srow">
      <label>Y offset</label>
      <input type="range" id="imgY" min="-675" max="675" step="1" value="0" />
      <span class="sval" id="imgYVal">0 px</span>
    </div>
    <div style="margin-bottom:16px;">
      <button class="btn" id="resetImg" style="width:100%;justify-content:center;">↺ Reset image</button>
    </div>

    </div><!-- /editor-controls -->

    <div class="editor-preview">
      <div class="canvas-wrap" style="aspect-ratio:4/5;">
        <canvas id="canvas" width="1080" height="1350" style="width:100%;height:auto;display:block;"></canvas>
      </div>
      <div id="dlWrap">
        <button class="btn btn-success" id="dlBtn">↓ Download Instagram post</button>
      </div>
    </div><!-- /editor-preview -->

    </div><!-- /editor-layout -->
  </div>

  <script>
    const W = 1080, H = 1350;
    const ORANGE = '#ff7a14';
    const MARGIN = 33;
    const TXT_W  = W - MARGIN * 2;

    const canvas        = document.getElementById('canvas');
    const ctx           = canvas.getContext('2d');
    const upload        = document.getElementById('upload');
    const dropzone      = document.getElementById('dropzone');
    const uploadText    = document.getElementById('uploadText');
    const dlWrap        = document.getElementById('dlWrap');
    const dlBtn         = document.getElementById('dlBtn');
    const txtMain       = document.getElementById('txtMain');
    const hlWordEl      = document.getElementById('highlightWord');
    const fontSizeEl    = document.getElementById('fontSize');
    const lineSpacingEl = document.getElementById('lineSpacing');
    const logoYEl       = document.getElementById('logoY');
    const textYEl       = document.getElementById('textY');
    const imgZoomEl      = document.getElementById('imgZoom');
    const imgXEl         = document.getElementById('imgX');
    const imgYEl         = document.getElementById('imgY');
    const resetImgBtn    = document.getElementById('resetImg');
    const modeTabs       = document.getElementById('modeTabs');
    const modeNoticeIcon = document.getElementById('modeNoticeIcon');
    const modeNoticeText = document.getElementById('modeNoticeText');
    const labelText      = document.getElementById('labelText');

    let currentFile = null;
    let currentMode = 'fr';

    const MODES = {
      fr: {
        icon: '🇫🇷', label: 'French Mode',
        desc: 'DIN Condensed Bold, centered, 33px margins',
        font: 'DINCondensedBold',
        fallback: 'Impact, Helvetica Neue, Helvetica',
        dir: 'ltr', upper: true,
        lbl: 'Text',
        ph: 'GRAIN PRODUCTION: NEARLY 90 MILLION QUINTALS EXPECTED IN 2025-2026',
      },
      ar: {
        icon: '🇲🇦', label: 'Arabic Mode',
        desc: 'Somar Bold, centered',
        font: 'SomarBold',
        fallback: 'Arial',
        dir: 'rtl', upper: false,
        lbl: 'Text',
        ph: 'مندوبية التخطيط: أسعار الخضر والمحروقات ارتفعت بأزيد من 9% في شهر واحد',
      },
    };

    // ── Fonts ────────────────────────────────────────────────────────────────
    async function loadFonts() {
      const list = [
        { name: 'DINCondensedBold', url: '../fonts/DINCondensed-Bold.ttf' },
        { name: 'SomarBold',        url: '../fonts/Somar-Bold.otf' },
      ];
      for (const { name, url } of list) {
        try {
          const f = new FontFace(name, `url(${url})`);
          await f.load();
          document.fonts.add(f);
        } catch(e) { console.warn('Font not loaded:', name); }
      }
    }
    const fontsReady = loadFonts();

    // ── Image helpers ────────────────────────────────────────────────────────
    function loadImg(src) {
      return new Promise((res, rej) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => res(img);
        img.onerror = () => rej(new Error('Cannot load: ' + src));
        img.src = src;
      });
    }

    const imgCache = {};
    function getCached(key, src) {
      if (!imgCache[key]) {
        imgCache[key] = loadImg(src).catch(err => {
          delete imgCache[key];
          return Promise.reject(err);
        });
      }
      return imgCache[key];
    }
    getCached('shadow', '../assets/overlays/shadow.png').catch(() => {});
    getCached('logo',   '../assets/overlays/le360.png').catch(() => {});

    // ── Word-wrap ────────────────────────────────────────────────────────────
    function wrapText(text, maxW) {
      const words = text.split(' ');
      const lines = [];
      let line = '';
      for (const word of words) {
        const candidate = line ? line + ' ' + word : word;
        if (ctx.measureText(candidate).width <= maxW) {
          line = candidate;
        } else {
          if (line) lines.push(line);
          line = word;
        }
      }
      if (line) lines.push(line);
      return lines;
    }

    // ── Draw ─────────────────────────────────────────────────────────────────
    async function draw() {
      if (!currentFile) { updateDlBtn(); return; }

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      const bg       = await loadImg(URL.createObjectURL(currentFile));
      const baseScale = Math.max(W / bg.width, H / bg.height);
      const zoom      = (parseFloat(imgZoomEl.value) || 100) / 100;
      const scale     = baseScale * zoom;
      const offsetX   = parseFloat(imgXEl.value) || 0;
      const offsetY   = parseFloat(imgYEl.value) || 0;
      const drawW     = bg.width  * scale;
      const drawH     = bg.height * scale;
      ctx.drawImage(bg, (W - drawW) / 2 + offsetX, (H - drawH) / 2 + offsetY, drawW, drawH);

      try {
        const sh = await getCached('shadow', '../assets/overlays/shadow.png');
        ctx.drawImage(sh, 0, 0, W, H);
      } catch(_) {
        const g = ctx.createLinearGradient(0, H * 0.4, 0, H);
        g.addColorStop(0,   'rgba(0,0,0,0)');
        g.addColorStop(0.4, 'rgba(0,0,0,0.65)');
        g.addColorStop(1,   'rgba(0,0,0,0.92)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }

      const logoOffsetY = (parseFloat(logoYEl.value) || 0) / 100 * H;
      try {
        const logo = await getCached('logo', '../assets/overlays/le360.png');
        ctx.drawImage(logo, 0, logoOffsetY, W, H);
      } catch(_) {
        ctx.save();
        ctx.font = 'bold 38px Arial';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.direction = 'ltr';
        ctx.fillText('le360', W / 2, H * 0.775 + logoOffsetY);
        ctx.restore();
      }

      await fontsReady;
      drawText();
      updateDlBtn();
    }

    // ── Text ─────────────────────────────────────────────────────────────────
    function drawText() {
      const cfg  = MODES[currentMode];
      const raw  = txtMain.value.trim();
      if (!raw) return;

      const text    = cfg.upper ? raw.toUpperCase() : raw;
      const hlRaw   = hlWordEl.value.trim();
      const hl      = hlRaw ? (cfg.upper ? hlRaw.toUpperCase() : hlRaw) : '';
      const px      = Math.max(20, parseInt(fontSizeEl.value, 10) || 107);
      const spacing = parseInt(lineSpacingEl.value, 10) || 0;
      const lineH   = Math.round(px * 1.16) + spacing;
      const fontStr = `normal ${px}px ${cfg.font}, ${cfg.fallback}`;

      ctx.save();
      ctx.font      = fontStr;
      ctx.direction = 'ltr';
      ctx.textAlign = 'center';

      const lines  = wrapText(text, TXT_W);
      const anchorY = H * ((parseFloat(textYEl.value) || 90) / 100);
      const startY  = anchorY - lines.length * lineH + lineH;

      lines.forEach((line, i) => {
        const y = startY + i * lineH;
        if (hl) {
          drawHighlightedLine(line, hl, W / 2, y, fontStr);
        } else {
          withShadow(() => {
            ctx.fillStyle = '#fff';
            ctx.fillText(line, W / 2, y);
          });
        }
      });

      ctx.restore();
    }

    // ── Highlighted line ─────────────────────────────────────────────────────
    function drawHighlightedLine(line, hl, cx, y, fontStr) {
      ctx.font      = fontStr;
      ctx.direction = 'ltr';
      ctx.textAlign = 'center';

      const isRTL = MODES[currentMode].dir === 'rtl';

      if (!isRTL) {
        ctx.textAlign = 'left';
        const words  = line.split(' ');
        const spaceW = ctx.measureText(' ').width;
        const widths = words.map(w => ctx.measureText(w).width);
        const totalW = widths.reduce((s, w) => s + w, 0) + spaceW * (words.length - 1);
        let x = cx - totalW / 2;
        for (let i = 0; i < words.length; i++) {
          const isHL = hl && words[i] === hl;
          withShadow(() => {
            ctx.fillStyle = isHL ? ORANGE : '#fff';
            ctx.fillText(words[i], x, y);
          });
          x += widths[i] + spaceW;
        }
      } else {
        withShadow(() => {
          ctx.fillStyle = '#fff';
          ctx.fillText(line, cx, y);
        });

        if (!hl || line.indexOf(hl) === -1) return;

        const os  = document.createElement('canvas');
        os.width  = W; os.height = 1;
        const oc  = os.getContext('2d');
        oc.font      = fontStr;
        oc.direction = 'rtl';
        oc.textAlign = 'center';

        const fullW = oc.measureText(line).width;
        const hlW   = oc.measureText(hl).width;

        const hlCharIdx = line.indexOf(hl);
        const before    = line.slice(0, hlCharIdx).trimEnd();
        const after     = line.slice(hlCharIdx + hl.length).trimStart();

        const beforeW = before.length ? oc.measureText(before).width + oc.measureText(' ').width : 0;
        const afterW  = after.length  ? oc.measureText(after).width  + oc.measureText(' ').width : 0;

        const blockRight = cx + fullW / 2;
        const hlCx       = blockRight - beforeW - hlW / 2;

        ctx.textAlign = 'center';
        withShadow(() => {
          ctx.fillStyle = ORANGE;
          ctx.fillText(hl, hlCx, y);
        });
      }
    }

    function withShadow(fn) {
      ctx.shadowColor   = 'rgba(0,0,0,0.85)';
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 3;
      ctx.shadowBlur    = 14;
      fn();
      ctx.shadowColor   = 'transparent';
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.shadowBlur    = 0;
    }

    // ── Mode ─────────────────────────────────────────────────────────────────
    function setMode(mode) {
      currentMode = mode;
      const cfg   = MODES[mode];
      document.querySelectorAll('.mode-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.mode === mode)
      );
      modeNoticeIcon.textContent = cfg.icon;
      modeNoticeText.innerHTML   = `<strong>${cfg.label}</strong> — ${cfg.desc}`;
      labelText.textContent      = cfg.lbl;
      txtMain.placeholder        = cfg.ph;
      txtMain.dir                = cfg.dir;
      hlWordEl.dir               = cfg.dir;
      dlWrap.classList.remove('visible');
      draw();
    }

    function updateDlBtn() {
      dlWrap.classList.toggle('visible', !!(currentFile && txtMain.value.trim()));
    }

    // ── Download ─────────────────────────────────────────────────────────────
    dlBtn.addEventListener('click', () => {
      try {
        const now = new Date();
        const ts  = now.getFullYear()
          + String(now.getMonth()+1).padStart(2,'0')
          + String(now.getDate()).padStart(2,'0')
          + '_' + String(now.getHours()).padStart(2,'0')
          + String(now.getMinutes()).padStart(2,'0')
          + String(now.getSeconds()).padStart(2,'0');
        const a   = document.createElement('a');
        a.href     = canvas.toDataURL('image/jpeg', 0.94);
        a.download = `insta_post_${currentMode}_${ts}.jpeg`;
        a.click();
      } catch(e) { alert('Error: ' + e.message); }
    });

    // ── Events ───────────────────────────────────────────────────────────────
    modeTabs.addEventListener('click', e => {
      const tab = e.target.closest('.mode-tab');
      if (tab) setMode(tab.dataset.mode);
    });

    dropzone.addEventListener('click',    () => upload.click());
    dropzone.addEventListener('dragover', e  => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave',() => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) enableFile(e.dataTransfer.files[0]);
    });
    upload.addEventListener('change', () => { if (upload.files[0]) enableFile(upload.files[0]); });

    function enableFile(file) {
      currentFile = file;
      dropzone.classList.add('has-file');
      uploadText.textContent = '✓ ' + file.name;
      draw();
    }

    txtMain.addEventListener('input',       draw);
    hlWordEl.addEventListener('input',      draw);
    fontSizeEl.addEventListener('input',    draw);
    lineSpacingEl.addEventListener('input', draw);
    logoYEl.addEventListener('input',       draw);
    textYEl.addEventListener('input',       draw);
    imgZoomEl.addEventListener('input',     draw);
    imgXEl.addEventListener('input',        draw);
    imgYEl.addEventListener('input',        draw);

    resetImgBtn.addEventListener('click', () => {
      imgZoomEl.value = 100;
      imgXEl.value    = 0;
      imgYEl.value    = 0;
      document.getElementById('imgZoomVal').textContent = '100 %';
      document.getElementById('imgXVal').textContent    = '0 px';
      document.getElementById('imgYVal').textContent    = '0 px';
      draw();
    });

    // ── Slider live readouts ─────────────────────────────────────────────────
    const sliders = [
      { el: fontSizeEl,    out: document.getElementById('fontSizeVal'),    unit: ' px' },
      { el: lineSpacingEl, out: document.getElementById('lineSpacingVal'), unit: ' px' },
      { el: textYEl,       out: document.getElementById('textYVal'),       unit: ' %'  },
      { el: logoYEl,       out: document.getElementById('logoYVal'),       unit: ' %'  },
      { el: imgZoomEl,     out: document.getElementById('imgZoomVal'),     unit: ' %'  },
      { el: imgXEl,        out: document.getElementById('imgXVal'),        unit: ' px' },
      { el: imgYEl,        out: document.getElementById('imgYVal'),        unit: ' px' },
    ];
    sliders.forEach(({ el, out, unit }) => {
      const sync = () => { out.textContent = el.value + unit; };
      sync();
      el.addEventListener('input', sync);
    });

    setMode('fr');
  </script>
</body>
</html>
