<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Cover — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
  (function() {
    var STORAGE_KEY = "mts-theme";
    var theme = localStorage.getItem(STORAGE_KEY);
    if (!theme) {
      theme = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
    }
    document.documentElement.setAttribute("data-theme", theme);
  })();
</script>
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px;
      flex-wrap: wrap;
    }
    .mode-tab {
      flex: 1;
      min-width: 100px;
      padding: 9px 14px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius-xs);
      transition: all .2s;
    }
    .mode-tab:hover { color: var(--text); background: var(--bg3); }
    .mode-tab.active { background: var(--btn-bg); color: var(--btn-text); }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .tool-header, .mode-tabs, .notice, .upload-zone, .field, .field:nth-of-type(1), .field:nth-of-type(2) {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header { animation-delay: 0.05s; }
    .mode-tabs { animation-delay: 0.1s; }
    .notice { animation-delay: 0.15s; }
    .upload-zone { animation-delay: 0.2s; }
    .field:nth-of-type(1) { animation-delay: 0.25s; }
    .field:nth-of-type(2) { animation-delay: 0.3s; }

    @media (max-width: 480px) {
      .fields-grid { grid-template-columns: 1fr; }
      .mode-tabs { gap: 4px; }
      .mode-tab { font-size: 0.68rem; padding: 8px 10px; }
    }

    #dlWrap {
      margin-top: 16px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .25s ease, opacity .25s ease;
    }
    #dlWrap.visible { max-height: 60px; opacity: 1; }
    #dlWrap .btn { width: 100%; margin-bottom: 0; justify-content: center; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:var(--accent); border-radius:50%; cursor:pointer; border:2px solid var(--bg); box-shadow:0 1px 4px rgba(0,0,0,0.3); }
    input[type="range"]::-moz-range-thumb { width:18px; height:18px; background:var(--accent); border-radius:50%; cursor:pointer; border:2px solid var(--bg); box-shadow:0 1px 4px rgba(0,0,0,0.3); }
    .canvas-wrap { position: relative; user-select: none; -webkit-user-select: none; }
    .canvas-wrap canvas { touch-action: none; }
    .drag-hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text3);
      background: var(--bg2);
      padding: 4px 12px;
      border-radius: var(--radius-xs);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 2;
    }
    .canvas-wrap:hover .drag-hint { opacity: 1; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">YT Cover</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">○</span></button>
  </nav>

  <div class="tool-page">
    <div class="tool-header">
      <h1>YouTube Cover</h1>
      <p>Generate 1920×1080 thumbnails — French, Arabic, Footix, Sport or Website crop.</p>
    </div>

    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="fr">🇫🇷 Français</button>
      <button class="mode-tab" data-mode="ar">🇲🇦 Arabic</button>
      <button class="mode-tab" data-mode="footix">⚽ Footix</button>
      <button class="mode-tab" data-mode="sport">🏆 Sport</button>
      <button class="mode-tab" data-mode="website">🌐 Website</button>
      <button class="mode-tab" data-mode="africa">🌍 Africa</button>
    </div>

    <div class="notice" id="modeNotice">
      <span id="modeNoticeIcon">🇫🇷</span>&nbsp;
      <span id="modeNoticeText"><strong>French Mode</strong> — 2 lines, left-aligned</span>
    </div>

    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">⬆</div>
      <div class="upload-text" id="uploadText">Drag an image here or <span class="upload-browse">choose a file</span></div>
      <input type="file" id="upload" accept="image/*" />
    </div>

    <div class="fields-grid" id="fieldsGrid">
      <div class="field">
        <label id="label1">Line 1</label>
        <input type="text" id="txt1" placeholder="MAIN TITLE" />
      </div>
      <div class="field">
        <label id="label2">Line 2</label>
        <input type="text" id="txt2" placeholder="SUBTITLE" />
      </div>
    </div>

    <div class="field" id="countryWrap" style="display:none; margin-top:12px;">
      <label>Country Name</label>
      <select id="countrySelect">
        <option value="">— Select a country —</option>
        <option value="../assets/overlays/acontries/burkinafaso.png">🇧🇫 Burkina Faso</option>
        <option value="../assets/overlays/acontries/cameroun.png">🇨🇲 Cameroun</option>
        <option value="../assets/overlays/acontries/coteivoire.png">🇨🇮 Côte d'Ivoire</option>
        <option value="../assets/overlays/acontries/gabon.png">🇬🇦 Gabon</option>
        <option value="../assets/overlays/acontries/guinee.png">🇬🇳 Guinée</option>
        <option value="../assets/overlays/acontries/mali.png">🇲🇱 Mali</option>
        <option value="../assets/overlays/acontries/mauritanie.png">🇲🇷 Mauritanie</option>
        <option value="../assets/overlays/acontries/niger.png">🇳🇪 Niger</option>
        <option value="../assets/overlays/acontries/rdcongo.png">🇨🇩 RD Congo</option>
        <option value="../assets/overlays/acontries/rwanda.png">🇷🇼 Rwanda</option>
        <option value="../assets/overlays/acontries/senegal.png">🇸🇳 Sénégal</option>
      </select>
    </div>

    <div id="dlWrap">
      <button class="btn btn-success" id="dlBtn">↓ Download</button>
    </div>

    <div class="canvas-wrap" style="aspect-ratio:16/9; margin-top:16px;">
      <canvas id="canvas" width="1920" height="1080" style="width:100%;height:auto;display:block;"></canvas>
      <div class="drag-hint" id="dragHint">Scroll/pinch to zoom · Drag to reposition</div>
    </div>

    <div class="field" style="margin-top:12px;">
      <label>Zoom</label>
      <div style="display:flex;align-items:center;gap:12px;">
        <input type="range" id="zoomSlider" min="1" max="300" value="100" style="flex:1;height:6px;-webkit-appearance:none;appearance:none;background:var(--border2);border-radius:10px;outline:none;">
        <span id="zoomValue" style="font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--accent);min-width:40px;text-align:right;">100%</span>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
      <div class="field">
        <label>Position X</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="range" id="posXSlider" min="-100" max="100" value="0" style="flex:1;height:6px;-webkit-appearance:none;appearance:none;background:var(--border2);border-radius:10px;outline:none;">
          <span id="posXValue" style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text2);min-width:30px;text-align:right;">0</span>
        </div>
      </div>
      <div class="field">
        <label>Position Y</label>
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="range" id="posYSlider" min="-100" max="100" value="0" style="flex:1;height:6px;-webkit-appearance:none;appearance:none;background:var(--border2);border-radius:10px;outline:none;">
          <span id="posYValue" style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--text2);min-width:30px;text-align:right;">0</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const upload         = document.getElementById('upload');
    const canvas         = document.getElementById('canvas');
    const ctx            = canvas.getContext('2d');
    const dlWrap         = document.getElementById('dlWrap');
    const dlBtn          = document.getElementById('dlBtn');
    const txt1El         = document.getElementById('txt1');
    const txt2El         = document.getElementById('txt2');
    const dropzone       = document.getElementById('dropzone');
    const uploadText     = document.getElementById('uploadText');
    const modeTabs       = document.getElementById('modeTabs');
    const modeNoticeIcon = document.getElementById('modeNoticeIcon');
    const modeNoticeText = document.getElementById('modeNoticeText');
    const fieldsGrid     = document.getElementById('fieldsGrid');
    const label1         = document.getElementById('label1');
    const label2         = document.getElementById('label2');
    const countryWrap    = document.getElementById('countryWrap');
    const countrySelect  = document.getElementById('countrySelect');

    const W = 1920, H = 1080;
    let currentFile = null;
    let currentMode = 'fr';
    let loadedImg = null;
    let imgW = 0, imgH = 0;
    let imgOffsetX = 0, imgOffsetY = 0;
    let imgZoom = 1;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragOffsetStartX = 0, dragOffsetStartY = 0;
    let isPinching = false;
    let pinchStartDist = 0;
    let pinchStartZoom = 1;

    const MODES = {
      fr: {
        icon: '🇫🇷', label: 'French Mode',
        desc: '2 lines, left-aligned',
        overlay: '../assets/overlays/FR.png',
        showText: true, dir: 'ltr',
        l1: 'Line 1', l2: 'Line 2',
        ph1: 'MAIN TITLE', ph2: 'SUBTITLE',
      },
      ar: {
        icon: '🇲🇦', label: 'Arabic Mode',
        desc: '2 lines, right-aligned',
        overlay: '../assets/overlays/AR.png',
        showText: true, dir: 'rtl',
        l1: 'Line 1', l2: 'Line 2',
        ph1: 'Main title in Arabic', ph2: 'Subtitle in Arabic',
      },
      footix: {
        icon: '⚽', label: 'Footix Mode',
        desc: 'Overlay only, no text',
        overlay: '../assets/overlays/footix.png',
        showText: false,
      },
      sport: {
        icon: '🏆', label: 'Sport Mode',
        desc: 'Overlay only, no text',
        overlay: '../assets/overlays/sport.png',
        showText: false,
      },
      website: {
        icon: '🌐', label: 'Website Mode',
        desc: 'Crop only, no overlay',
        overlay: null, showText: false,
      },
      africa: {
        icon: '🌍', label: 'Africa Mode',
        desc: '2 lines, left-aligned + country name',
        overlay: '../assets/overlays/afrique.png',
        showText: true, dir: 'ltr',
        l1: 'Line 1', l2: 'Line 2',
        ph1: 'MAIN TITLE', ph2: 'SUBTITLE',
        hasCountry: true,
      },
    };

    function loadImg(src, useCors = true) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        if (useCors) img.crossOrigin = 'anonymous';
        img.onload  = () => resolve(img);
        img.onerror = () => {
          if (useCors) {
            // retry without CORS
            loadImg(src, false).then(resolve).catch(reject);
          } else {
            reject(new Error('Cannot load: ' + src));
          }
        };
        img.src = src;
      });
    }

    const overlayCache = {};
    function getOverlay(mode) {
      const src = MODES[mode].overlay;
      if (!src) return Promise.resolve(null);
      if (!overlayCache[mode]) overlayCache[mode] = loadImg(src);
      return overlayCache[mode];
    }

    Object.keys(MODES).forEach(k => { if (MODES[k].overlay) getOverlay(k); });

    async function loadFonts() {
      const fonts = [
        { name: 'DINCondensedBold', url: '../fonts/DINCondensed-Bold.ttf' },
        { name: 'CairoBold',        url: '../fonts/Cairo-Bold.ttf' },
        { name: 'MADEOkineSans',    url: '../fonts/MADEOkineSans-Black.otf' },
      ];
      for (const { name, url } of fonts) {
        try {
          const f = new FontFace(name, `url(${url})`);
          await f.load();
          document.fonts.add(f);
        } catch(e) { console.warn('Font not loaded:', name); }
      }
    }
    const fontsReady = loadFonts();

    // Country overlay: load fresh each time (no persistent cache) to avoid stale failures
    function loadCountryOverlay(src) {
      return new Promise((resolve) => {
        if (!src) return resolve(null);
        const img = new Image();
        // No crossOrigin — local files don't need it and it can cause issues
        img.onload  = () => resolve(img);
        img.onerror = () => { console.warn('Country overlay failed:', src); resolve(null); };
        img.src = src + '?t=' + Date.now(); // bust any cache
      });
    }

    function isReady() {
      if (!currentFile) return false;
      if (MODES[currentMode].showText) {
        return txt1El.value.trim() !== '' && txt2El.value.trim() !== '';
      }
      return true;
    }

    function updateDownloadBtn() {
      dlWrap.classList.toggle('visible', isReady());
    }

    function enableFile(file) {
      currentFile = file;
      imgOffsetX = 0; imgOffsetY = 0;
      imgZoom = 1;
      loadedImg = null;
      dropzone.classList.add('has-file');
      uploadText.textContent = '✓ ' + file.name;
      document.getElementById('posXSlider').value = 0;
      document.getElementById('posXValue').textContent = '0';
      document.getElementById('posYSlider').value = 0;
      document.getElementById('posYValue').textContent = '0';
      previewDraw();
    }

    function previewDraw() {
      if (!currentFile) return;
      loadImg(URL.createObjectURL(currentFile)).then(drawAll);
    }

    async function drawAll(img) {
      if (!img) {
        renderFrame(null);
        return;
      }
      loadedImg = img;
      imgW = img.width;
      imgH = img.height;
      renderFrame(img);
    }

    async function renderFrame(img) {
      const cfg = MODES[currentMode];

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      if (img) {
        const baseW = imgW * imgZoom;
        const baseH = imgH * imgZoom;
        const cx = W / 2, cy = H / 2;
        const dx = cx - baseW / 2 + imgOffsetX;
        const dy = cy - baseH / 2 + imgOffsetY;
        ctx.drawImage(img, dx, dy, baseW, baseH);
      }

      if (cfg.overlay) {
        try {
          const ov = await getOverlay(currentMode);
          if (ov) ctx.drawImage(ov, 0, 0, W, H);
        } catch(e) { console.warn(e.message); }
      }

      if (cfg.hasCountry && countrySelect.value) {
        const co = await loadCountryOverlay(countrySelect.value);
        if (co) ctx.drawImage(co, 0, 0, W, H);
      }

      if (cfg.showText) {
        await fontsReady;
        drawText();
      }

      updateDownloadBtn();
    }

    function withShadow(fn) {
      ctx.shadowColor   = 'rgba(0,0,0,0.75)';
      ctx.shadowOffsetX = 4;
      ctx.shadowOffsetY = 4;
      ctx.shadowBlur    = 14;
      fn();
      ctx.shadowColor   = 'transparent';
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.shadowBlur    = 0;
    }

    function drawText() {
      const t1 = txt1El.value.trim();
      const t2 = txt2El.value.trim();
      ctx.fillStyle = '#fff';

      if (currentMode === 'fr') {
        ctx.font      = '900 105pt DINCondensedBold, Helvetica';
        ctx.textAlign = 'left';
        ctx.direction = 'ltr';
        withShadow(() => {
          if (t1) ctx.fillText(t1.toUpperCase(), 574, 828);
          if (t2) ctx.fillText(t2.toUpperCase(), 574, 978);
        });
      } else if (currentMode === 'ar') {
        ctx.font      = '900 90pt CairoBold, Arial';
        ctx.textAlign = 'right';
        ctx.direction = 'rtl';
        withShadow(() => {
          if (t1) ctx.fillText(t1, W - 560, 828);
          if (t2) ctx.fillText(t2, W - 560, 970);
        });
      } else if (currentMode === 'africa') {
        ctx.font      = '900 82pt MADEOkineSans, Helvetica';
        ctx.textAlign = 'left';
        ctx.direction = 'ltr';
        withShadow(() => {
          if (t1) ctx.fillText(t1.toUpperCase(), 68, 834);
          if (t2) ctx.fillText(t2.toUpperCase(), 68, 970);
        });
      }
    }

    dlBtn.addEventListener('click', () => {
      try {
        const now = new Date();
        const ts = now.getFullYear()
          + String(now.getMonth()+1).padStart(2,'0')
          + String(now.getDate()).padStart(2,'0')
          + '_' + String(now.getHours()).padStart(2,'0')
          + String(now.getMinutes()).padStart(2,'0')
          + String(now.getSeconds()).padStart(2,'0');
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/jpeg');
        a.download = `yt_cover_${currentMode}_${ts}.jpeg`;
        a.click();
      } catch(e) {
        console.error('Download error:', e);
        alert('Download error: ' + e.message);
      }
    });

    function setMode(mode) {
      currentMode = mode;
      const cfg   = MODES[mode];

      document.querySelectorAll('.mode-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.mode === mode)
      );

      modeNoticeIcon.textContent = cfg.icon;
      modeNoticeText.innerHTML   = `<strong>${cfg.label}</strong> — ${cfg.desc}`;

      fieldsGrid.style.display  = cfg.showText ? '' : 'none';
      countryWrap.style.display = cfg.hasCountry ? '' : 'none';
      if (cfg.showText) {
        label1.textContent = cfg.l1;
        label2.textContent = cfg.l2;
        txt1El.placeholder = cfg.ph1;
        txt2El.placeholder = cfg.ph2;
        const rtl          = cfg.dir === 'rtl';
        txt1El.dir         = rtl ? 'rtl' : 'ltr';
        txt2El.dir         = rtl ? 'rtl' : 'ltr';
      }

      dlWrap.classList.remove('visible');
      if (loadedImg) renderFrame(loadedImg);
      else { ctx.clearRect(0, 0, W, H); ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H); }
    }

    modeTabs.addEventListener('click', e => {
      const tab = e.target.closest('.mode-tab');
      if (tab) setMode(tab.dataset.mode);
    });

    dropzone.addEventListener('click',    () => upload.click());
    dropzone.addEventListener('dragover', e  => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave',() => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop',     e  => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) enableFile(e.dataTransfer.files[0]);
    });
    dropzone.addEventListener('touchend', function(e) {
      if (currentFile) return;
      upload.click();
    });
    upload.addEventListener('change', () => { if (upload.files[0]) enableFile(upload.files[0]); });

    txt1El.addEventListener('input', () => { if (loadedImg) renderFrame(loadedImg); });
    txt2El.addEventListener('input', () => { if (loadedImg) renderFrame(loadedImg); });
    countrySelect.addEventListener('change', () => { if (loadedImg) renderFrame(loadedImg); });

    canvas.addEventListener('mousedown', onDragStart);
    canvas.addEventListener('mousemove', onDragMove);
    canvas.addEventListener('mouseup', onDragEnd);
    canvas.addEventListener('mouseleave', onDragEnd);
    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onDragEnd);

    function getCanvasCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
    }

    function onDragStart(e) {
      if (!loadedImg) return;
      isDragging = true;
      const coords = getCanvasCoords(e);
      dragStartX = coords.x;
      dragStartY = coords.y;
      dragOffsetStartX = imgOffsetX;
      dragOffsetStartY = imgOffsetY;
    }

    function onDragMove(e) {
      if (!isDragging || !loadedImg) return;
      const coords = getCanvasCoords(e);
      imgOffsetX = dragOffsetStartX + (coords.x - dragStartX);
      imgOffsetY = dragOffsetStartY + (coords.y - dragStartY);
      renderFrame(loadedImg);
      syncSliders();
    }

    function onTouchStart(e) {
      if (!loadedImg) return;
      if (e.touches.length === 2) {
        e.preventDefault();
        isPinching = true;
        isDragging = false;
        pinchStartDist = getTouchDist(e);
        pinchStartZoom = imgZoom;
        return;
      }
      if (e.touches.length === 1 && !isPinching) {
        e.preventDefault();
        const coords = getCanvasCoords(e);
        isDragging = true;
        dragStartX = coords.x;
        dragStartY = coords.y;
        dragOffsetStartX = imgOffsetX;
        dragOffsetStartY = imgOffsetY;
      }
    }

    function onTouchMove(e) {
      if (!loadedImg) return;
      if (isPinching && e.touches.length === 2) {
        e.preventDefault();
        var dist = getTouchDist(e);
        var ratio = dist / pinchStartDist;
        imgZoom = Math.max(1, Math.min(30, pinchStartZoom * ratio));
        document.getElementById('zoomSlider').value = Math.round(imgZoom * 100);
        document.getElementById('zoomValue').textContent = Math.round(imgZoom * 100) + '%';
        renderFrame(loadedImg);
        return;
      }
      if (isDragging && e.touches.length === 1 && !isPinching) {
        e.preventDefault();
        const coords = getCanvasCoords(e);
        imgOffsetX = dragOffsetStartX + (coords.x - dragStartX);
        imgOffsetY = dragOffsetStartY + (coords.y - dragStartY);
        renderFrame(loadedImg);
        syncSliders();
      }
    }

    function onDragEnd() {
      isDragging = false;
      isPinching = false;
      syncSliders();
    }

    function syncSliders() {
      if (!loadedImg) return;
      var baseW = imgW * imgZoom, baseH = imgH * imgZoom;
      var maxOffX = baseW / 2, maxOffY = baseH / 2;
      var xPct = Math.round((imgOffsetX / maxOffX) * 100);
      var yPct = Math.round((imgOffsetY / maxOffY) * 100);
      xPct = Math.max(-100, Math.min(100, xPct));
      yPct = Math.max(-100, Math.min(100, yPct));
      document.getElementById('posXSlider').value = xPct;
      document.getElementById('posXValue').textContent = xPct;
      document.getElementById('posYSlider').value = yPct;
      document.getElementById('posYValue').textContent = yPct;
    }

    document.getElementById('posXSlider').addEventListener('input', function() {
      if (!loadedImg) return;
      var pct = parseInt(this.value);
      var baseW = imgW * imgZoom;
      imgOffsetX = (pct / 100) * (baseW / 2);
      document.getElementById('posXValue').textContent = pct;
      renderFrame(loadedImg);
    });

    document.getElementById('posYSlider').addEventListener('input', function() {
      if (!loadedImg) return;
      var pct = parseInt(this.value);
      var baseH = imgH * imgZoom;
      imgOffsetY = (pct / 100) * (baseH / 2);
      document.getElementById('posYValue').textContent = pct;
      renderFrame(loadedImg);
    });

    document.getElementById('zoomSlider').addEventListener('input', function() {
      if (!loadedImg) return;
      var newZoom = parseInt(this.value) / 100;
      var cx = W / 2, cy = H / 2;
      var oldW = imgW * imgZoom, oldH = imgH * imgZoom;
      var newW = imgW * newZoom, newH = imgH * newZoom;
      imgOffsetX = imgOffsetX * (newZoom / imgZoom) + (cx - newW / 2) - (cx - oldW / 2) * (newZoom / imgZoom);
      imgOffsetY = imgOffsetY * (newZoom / imgZoom) + (cy - newH / 2) - (cy - oldH / 2) * (newZoom / imgZoom);
      imgZoom = newZoom;
      document.getElementById('zoomValue').textContent = Math.round(newZoom * 100) + '%';
      renderFrame(loadedImg);
      syncSliders();
    });

    canvas.addEventListener('wheel', function(e) {
      if (!loadedImg) return;
      e.preventDefault();
      var delta = e.deltaY > 0 ? -0.05 : 0.05;
      var newZoom = Math.max(1, Math.min(30, imgZoom + delta));
      var coords = getCanvasCoords(e);
      var imgCX = coords.x - imgOffsetX;
      var imgCY = coords.y - imgOffsetY;
      var scaleRatio = newZoom / imgZoom;
      imgOffsetX = coords.x - imgCX * scaleRatio;
      imgOffsetY = coords.y - imgCY * scaleRatio;
      imgZoom = newZoom;
      document.getElementById('zoomSlider').value = Math.round(newZoom * 100);
      document.getElementById('zoomValue').textContent = Math.round(newZoom * 100) + '%';
      renderFrame(loadedImg);
      syncSliders();
    }, { passive: false });

    function getTouchDist(e) {
      if (e.touches.length < 2) return 0;
      var dx = e.touches[0].clientX - e.touches[1].clientX;
      var dy = e.touches[0].clientY - e.touches[1].clientY;
      return Math.sqrt(dx * dx + dy * dy);
    }

    setMode('fr');
  </script>
</body>
