<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Cover — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    .mode-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px;
      flex-wrap: wrap;
    }
    .mode-tab {
      flex: 1;
      min-width: 100px;
      padding: 9px 14px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: var(--radius-xs);
      transition: all .2s;
    }
    .mode-tab:hover { color: var(--text); background: var(--bg3); }
    .mode-tab.active { background: var(--btn-bg); color: var(--btn-text); }

    .fields-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 480px) {
      .fields-grid { grid-template-columns: 1fr; }
      .mode-tabs { gap: 4px; }
      .mode-tab { font-size: 0.68rem; padding: 8px 10px; }
    }

    #dlWrap {
      margin-top: 16px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .25s ease, opacity .25s ease;
    }
    #dlWrap.visible {
      max-height: 60px;
      opacity: 1;
    }
    #dlWrap .btn {
      width: 100%;
      margin-bottom: 0;
      justify-content: center;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">YT Cover</span>
    <span class="nav-num">1920 × 1080</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
  </nav>

  <div class="tool-page">
    <div class="tool-header">
      <h1>YouTube Cover</h1>
      <p>Générez des miniatures 1920×1080 — Français, Arabe, Footix, Sport ou recadrage Website.</p>
    </div>

    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-mode="fr">🇫🇷 Français</button>
      <button class="mode-tab" data-mode="ar">🇲🇦 Arabe</button>
      <button class="mode-tab" data-mode="footix">⚽ Footix</button>
      <button class="mode-tab" data-mode="sport">🏆 Sport</button>
      <button class="mode-tab" data-mode="website">🌐 Website</button>
    </div>

    <div class="notice" id="modeNotice">
      <span id="modeNoticeIcon">🇫🇷</span>&nbsp;
      <span id="modeNoticeText"><strong>Mode Français</strong> — Overlay FR.png · DINCondensed-Bold · 2 lignes gauche</span>
    </div>

    <div class="upload-zone" id="dropzone">
      <div class="upload-icon">⬆</div>
      <div class="upload-text" id="uploadText">Glisser une image ici ou <span class="upload-browse">choisir un fichier</span></div>
      <input type="file" id="upload" accept="image/*" />
    </div>

    <div class="fields-grid" id="fieldsGrid">
      <div class="field">
        <label id="label1">Ligne 1</label>
        <input type="text" id="txt1" placeholder="TITRE PRINCIPAL" />
      </div>
      <div class="field">
        <label id="label2">Ligne 2</label>
        <input type="text" id="txt2" placeholder="SOUS-TITRE" />
      </div>
    </div>

    <div id="dlWrap">
      <button class="btn btn-success" id="dlBtn">↓ Télécharger</button>
    </div>

    <div class="canvas-wrap" style="aspect-ratio:16/9; margin-top:16px;">
      <canvas id="canvas" width="1920" height="1080" style="width:100%;height:auto;display:block;"></canvas>
    </div>
  </div>

  <script>
    const upload         = document.getElementById('upload');
    const canvas         = document.getElementById('canvas');
    const ctx            = canvas.getContext('2d');
    const dlWrap         = document.getElementById('dlWrap');
    const dlBtn          = document.getElementById('dlBtn');
    const txt1El         = document.getElementById('txt1');
    const txt2El         = document.getElementById('txt2');
    const dropzone       = document.getElementById('dropzone');
    const uploadText     = document.getElementById('uploadText');
    const modeTabs       = document.getElementById('modeTabs');
    const modeNoticeIcon = document.getElementById('modeNoticeIcon');
    const modeNoticeText = document.getElementById('modeNoticeText');
    const fieldsGrid     = document.getElementById('fieldsGrid');
    const label1         = document.getElementById('label1');
    const label2         = document.getElementById('label2');

    const W = 1920, H = 1080;
    let currentFile = null;
    let currentMode = 'fr';

    const MODES = {
      fr: {
        icon: '🇫🇷', label: 'Mode Français',
        desc: 'Overlay FR.png · DINCondensed-Bold · 2 lignes gauche',
        overlay: '../assets/overlays/FR.png',
        showText: true, dir: 'ltr',
        l1: 'Ligne 1', l2: 'Ligne 2',
        ph1: 'TITRE PRINCIPAL', ph2: 'SOUS-TITRE',
      },
      ar: {
        icon: '🇲🇦', label: 'Mode Arabe',
        desc: 'Overlay AR.png · Cairo-Bold · 2 lignes droite',
        overlay: '../assets/overlays/AR.png',
        showText: true, dir: 'rtl',
        l1: 'السطر الأول', l2: 'السطر الثاني',
        ph1: 'العنوان الرئيسي', ph2: 'العنوان الفرعي',
      },
      footix: {
        icon: '⚽', label: 'Mode Footix',
        desc: 'Overlay footix.png · Sans texte',
        overlay: '../assets/overlays/footix.png',
        showText: false,
      },
      sport: {
        icon: '🏆', label: 'Mode Sport',
        desc: 'Overlay sport.png · Sans texte',
        overlay: '../assets/overlays/sport.png',
        showText: false,
      },
      website: {
        icon: '🌐', label: 'Mode Website',
        desc: 'Recadrage 1920×1080 · Ratio préservé · Sans overlay ni texte',
        overlay: null, showText: false,
      },
    };

    // Simple image loader — no crossOrigin, no fetch tricks
    function loadImg(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';   // ← this line
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Cannot load: ' + src));
    img.src = src;
  });
}

    // Cache: key → Promise<Image>
    const overlayCache = {};
    function getOverlay(mode) {
      const src = MODES[mode].overlay;
      if (!src) return Promise.resolve(null);
      if (!overlayCache[mode]) overlayCache[mode] = loadImg(src);
      return overlayCache[mode];
    }

    // Preload all overlays on page load
    Object.keys(MODES).forEach(k => { if (MODES[k].overlay) getOverlay(k); });

    // Font loading
    async function loadFonts() {
      const fonts = [
        { name: 'DINCondensedBold', url: '../fonts/DINCondensed-Bold.ttf' },
        { name: 'CairoBold',        url: '../fonts/Cairo-Bold.ttf' },
      ];
      for (const { name, url } of fonts) {
        try {
          const f = new FontFace(name, `url(${url})`);
          await f.load();
          document.fonts.add(f);
        } catch(e) { console.warn('Font not loaded:', name); }
      }
    }
    const fontsReady = loadFonts();

    // ── Readiness check ───────────────────────────────────────────────────────
    function isReady() {
      if (!currentFile) return false;
      if (MODES[currentMode].showText) {
        return txt1El.value.trim() !== '' && txt2El.value.trim() !== '';
      }
      return true;
    }

    function updateDownloadBtn() {
      dlWrap.classList.toggle('visible', isReady());
    }

    // ── File handling ─────────────────────────────────────────────────────────
    function enableFile(file) {
      currentFile = file;
      dropzone.classList.add('has-file');
      uploadText.textContent = '✓ ' + file.name;
      previewDraw();
    }

    function previewDraw() {
      if (!currentFile) return;
      loadImg(URL.createObjectURL(currentFile)).then(drawAll);
    }

    // ── Draw ──────────────────────────────────────────────────────────────────
    async function drawAll(img) {
      const cfg = MODES[currentMode];

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);

      // Base image — cover fit
      const scale = Math.max(W / img.width, H / img.height);
      const iw = img.width * scale, ih = img.height * scale;
      ctx.drawImage(img, (W - iw) / 2, (H - ih) / 2, iw, ih);

      // Overlay
      if (cfg.overlay) {
        try {
          const ov = await getOverlay(currentMode);
          if (ov) ctx.drawImage(ov, 0, 0, W, H);
        } catch(e) { console.warn(e.message); }
      }

      // Text
      if (cfg.showText) {
        await fontsReady;
        drawText();
      }

      updateDownloadBtn();
    }

    function withShadow(fn) {
      ctx.shadowColor    = 'rgba(0,0,0,0.75)';
      ctx.shadowOffsetX  = 4;
      ctx.shadowOffsetY  = 4;
      ctx.shadowBlur     = 14;
      fn();
      ctx.shadowColor    = 'transparent';
      ctx.shadowOffsetX  = 0;
      ctx.shadowOffsetY  = 0;
      ctx.shadowBlur     = 0;
    }

    function drawText() {
      const t1 = txt1El.value.trim();
      const t2 = txt2El.value.trim();
      ctx.fillStyle = '#fff';

      if (currentMode === 'fr') {
        ctx.font      = '900 105pt DINCondensedBold, Helvetica';
        ctx.textAlign = 'left';
        ctx.direction = 'ltr';
        withShadow(() => {
          if (t1) ctx.fillText(t1.toUpperCase(), 574, 828);
          if (t2) ctx.fillText(t2.toUpperCase(), 574, 978);
        });
      } else if (currentMode === 'ar') {
        ctx.font      = '900 90pt CairoBold, Arial';
        ctx.textAlign = 'right';
        ctx.direction = 'rtl';
        withShadow(() => {
          if (t1) ctx.fillText(t1, W - 560, 828);
          if (t2) ctx.fillText(t2, W - 560, 970);
        });
      }
    }

    // ── Download ──────────────────────────────────────────────────────────────
    dlBtn.addEventListener('click', () => {
      try {
        const now = new Date();
        const ts = now.getFullYear()
          + String(now.getMonth()+1).padStart(2,'0')
          + String(now.getDate()).padStart(2,'0')
          + '_' + String(now.getHours()).padStart(2,'0')
          + String(now.getMinutes()).padStart(2,'0')
          + String(now.getSeconds()).padStart(2,'0');
        const a = document.createElement('a');
        a.href = canvas.toDataURL('image/png');
        a.download = `yt_cover_${currentMode}_${ts}.png`;
        a.click();
      } catch(e) {
        console.error('Download error:', e);
        alert('Erreur lors du téléchargement : ' + e.message);
      }
    });

    // ── Mode switching ────────────────────────────────────────────────────────
    function setMode(mode) {
      currentMode = mode;
      const cfg   = MODES[mode];

      document.querySelectorAll('.mode-tab').forEach(t =>
        t.classList.toggle('active', t.dataset.mode === mode)
      );

      modeNoticeIcon.textContent = cfg.icon;
      modeNoticeText.innerHTML   = `<strong>${cfg.label}</strong> — ${cfg.desc}`;

      fieldsGrid.style.display = cfg.showText ? '' : 'none';
      if (cfg.showText) {
        label1.textContent  = cfg.l1;
        label2.textContent  = cfg.l2;
        txt1El.placeholder  = cfg.ph1;
        txt2El.placeholder  = cfg.ph2;
        const rtl           = cfg.dir === 'rtl';
        txt1El.dir          = rtl ? 'rtl' : 'ltr';
        txt2El.dir          = rtl ? 'rtl' : 'ltr';
      }

      dlWrap.classList.remove('visible');
      previewDraw();
    }

    // ── Events ────────────────────────────────────────────────────────────────
    modeTabs.addEventListener('click', e => {
      const tab = e.target.closest('.mode-tab');
      if (tab) setMode(tab.dataset.mode);
    });

    dropzone.addEventListener('click',    () => upload.click());
    dropzone.addEventListener('dragover', e  => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave',() => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop',     e  => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files[0]) enableFile(e.dataTransfer.files[0]);
    });
    upload.addEventListener('change', () => { if (upload.files[0]) enableFile(upload.files[0]); });

    txt1El.addEventListener('input', previewDraw);
    txt2El.addEventListener('input', previewDraw);

    // Init
    setMode('fr');
  </script>
</body>
</html>
