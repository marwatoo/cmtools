<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le360 Nitter Deck (Fast) — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
  <style>
    .deck-card h3 {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.35;
      font-size: 0.9rem;
      margin: 8px 0 4px;
    }
    .deck-col-header .nitter-badge { font-size:0.65rem; color:var(--text2); background:var(--border2); padding:3px 8px; border-radius:10px; }
    .modal-content-html { font-size:0.95rem; line-height:1.6; word-wrap:break-word; }
    .modal-content-html img { max-width:100%; height:auto; border-radius:8px; margin:8px 0; }
    .deck-card-img { object-fit:cover; width:100%; height:160px; border-radius:8px 8px 0 0; background:#1a1a2e; }
    .no-image-placeholder { width:100%; height:120px; border-radius:8px 8px 0 0; background:linear-gradient(135deg,#1a1a2e,#252540); display:flex; align-items:center; justify-content:center; font-size:2rem; color:#444; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">Le360 Nitter Deck ⚡</span>
    <span class="nav-num">🐦 RSS</span>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <a href="snippets.html" style="font-size:0.78rem;color:var(--text2);text-decoration:none;padding:5px 10px;border:1px solid var(--border2);border-radius:6px;">⌨ Snippets</a>
      <button class="theme-toggle" id="themeToggle" style="margin-left:0;"><span class="theme-icon">☽</span></button>
    </div>
  </nav>

  <div class="deck-container" id="deckContainer"></div>

  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose">×</button>
      <div id="modalBody">Loading…</div>
    </div>
  </div>

  <script>
    (function() {
      // ----- CONFIGURATION -----
      const NITTER_BASE = 'https://nitter.net';
      const NITTER_FALLBACKS = ['https://nitter.poast.org','https://nitter.1d4.us'];
      
      // Proxies used simultaneously (race, first success wins)
      const PROXIES = [
        url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
        url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
        url => `https://proxy.cors.sh/${url}`   // additional fast proxy
      ];

      const accounts = {
        le360fr:      { handle:'le360fr',      label:'Français 🇫🇷', nitter:NITTER_BASE },
        le360ar:      { handle:'le360ar',      label:'Arabe 🇲🇦',   nitter:NITTER_BASE },
        le360sport:   { handle:'le360sport',   label:'Sport ⚽',    nitter:NITTER_BASE },
        le360afrique: { handle:'le360afrique', label:'Afrique 🌍',  nitter:NITTER_BASE },
        le360es:      { handle:'le360es',      label:'Espagnol 🇪🇸', nitter:NITTER_BASE }
      };

      // ----- STATE -----
      const cache = {};
      const instanceIndex = {};

      // ----- BUILD COLUMNS -----
      const container = document.getElementById('deckContainer');
      Object.keys(accounts).forEach(key => {
        const acc = accounts[key];
        const col = document.createElement('div');
        col.className = 'deck-column';
        col.id = `col-${key}`;
        col.innerHTML = `
          <div class="deck-col-header">
            <h2>${acc.label} 🐦</h2>
            <span class="deck-col-badge"><span class="deck-pulse"></span>live</span>
          </div>
          <div class="deck-col-feed" id="feed-${key}">
            <div class="deck-loading">⏳ Loading…</div>
          </div>`;
        container.appendChild(col);
      });

      // ----- FAST FETCH WITH MULTI-PROXY RACE -----
      async function fastFetch(url) {
        const busted = url + (url.includes('?')?'&':'?') + '_t=' + Date.now();
        const promises = PROXIES.map(proxy => 
          fetch(proxy(busted), { signal: AbortSignal.timeout(5000) })
            .then(r => { if(!r.ok) throw new Error('bad status'); return r.text(); })
        );
        // Also try direct fetch as a fallback (some networks allow it)
        promises.push(
          fetch(busted, { signal: AbortSignal.timeout(5000) })
            .then(r => { if(!r.ok) throw new Error('direct fail'); return r.text(); })
        );
        try {
          const txt = await Promise.any(promises);
          if (txt.includes('<rss') || txt.includes('<feed') || txt.includes('<item') || txt.includes('<entry')) return txt;
          throw new Error('Not a valid feed');
        } catch (e) {
          throw new Error('All proxies & direct failed');
        }
      }

      // ----- RSS PARSING -----
      function extractImages(html) {
        if (!html) return [];
        const d = document.createElement('div'); d.innerHTML = html;
        return [...d.querySelectorAll('img')].map(i => i.src).filter(Boolean);
      }
      function firstImage(desc, content) {
        const d = document.createElement('div');
        if (desc) { d.innerHTML = desc; let img = d.querySelector('img'); if(img) return img.src; }
        if (content) { d.innerHTML = content; let img = d.querySelector('img'); if(img) return img.src; }
        return '';
      }

      async function fetchTweets(accountKey) {
        const url = `${accounts[accountKey].nitter}/${accounts[accountKey].handle}/rss`;
        const xml = await fastFetch(url);
        const doc = new DOMParser().parseFromString(xml, 'text/xml');
        if (doc.querySelector('parsererror')) throw new Error('XML parse error');
        
        // RSS items
        let items = [...doc.querySelectorAll('item')];
        if (items.length === 0) {
          // Atom fallback
          const entries = [...doc.querySelectorAll('entry')];
          return entries.slice(0,6).map(e => ({
            title: e.querySelector('title')?.textContent || '',
            link: e.querySelector('link[rel="alternate"]')?.getAttribute('href') || e.querySelector('link')?.getAttribute('href') || '',
            content: e.querySelector('content')?.textContent || e.querySelector('summary')?.textContent || '',
            date: e.querySelector('published')?.textContent || e.querySelector('updated')?.textContent || '',
            img: '',
            contentImages: []
          })).map(t => { t.img = firstImage('', t.content) || (t.contentImages[0]||''); t.contentImages = extractImages(t.content); return t; });
        }
        
        return items.slice(0,6).map(item => {
          const title = item.querySelector('title')?.textContent || '';
          const link = item.querySelector('link')?.textContent || '';
          const desc = item.querySelector('description')?.textContent || '';
          let content = '';
          try { const enc = item.getElementsByTagNameNS('http://purl.org/rss/1.0/modules/content/','encoded'); if(enc.length) content = enc[0].textContent; } catch(e){}
          const mediaEl = item.querySelector('media\\:content, content[url]');
          const mediaUrl = mediaEl?.getAttribute('url') || '';
          const combined = content || desc;
          const img = mediaUrl || firstImage(desc, content) || (extractImages(combined)[0]||'');
          return {
            title, link, img,
            date: item.querySelector('pubDate')?.textContent || '',
            content: combined,
            description: desc,
            contentImages: extractImages(combined)
          };
        });
      }

      function formatDate(ds) {
        try { return new Date(ds).toLocaleString('fr-FR',{hour12:false,day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
        catch(e){ return ds; }
      }

      // ----- COPY HELPER -----
      function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          btn.classList.add('copied'); const orig = btn.textContent; btn.textContent='✓ Copied';
          setTimeout(() => { btn.classList.remove('copied'); btn.textContent=orig; },1200);
        }).catch(() => { /* fallback */ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); });
      }

      // ----- CARD BUILDER -----
      function createCard(tweet) {
        const card = document.createElement('div');
        card.className = 'deck-card';
        const fallback = 'data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="320" height="160"><rect fill="%231a1a2e" width="320" height="160"/><text x="160" y="85" text-anchor="middle" fill="%23444" font-size="40" font-family="sans-serif">🐦</text></svg>');
        const hasImg = tweet.img && tweet.img.startsWith('http');
        
        if (hasImg) {
          const img = document.createElement('img'); img.className='deck-card-img'; img.src=tweet.img; img.loading='lazy';
          img.onerror = () => { img.remove(); const ph = document.createElement('div'); ph.className='no-image-placeholder'; ph.textContent='🐦'; card.prepend(ph); };
          card.appendChild(img);
        } else {
          const ph = document.createElement('div'); ph.className='no-image-placeholder'; ph.textContent='🐦';
          card.appendChild(ph);
        }
        
        const h3 = document.createElement('h3'); h3.textContent = tweet.title; card.appendChild(h3);
        const date = document.createElement('div'); date.className='deck-card-date'; date.textContent = formatDate(tweet.date); card.appendChild(date);
        
        const btns = document.createElement('div'); btns.className='deck-card-btns';
        const copyLink = document.createElement('button'); copyLink.className='deck-btn copy-link'; copyLink.textContent='Copy Link'; copyLink.dataset.link=tweet.link; btns.appendChild(copyLink);
        const copyTitle = document.createElement('button'); copyTitle.className='deck-btn copy-title'; copyTitle.textContent='Copy Text'; copyTitle.dataset.title=tweet.title; btns.appendChild(copyTitle);
        const copyBoth = document.createElement('button'); copyBoth.className='deck-btn copy-both'; copyBoth.textContent='Copy Text+Link'; copyBoth.dataset.title=tweet.title; copyBoth.dataset.link=tweet.link; btns.appendChild(copyBoth);
        if (tweet.contentImages.length>1) { const tag = document.createElement('span'); tag.className='deck-btn carousel-tag'; tag.textContent='📷 '+tweet.contentImages.length; btns.appendChild(tag); }
        card.appendChild(btns);
        
        card.addEventListener('click', e => { if(!e.target.closest('.deck-card-btns')) openModal(tweet); });
        copyLink.addEventListener('click', e => { e.stopPropagation(); copyText(copyLink.dataset.link, copyLink); });
        copyTitle.addEventListener('click', e => { e.stopPropagation(); copyText(copyTitle.dataset.title, copyTitle); });
        copyBoth.addEventListener('click', e => { e.stopPropagation(); copyText(`${copyBoth.dataset.title}\n${copyBoth.dataset.link}`, copyBoth); });
        return card;
      }

      // ----- COLUMN UPDATE (RACE TO RENDER FAST) -----
      async function updateColumn(key) {
        const feed = document.getElementById(`feed-${key}`);
        if (!cache[key]) cache[key] = new Set();
        try {
          const tweets = await fetchTweets(key);
          const fresh = tweets.filter(t => !cache[key].has(t.link));
          if (!fresh.length) {
            const loader = feed.querySelector('.deck-loading');
            if (loader) loader.textContent = '✓ Up to date';
            return;
          }
          const loader = feed.querySelector('.deck-loading');
          if (loader) loader.remove();
          const frag = document.createDocumentFragment();
          fresh.reverse().forEach(t => { frag.appendChild(createCard(t)); cache[key].add(t.link); });
          feed.insertBefore(frag, feed.firstChild);
          while (feed.children.length > 30) feed.lastChild.remove();
        } catch (e) {
          console.warn(key, e);
          const loader = feed.querySelector('.deck-loading');
          if (loader) loader.textContent = '⚠ ' + (e.message.substring(0,35) || 'Error');
          // Rotate fallback instance on next error
          if (!instanceIndex[key]) instanceIndex[key]=0;
          instanceIndex[key]++;
          if (instanceIndex[key] < NITTER_FALLBACKS.length) {
            accounts[key].nitter = NITTER_FALLBACKS[instanceIndex[key]];
            cache[key] = new Set(); // reset to refetch
          } else {
            accounts[key].nitter = NITTER_BASE;
            instanceIndex[key] = 0;
            cache[key] = new Set();
          }
        }
      }

      function refreshAll() {
        Object.keys(accounts).forEach(k => updateColumn(k));
        setTimeout(refreshAll, 20000);
      }
      refreshAll();

      // ----- MODAL -----
      function openModal(tweet) {
        const overlay = document.getElementById('modalOverlay');
        const body = document.getElementById('modalBody');
        let mediaHTML = '';
        if (tweet.contentImages.length > 1) {
          mediaHTML = `<div class="slider">${tweet.contentImages.map((s,i)=>`<img src="${s}" class="slide ${i===0?'active':''}" alt="" loading="lazy">`).join('')}<button class="slider-btn slider-prev">&#10094;</button><button class="slider-btn slider-next">&#10095;</button></div>`;
        } else if (tweet.img) {
          mediaHTML = `<img class="modal-img" src="${tweet.img}" alt="">`;
        }
        let contentHTML = tweet.content || tweet.description || '';
        if (tweet.contentImages.length > 1) {
          const tmp = document.createElement('div'); tmp.innerHTML = contentHTML;
          tmp.querySelectorAll('img').forEach(img => { if(tweet.contentImages.includes(img.src)) img.remove(); });
          contentHTML = tmp.innerHTML;
        }
        const tweetId = tweet.link.split('/').pop() || '';
        const twitterUrl = 'https://twitter.com/i/status/' + tweetId;
        body.innerHTML = `<h2 style="word-wrap:break-word;">${tweet.title}</h2>${mediaHTML}<div class="modal-meta">📅 ${formatDate(tweet.date)}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;"><a class="modal-link" href="${twitterUrl}" target="_blank">🔗 Twitter/X →</a><a class="modal-link" href="${tweet.link}" target="_blank" style="opacity:0.7;">📡 Nitter →</a></div>
          <hr><div class="modal-content-html">${contentHTML}</div>`;
        overlay.classList.remove('hidden');
        const slides = body.querySelectorAll('.slide');
        if (slides.length>1) {
          let cur=0; const show=i=>slides.forEach((s,j)=>s.classList.toggle('active',j===i));
          body.querySelector('.slider-prev').onclick=()=>{ cur=(cur-1+slides.length)%slides.length; show(cur); };
          body.querySelector('.slider-next').onclick=()=>{ cur=(cur+1)%slides.length; show(cur); };
        }
        document.getElementById('modalBox').scrollTop = 0;
      }

      document.getElementById('modalClose').addEventListener('click', ()=> document.getElementById('modalOverlay').classList.add('hidden'));
      document.getElementById('modalOverlay').addEventListener('click', e=> { if(e.target===e.currentTarget) document.getElementById('modalOverlay').classList.add('hidden'); });
      document.addEventListener('keydown', e=> { if(e.key==='Escape') document.getElementById('modalOverlay').classList.add('hidden'); });
    })();
  </script>
</body>
</html>
