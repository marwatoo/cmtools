<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>X Post Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/global.css" />
  <script src="../assets/theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    .page-header {
      padding: 24px 24px 20px;
      max-width: 620px;
      margin: 0 auto;
    }
    .page-header h1 { margin: 0 0 4px; }
    .page-header p { margin: 0; }

    .tool-page {
      max-width: 620px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .controls-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 20px;
    }

    .preview-wrap {
      display: flex;
      justify-content: center;
      padding: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
    }

    .preview-canvas {
      max-width: 100%;
      width: 100%;
      height: auto;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .url-field {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .url-field .field {
      flex: 1;
      margin: 0;
    }
    .url-field .btn {
      flex-shrink: 0;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: var(--text2);
    }
    .status-row.success { border-color: #00ba7c; color: #00ba7c; }
    .status-row.error   { border-color: #f4212e; color: #f4212e; }
    .status-row.loading { border-color: var(--accent); color: var(--accent); }

    .format-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 12px;
    }
    .format-tab {
      flex: 1;
      padding: 8px 10px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: calc(var(--radius-sm) - 2px);
      transition: background .18s, color .18s;
    }
    .format-tab:hover  { color: var(--text); background: var(--bg2); }
    .format-tab.active { background: var(--btn-bg); color: var(--btn-text); }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text2);
      cursor: pointer;
    }
    .checkbox-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .tool-header, .controls-card, .preview-wrap {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header   { animation-delay: 0.05s; }
    .controls-card { animation-delay: 0.1s; }
    .preview-wrap  { animation-delay: 0.15s; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <span class="nav-title">X Post Image</span>
    <span class="nav-num">Dynamic</span>
    <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
  </nav>

  <div class="tool-page">

    <div class="page-header">
      <div class="tool-header" style="margin-bottom:18px;">
        <h1>X Post Image</h1>
        <p>Generate a shareable post card image from any X/tweet link.</p>
      </div>
    </div>

    <div class="controls-card">

      <p class="section-head">Tweet URL</p>

      <div class="url-field">
        <div class="field">
          <input type="text" id="tweetUrl" placeholder="https://x.com/user/status/123456789">
        </div>
        <button class="btn btn-primary" id="fetchBtn" style="margin:0;width:auto;padding:12px 24px;">Generate</button>
      </div>

      <div class="status-row" id="statusRow">
        Paste an X/tweet link and click Generate to create the post image.
      </div>

      <p class="section-head">Theme</p>

      <div class="format-tabs" id="bgTabs">
        <button class="format-tab active" data-bg="#000000">Dark</button>
        <button class="format-tab" data-bg="#ffffff">Light</button>
      </div>

      <label class="checkbox-row" style="margin-top:12px;">
        <input type="checkbox" id="showLogo" checked>
        <span>Show X logo</span>
      </label>

    </div>

    <div class="preview-wrap">
      <canvas id="canvas" class="preview-canvas"></canvas>
    </div>

    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" id="dlBtn" disabled style="flex:1;">Download Image</button>
      <button class="btn btn-primary" id="dlBtn1350" disabled style="flex:1;">Save 1080 × 1350</button>
    </div>

  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    let currentBg = '#000000';
    let tweetData = null;
    let showLogo  = true;

    const IMG_PROXY = 'https://images.weserv.nl/?url=';

    function loadImage(rawUrl) {
      return new Promise((resolve, reject) => {
        if (!rawUrl) { reject(new Error('no url')); return; }
        const src = IMG_PROXY + encodeURIComponent(rawUrl);
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload  = () => resolve(img);
        img.onerror = () => reject(new Error('img load failed'));
        img.src = src;
      });
    }

    async function fetchAndGenerate(tweetUrl) {
      const statusEl  = document.getElementById('statusRow');
      const fetchBtn  = document.getElementById('fetchBtn');
      const dlBtn     = document.getElementById('dlBtn');
      const dlBtn1350 = document.getElementById('dlBtn1350');

      if (!tweetUrl) {
        statusEl.textContent = 'Please enter an X/tweet URL';
        statusEl.className   = 'status-row error';
        return;
      }

      statusEl.innerHTML = '⏳ Fetching tweet…';
      statusEl.className = 'status-row loading';
      fetchBtn.disabled  = true;
      dlBtn.disabled     = true;
      dlBtn1350.disabled = true;

      try {
        const match = tweetUrl.match(/(?:x|twitter)\.com\/(\w+)\/status\/(\d+)/);
        if (!match) throw new Error('Invalid X/Twitter URL');
        const username = match[1];
        const statusId = match[2];

        const res = await fetch(`https://api.fxtwitter.com/status/${statusId}`);
        if (!res.ok) throw new Error('Failed to fetch tweet');
        const data = await res.json();

        if (!data.tweet || (!data.tweet.text && !data.tweet.full_text)) {
          throw new Error('Could not extract tweet content');
        }

        const tweet  = data.tweet;
        const author = tweet.author || {};
        const user   = data.user    || {};

        const name   = author.name        || user.name        || username;
        const handle = '@' + (author.screen_name || user.screen_name || username);
        const text   = tweet.full_text || tweet.text || '';

        let createdAt = '';
        if (tweet.created_timestamp) {
          const d = new Date(tweet.created_timestamp * 1000);
          createdAt = d.toLocaleString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric',
            hour: 'numeric', minute: '2-digit', hour12: true
          }).replace(/,\s*/, ' · ');
        } else if (tweet.created_at) {
          createdAt = new Date(tweet.created_at).toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
        }

        let avatarRaw = author.avatar_url || user.avatar_url || user.profile_image_url_https || '';

        const mediaImages = [];
        const mediaTypes  = [];
        const mediaList   = tweet.media?.photos || tweet.media?.videos || tweet.media?.all || [];
        for (const m of mediaList.slice(0, 4)) {
          if (m.type === 'photo' && m.url) {
            mediaImages.push(m.url);
            mediaTypes.push('photo');
          } else if ((m.type === 'video' || m.type === 'animated_gif') && m.thumbnail_url) {
            let thumbUrl = m.thumbnail_url;
            const mp4Index = thumbUrl.indexOf('.mp4');
            if (mp4Index > -1) thumbUrl = thumbUrl.substring(0, mp4Index + 4);
            mediaImages.push(thumbUrl);
            mediaTypes.push(m.type === 'animated_gif' ? 'gif' : 'video');
          }
        }

        let cardImage = '';
        let cardUrl   = '';
        if (tweet.card?.image?.url) {
          cardImage = tweet.card.image.url;
          cardUrl   = tweet.card.display_url || tweet.card.domain || '';
        }

        tweetData = {
          name, handle, text, date: createdAt,
          avatarRaw, mediaImages, mediaTypes,
          likes:    tweet.likes?.toString()    || '',
          retweets: tweet.retweets?.toString() || '',
          replies:  tweet.replies?.toString()  || '',
          username, cardImage, cardUrl
        };

        statusEl.innerHTML = '✅ Fetched';
        statusEl.className = 'status-row success';
        dlBtn.disabled     = false;
        dlBtn1350.disabled = false;
        await draw();

      } catch (e) {
        statusEl.innerHTML = '❌ ' + e.message;
        statusEl.className = 'status-row error';
      }

      fetchBtn.disabled = false;
    }

    // ─── canvas draw ──────────────────────────────────────────────────────────
    async function draw() {
      const W          = 1200;
      const padding    = 56;
      const avatarSize = 64;
      const lineHeight = 44;
      const fontSize   = 30;

      const bg         = currentBg;
      const isDark     = bg === '#000000';
      const textColor  = isDark ? '#ffffff' : '#0f1419';
      const mutedColor = isDark ? '#71767b' : '#536471';

      if (!tweetData) {
        canvas.width  = W;
        canvas.height = 300;
        ctx.fillStyle = bg || '#000';
        ctx.fillRect(0, 0, W, 300);
        ctx.fillStyle = mutedColor;
        ctx.font      = '24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Enter a tweet URL to generate', W / 2, 155);
        ctx.textAlign = 'left';
        return;
      }

      const { name, handle, text, date, avatarRaw, mediaImages, mediaTypes,
              likes, retweets, replies, cardImage, cardUrl } = tweetData;

      const rtl = isRTL(text);

      // load images
      let avatarImg = null;
      try { avatarImg = await loadImage(avatarRaw); } catch (_) {}

      const loadedMedia = [];
      for (const src of mediaImages.slice(0, 4)) {
        try { loadedMedia.push(await loadImage(src)); } catch (_) {}
      }

      let cardImg = null;
      if (cardImage) {
        try { cardImg = await loadImage(cardImage); } catch (_) {}
      }

      // ── pre-compute urlLines once so height calc and draw both use same data ──
      let urlLines = [];
      if (cardImg && loadedMedia.length === 0 && cardUrl) {
        ctx.font = `18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        urlLines = wrapText(cardUrl, 600, 18);
      }

      // ── compute canvas height ─────────────────────────────────────────────
      ctx.font = `${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      const contentW = W - padding * 2;
      const lines    = wrapText(text, contentW, fontSize);

      let H = padding;
      H += avatarSize + 44;
      H += lines.length * lineHeight + 12;

      let mediaH = 0;
      if (loadedMedia.length > 0) {
        const maxMediaW = 600;
        mediaH = Math.round(maxMediaW * loadedMedia[0].height / loadedMedia[0].width);
        mediaH = Math.max(200, Math.min(1200, mediaH));
        H += mediaH + 36;
      }

      if (cardImg && loadedMedia.length === 0) {
        const maxCardW = 600;
        let cardH = Math.round(maxCardW * cardImg.height / cardImg.width);
        cardH = Math.max(120, Math.min(400, cardH));
        H += cardH + 18;
        if (urlLines.length) H += urlLines.length * 28 + 16;
        else H += 16;
      }

      const stats = [];
      if (replies  && replies  !== '0') stats.push(`${replies} replies`);
      if (retweets && retweets !== '0') stats.push(`${retweets} retweets`);
      if (likes    && likes    !== '0') stats.push(`${likes} likes`);

      if (stats.length) H += 32;
      if (date)         H += 28;
      H += padding;

      canvas.width  = W;
      canvas.height = Math.max(300, H);

      // background
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, canvas.height);

      let y = padding;

      // ── avatar ────────────────────────────────────────────────────────────
      const avatarX = rtl ? W - padding - avatarSize : padding;
      ctx.save();
      ctx.beginPath();
      ctx.arc(avatarX + avatarSize / 2, y + avatarSize / 2, avatarSize / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      if (avatarImg) ctx.drawImage(avatarImg, avatarX, y, avatarSize, avatarSize);
      else           drawDefaultAvatar(avatarX, y, avatarSize);
      ctx.restore();

      // ── name + handle ─────────────────────────────────────────────────────
      ctx.fillStyle = textColor;
      ctx.font      = `700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      if (rtl) {
        ctx.textAlign = 'right';
        const nameX = W - padding - avatarSize - 18;
        ctx.fillText(name, nameX, y + 28);
        ctx.fillStyle = mutedColor;
        ctx.font      = `22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        ctx.fillText(handle, nameX, y + 56);
        ctx.textAlign = 'left';
      } else {
        const textX = padding + avatarSize + 18;
        ctx.fillText(name, textX, y + 28);
        ctx.fillStyle = mutedColor;
        ctx.font      = `22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        ctx.fillText(handle, textX, y + 56);
      }

      y += avatarSize + 44;

      // ── tweet text ────────────────────────────────────────────────────────
      ctx.fillStyle = textColor;
      if (rtl) {
        ctx.font      = `${fontSize}px "Segoe UI", "Tahoma", "Arabic Typesetting", sans-serif`;
        ctx.direction = 'rtl';
        ctx.textAlign = 'right';
        lines.forEach(line => { ctx.fillText(line, W - padding, y); y += lineHeight; });
        ctx.direction = 'ltr';
        ctx.textAlign = 'left';
      } else {
        ctx.font = `${fontSize}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        lines.forEach(line => { ctx.fillText(line, padding, y); y += lineHeight; });
      }

      y += 16;

      // ── media grid ────────────────────────────────────────────────────────
      if (loadedMedia.length > 0) {
        const n      = loadedMedia.length;
        const gutter = 8;
        const drawW  = Math.min(contentW, 600);
        const drawH  = Math.round(drawW * loadedMedia[0].height / loadedMedia[0].width);
        const gridX  = rtl ? W - padding - drawW : padding;

        if (n === 1) {
          drawRoundedImage(loadedMedia[0], gridX, y, drawW, drawH, 16);
        } else if (n === 2) {
          const cellW = (drawW - gutter) / 2;
          const cellH = Math.round(cellW * loadedMedia[1].height / loadedMedia[1].width);
          if (rtl) {
            drawRoundedImage(loadedMedia[0], gridX + cellW + gutter, y, cellW, cellH, 16);
            drawRoundedImage(loadedMedia[1], gridX,                  y, cellW, cellH, 16);
          } else {
            drawRoundedImage(loadedMedia[0], gridX,                  y, cellW, cellH, 16);
            drawRoundedImage(loadedMedia[1], gridX + cellW + gutter, y, cellW, cellH, 16);
          }
        } else if (n >= 3) {
          const cellW = (drawW - gutter) / 2;
          const topH  = Math.round(drawH * 0.55);
          const botH  = drawH - topH - gutter;
          drawRoundedImage(loadedMedia[0], gridX, y, drawW, topH, 16);
          if (rtl) {
            drawRoundedImage(loadedMedia[1], gridX + cellW + gutter, y + topH + gutter, cellW, botH, 16);
            drawRoundedImage(loadedMedia[2], gridX,                  y + topH + gutter, cellW, botH, 16);
          } else {
            drawRoundedImage(loadedMedia[1], gridX,                  y + topH + gutter, cellW, botH, 16);
            drawRoundedImage(loadedMedia[2], gridX + cellW + gutter, y + topH + gutter, cellW, botH, 16);
          }
        }

        y += drawH + 34;

        // play/gif overlay
        if (mediaTypes && (mediaTypes[0] === 'video' || mediaTypes[0] === 'gif')) {
          const cx = gridX + drawW / 2;
          const cy = y - drawH / 2 - 20;
          const r  = 36;
          ctx.save();
          ctx.globalAlpha = 0.82;
          ctx.fillStyle   = 'rgba(0,0,0,0.55)';
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.moveTo(cx - 13, cy - 16);
          ctx.lineTo(cx - 13, cy + 16);
          ctx.lineTo(cx + 20, cy);
          ctx.closePath(); ctx.fill();
          if (mediaTypes[0] === 'gif') {
            ctx.font = 'bold 14px -apple-system, sans-serif';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText('GIF', cx, cy + r + 18);
            ctx.textAlign = 'left';
          }
          ctx.globalAlpha = 1;
          ctx.restore();
        }
      }

      // ── card image + URL (FIXED: full RTL support) ────────────────────────
      if (cardImg && loadedMedia.length === 0) {
        const drawW = Math.min(contentW, 600);
        const drawH = Math.round(drawW * cardImg.height / cardImg.width);

        // RTL: anchor card image to the right, matching media grid behaviour
        const cardX = rtl ? W - padding - drawW : padding;

        drawRoundedImage(cardImg, cardX, y, drawW, drawH, 16);
        y += drawH + 18;

        // ── card URL: right-aligned for RTL tweets, left-aligned for LTR ───
        if (urlLines.length) {
          ctx.fillStyle = mutedColor;
          ctx.font = `18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;

          if (rtl || isRTL(cardUrl)) {
            // Anchor to right edge of the card image, same as stats/date
            ctx.direction = 'rtl';
            ctx.textAlign = 'right';
            urlLines.forEach(line => {
              ctx.fillText(line, cardX + drawW, y);
              y += 28;
            });
            ctx.direction = 'ltr';
            ctx.textAlign = 'left';
          } else {
            urlLines.forEach(line => {
              ctx.fillText(line, cardX, y);
              y += 28;
            });
          }

          y += 8;
        }
      }

      // ── stats ─────────────────────────────────────────────────────────────
      if (stats.length) {
        ctx.fillStyle = mutedColor;
        ctx.font      = `20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        if (rtl) {
          ctx.textAlign = 'right';
          ctx.fillText(stats.join(' · '), W - padding, y);
          ctx.textAlign = 'left';
        } else {
          ctx.fillText(stats.join(' · '), padding, y);
        }
        y += 32;
      }

      // ── date ──────────────────────────────────────────────────────────────
      if (date) {
        ctx.fillStyle = mutedColor;
        ctx.font      = `20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
        if (rtl) {
          ctx.textAlign = 'right';
          ctx.fillText(date, W - padding, y);
          ctx.textAlign = 'left';
        } else {
          ctx.fillText(date, padding, y);
        }
      }

      // ── X watermark ───────────────────────────────────────────────────────
      if (showLogo) {
        ctx.fillStyle = isDark ? 'rgba(255,255,255,0.25)' : 'rgba(0,0,0,0.06)';
        ctx.font      = `700 120px -apple-system, sans-serif`;
        if (rtl) {
          ctx.textAlign = 'left';
          ctx.fillText('𝕏', padding - 10, padding + 90);
        } else {
          ctx.textAlign = 'right';
          ctx.fillText('𝕏', W - padding + 10, padding + 90);
        }
        ctx.textAlign = 'left';
      }
    }

    // ── helpers ───────────────────────────────────────────────────────────────
    function drawRoundedImage(img, x, y, w, h, r) {
      ctx.save();
      roundedRect(x, y, w, h, r);
      ctx.clip();
      const scale = Math.min(w / img.width, h / img.height);
      const sw    = img.width  * scale;
      const sh    = img.height * scale;
      ctx.drawImage(img, x + (w - sw) / 2, y + (h - sh) / 2, sw, sh);
      ctx.restore();
    }

    function roundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x,     y + h, x,     y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x,     y,     x + r, y);
      ctx.closePath();
    }

    function drawDefaultAvatar(x, y, size) {
      const grad = ctx.createLinearGradient(x, y, x + size, y + size);
      grad.addColorStop(0, '#667eea');
      grad.addColorStop(1, '#764ba2');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x + size / 2, y + size / 2, size / 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function isRTL(text) {
      const rtlCount = (text.match(/[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/g) || []).length;
      return rtlCount > text.length * 0.3;
    }

    function breakToken(token, maxW) {
      const safeW = maxW * 0.98;
      const parts = [];
      let remaining = token;
      while (remaining && ctx.measureText(remaining).width > safeW) {
        let lo = 1, hi = remaining.length;
        while (lo < hi) {
          const mid = (lo + hi + 1) >>> 1;
          if (ctx.measureText(remaining.slice(0, mid)).width <= safeW) lo = mid;
          else hi = mid - 1;
        }
        parts.push(remaining.slice(0, lo));
        remaining = remaining.slice(lo);
      }
      if (remaining) parts.push(remaining);
      return parts;
    }

    function wrapText(text, maxW, fs) {
      // Shrink the effective wrap width by ~2% to absorb macOS/San Francisco
      // subpixel rendering, which measures slightly wider than Linux/Android.
      const safeW = maxW * 0.98;
      const allLines = [];
      ctx.font = `${fs}px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif`;
      for (const para of text.split('\n')) {
        if (ctx.measureText(para).width <= safeW) { allLines.push(para); continue; }
        let line = '';
        for (const word of para.split(' ')) {
          if (ctx.measureText(word).width > safeW) {
            if (line) { allLines.push(line); line = ''; }
            const broken = breakToken(word, safeW);
            for (let b = 0; b < broken.length - 1; b++) allLines.push(broken[b]);
            line = broken[broken.length - 1];
            continue;
          }
          const test = line ? line + ' ' + word : word;
          if (ctx.measureText(test).width > safeW && line) { allLines.push(line); line = word; }
          else line = test;
        }
        if (line) allLines.push(line);
      }
      return allLines;
    }

    // ── event wiring ──────────────────────────────────────────────────────────
    document.getElementById('fetchBtn').addEventListener('click', () => {
      fetchAndGenerate(document.getElementById('tweetUrl').value.trim());
    });

    document.getElementById('tweetUrl').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchAndGenerate(e.target.value.trim());
    });

    document.getElementById('bgTabs').addEventListener('click', e => {
      const tab = e.target.closest('.format-tab[data-bg]');
      if (!tab) return;
      document.querySelectorAll('.format-tab[data-bg]').forEach(b => b.classList.remove('active'));
      tab.classList.add('active');
      currentBg = tab.dataset.bg;
      draw();
    });

    document.getElementById('dlBtn').addEventListener('click', () => {
      if (!tweetData) return;
      const now = new Date();
      const ts  = now.getFullYear()
        + String(now.getMonth() + 1).padStart(2, '0')
        + String(now.getDate()).padStart(2, '0')
        + '_' + String(now.getHours()).padStart(2, '0')
        + String(now.getMinutes()).padStart(2, '0');
      const a = document.createElement('a');
      a.href     = canvas.toDataURL('image/png');
      a.download = `x_post_${tweetData.username}_${ts}.png`;
      a.click();
    });

    document.getElementById('dlBtn1350').addEventListener('click', async () => {
      if (!tweetData) return;
      const TARGET_W = 1080, TARGET_H = 1350;
      const offCanvas = document.createElement('canvas');
      offCanvas.width  = TARGET_W;
      offCanvas.height = TARGET_H;
      const offCtx = offCanvas.getContext('2d');
      const scale   = TARGET_W / canvas.width;
      const scaledH = Math.round(canvas.height * scale);
      offCtx.fillStyle = currentBg;
      offCtx.fillRect(0, 0, TARGET_W, TARGET_H);
      if (scaledH <= TARGET_H) {
        const yOffset = Math.round((TARGET_H - scaledH) / 2);
        offCtx.drawImage(canvas, 0, yOffset, TARGET_W, scaledH);
      } else {
        const fitScale = TARGET_H / canvas.height;
        const fitW     = Math.round(canvas.width * fitScale);
        const xOffset  = Math.round((TARGET_W - fitW) / 2);
        offCtx.drawImage(canvas, xOffset, 0, fitW, TARGET_H);
      }
      const now = new Date();
      const ts  = now.getFullYear()
        + String(now.getMonth() + 1).padStart(2, '0')
        + String(now.getDate()).padStart(2, '0')
        + '_' + String(now.getHours()).padStart(2, '0')
        + String(now.getMinutes()).padStart(2, '0');
      const a = document.createElement('a');
      a.href     = offCanvas.toDataURL('image/png');
      a.download = `x_post_${tweetData.username}_1080x1350_${ts}.png`;
      a.click();
    });

    document.getElementById('showLogo').addEventListener('change', e => {
      showLogo = e.target.checked;
      draw();
    });

    draw();
  </script>
</body>
</html>
