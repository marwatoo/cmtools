      z-index: 2; display: flex; align-items: center;

<script>
(function(){
  const KEY = 'mts-theme';
  function getTheme(){
    return localStorage.getItem(KEY) ||
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
  }
  function applyTheme(t){
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem(KEY, t);
    const icon = document.querySelector('.theme-icon');
    if (icon) icon.textContent = t === 'dark' ? '☽' : '○';
  }
  applyTheme(getTheme());
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('themeToggle');
    if (btn) btn.addEventListener('click', () => {
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  });
})();

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchWithProxy(url) {
  for (const proxyFn of PROXIES) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 3000);
      const res = await fetch(proxyFn(url), { cache: 'no-store', signal: controller.signal });
      clearTimeout(timeout);
      if (res.ok) return res.text();
    } catch(e) {}
  }
  throw new Error('All proxies failed');
}

const CACHE_KEY = 'ytdeck-cache';
const CACHE_TTL = 5 * 60 * 1000;

function getCache() {
  try {
    return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
  } catch { return {}; }
}

function getCachedFeed(colKey) {
  const cache = getCache();
  const entry = cache[colKey];
  if (entry && Date.now() - entry.ts < CACHE_TTL) return entry.videos;
  return null;
}

function setCachedFeed(colKey, videos) {
  const cache = getCache();
  cache[colKey] = { ts: Date.now(), videos };
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch {}
}

const seen = {};

function getFeedUrl(channelId) {
  return `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
}

async function fetchFeed(col) {
  const feedUrl = getFeedUrl(col.channelId);
  const text = await fetchWithProxy(feedUrl, PROXIES);
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'application/xml');

  const parseError = xml.querySelector('parsererror');
  if (parseError) throw new Error('Invalid XML response');

  const entries = xml.querySelectorAll('entry');
  const videos = [];

  entries.forEach(entry => {
    const videoId = entry.getElementsByTagNameNS('http://www.youtube.com/xml/schemas/2015', 'videoId')[0]?.textContent;
    const title = entry.querySelector('title')?.textContent || '';
    const link = entry.querySelector('link[rel="alternate"]')?.getAttribute('href') || '';
    const published = entry.querySelector('published')?.textContent || '';
    const updated = entry.querySelector('updated')?.textContent || '';
    const author = entry.querySelector('author name')?.textContent || col.label;
    const authorUri = entry.querySelector('author uri')?.textContent || '';

    const mediaGroup = entry.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'group')[0];
    const thumbnail = mediaGroup?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'thumbnail')[0]?.getAttribute('url') || '';
    const description = mediaGroup?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'description')[0]?.textContent || '';
    const communityStats = mediaGroup?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'community')[0];
    const statistics = communityStats?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'statistics')[0];
    const views = parseInt(statistics?.getAttribute('views') || '0', 10);
    const starRating = communityStats?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'starRating')[0];
    const likes = parseInt(starRating?.getAttribute('count') || '0', 10);

    videos.push({
      videoId,
      title,
      link,
      published,
      updated,
      author,
      authorUri,
      thumbnail,
      description: description.replace(/<[^>]*>/g, '').trim(),
      views,
      likes,
      colKey: col.key,
    });
  });

  return videos;
}

function formatDate(ds) {
  if (!ds) return '';
  try {
    const d = new Date(ds);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60)   return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
    return d.toLocaleString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
  } catch(e) { return ds; }
}

function formatCount(n) {
  if (!n || n === 0) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.0', '') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1).replace('.0', '') + 'K';
  return n.toString();
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
  });
}

function isArabic(text) {
  return /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(text);
}

function createVideoCard(video) {
  const card = document.createElement('div');
  card.className = 'video-card';

  const thumbWrap = document.createElement('div');
  thumbWrap.className = 'video-thumb-wrap';

  const img = document.createElement('img');
  img.className = 'video-thumb';
  img.src = video.thumbnail;
  img.alt = video.title;
  img.loading = 'lazy';
  img.onerror = function(){ this.style.display='none'; };
  thumbWrap.appendChild(img);

  const playOverlay = document.createElement('div');
  playOverlay.className = 'video-play-overlay';
  const playIcon = document.createElement('div');
  playIcon.className = 'play-icon';
  playIcon.textContent = '▶';
  playOverlay.appendChild(playIcon);
  thumbWrap.appendChild(playOverlay);

  card.appendChild(thumbWrap);

  const info = document.createElement('div');
  info.className = 'video-info';

  const titleEl = document.createElement('div');
  titleEl.className = 'video-title';
  titleEl.textContent = video.title;
  if (isArabic(video.title)) titleEl.dir = 'rtl';
  info.appendChild(titleEl);

  const meta = document.createElement('div');
  meta.className = 'video-meta';
  const dateEl = document.createElement('span');
  dateEl.className = 'video-date';
  dateEl.textContent = formatDate(video.published);
  meta.appendChild(dateEl);
  info.appendChild(meta);

  const descEl = document.createElement('div');
  descEl.className = 'video-desc';
  descEl.textContent = video.description;
  if (isArabic(video.description)) descEl.dir = 'rtl';
  info.appendChild(descEl);

  const stats = document.createElement('div');
  stats.className = 'video-stats';
  stats.innerHTML = `
    <div class="video-stat stat-views"><span class="stat-icon">👁</span><span class="stat-count">${formatCount(video.views)} views</span></div>
    <div class="video-stat stat-likes"><span class="stat-icon">♥</span><span class="stat-count">${formatCount(video.likes)} likes</span></div>
  `;
  info.appendChild(stats);

  const actions = document.createElement('div');
  actions.className = 'video-actions';

  const copyLinkBtn = document.createElement('button');
  copyLinkBtn.className = 'video-btn';
  copyLinkBtn.textContent = 'Copy Link';
  copyLinkBtn.addEventListener('click', e => { e.stopPropagation(); copyText(video.link, copyLinkBtn); });
  actions.appendChild(copyLinkBtn);

  const openBtn = document.createElement('a');
  openBtn.className = 'video-btn open-yt';
  openBtn.textContent = '↗ Watch';
  openBtn.href = video.link;
  openBtn.target = '_blank'; openBtn.rel = 'noopener';
  openBtn.addEventListener('click', e => e.stopPropagation());
  actions.appendChild(openBtn);

  info.appendChild(actions);
  card.appendChild(info);

  card.addEventListener('click', () => openModal(video));
  return card;
}

function openModal(video) {
  const overlay = document.getElementById('modalOverlay');
  const body    = document.getElementById('modalBody');
  body.innerHTML = '';

  const videoWrap = document.createElement('div');
  videoWrap.className = 'modal-video-wrap';

  const thumb = document.createElement('img');
  thumb.src = video.thumbnail;
  thumb.alt = video.title;
  videoWrap.appendChild(thumb);

  const playWrap = document.createElement('div');
  playWrap.className = 'modal-video-play';
  playWrap.addEventListener('click', () => window.open(video.link, '_blank'));
  const playSpan = document.createElement('span');
  playSpan.textContent = '▶';
  playWrap.appendChild(playSpan);
  videoWrap.appendChild(playWrap);

  body.appendChild(videoWrap);

  const titleEl = document.createElement('div');
  titleEl.className = 'modal-title';
  titleEl.textContent = video.title;
  if (isArabic(video.title)) titleEl.dir = 'rtl';
  body.appendChild(titleEl);

  const channelEl = document.createElement('div');
  channelEl.className = 'modal-channel';
  channelEl.textContent = video.author;
  body.appendChild(channelEl);

  const statsRow = document.createElement('div');
  statsRow.className = 'modal-stats';
  statsRow.innerHTML = `
    <div class="modal-stat stat-views"><span class="stat-icon">👁</span><span class="stat-count">${formatCount(video.views)} views</span></div>
    <div class="modal-stat stat-likes"><span class="stat-icon">♥</span><span class="stat-count">${formatCount(video.likes)} likes</span></div>
  `;
  body.appendChild(statsRow);

  if (video.description) {
    const descEl = document.createElement('div');
    descEl.className = 'modal-desc';
    descEl.textContent = video.description;
    if (isArabic(video.description)) descEl.dir = 'rtl';
    body.appendChild(descEl);
  }

  const footer = document.createElement('div');
  footer.className = 'modal-footer';
  const date = document.createElement('div');
  date.className = 'modal-date';
  date.textContent = formatDate(video.published);
  footer.appendChild(date);

  const copyBtn = document.createElement('button');
  copyBtn.className = 'modal-copy-btn';
  copyBtn.textContent = 'Copy Link';
  copyBtn.addEventListener('click', () => copyText(video.link, copyBtn));
  footer.appendChild(copyBtn);

  const openBtn = document.createElement('a');
  openBtn.className = 'modal-open-btn';
  openBtn.href = video.link;
  openBtn.target = '_blank'; openBtn.rel = 'noopener';
  openBtn.textContent = '↗ Watch on YouTube';
  footer.appendChild(openBtn);
  body.appendChild(footer);

  overlay.classList.remove('hidden');
}

document.getElementById('modalClose').addEventListener('click', () =>
  document.getElementById('modalOverlay').classList.add('hidden'));
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.add('hidden');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.add('hidden');
});

function getLowViewWeek() {
  const now = new Date();
  const dayOfWeek = now.getDay();
  const mostRecentSunday = new Date(now);
  mostRecentSunday.setDate(now.getDate() - dayOfWeek);
  mostRecentSunday.setHours(23, 59, 59, 999);
  const start = new Date(mostRecentSunday);
  start.setDate(mostRecentSunday.getDate() - 4);
  start.setHours(0, 0, 0, 0);
  return { start, end: mostRecentSunday };
}

async function openStatsModal() {
  const overlay = document.getElementById('modalOverlay');
  const body = document.getElementById('modalBody');
  const week = getLowViewWeek();
  const startStr = week.start.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  const endStr = week.end.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });

  body.innerHTML = `
    <div class="stats-header">Videos sous 5K vues</div>
    <div class="stats-subtitle">Semaine du ${startStr} au ${endStr}</div>
    <div class="stats-loading">Chargement des donnÃ©es...</div>
  `;
  overlay.classList.remove('hidden');

  let total = 0;
  const channelResults = [];

  for (const col of COLUMNS) {
    try {
      let videos;
      const cached = getCachedFeed(col.key);
      if (cached) {
        videos = cached;
      } else {
        videos = await fetchFeed(col);
      }

      const lowViewVideos = videos.filter(v => {
        const pubDate = new Date(v.published);
        return v.views < 5000 && pubDate >= week.start && pubDate <= week.end;
      });

      if (lowViewVideos.length > 0) {
        channelResults.push({ label: col.label, videos: lowViewVideos });
        total += lowViewVideos.length;
      }
    } catch(e) {
      console.warn('Stats fetch failed for', col.key, e);
    }
  }

  body.innerHTML = '';

  const header = document.createElement('div');
  header.className = 'stats-header';
  header.textContent = 'Videos sous 5K vues';
  body.appendChild(header);

  const subtitle = document.createElement('div');
  subtitle.className = 'stats-subtitle';
  subtitle.textContent = `Semaine du ${startStr} au ${endStr}`;
  body.appendChild(subtitle);

  if (channelResults.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:var(--text3);';
    empty.textContent = 'Aucune video sous 5K vues cette semaine';
    body.appendChild(empty);
  } else {
    for (const cr of channelResults) {
      const chDiv = document.createElement('div');
      chDiv.className = 'stats-channel';

      const chTitle = document.createElement('div');
      chTitle.className = 'stats-channel-title';
      chTitle.textContent = cr.label;
      chDiv.appendChild(chTitle);

      cr.videos.forEach((v, i) => {
        const vidDiv = document.createElement('div');
        vidDiv.className = 'stats-video';
        vidDiv.style.cursor = 'pointer';

        const num = document.createElement('span');
        num.className = 'stats-video-num';
        num.textContent = `${i + 1}.`;
        vidDiv.appendChild(num);

        const title = document.createElement('span');
        title.className = 'stats-video-title';
        title.textContent = v.title;
        if (isArabic(v.title)) title.dir = 'rtl';
        vidDiv.appendChild(title);

        const views = document.createElement('span');
        views.className = 'stats-video-views';
        views.textContent = `(${formatCount(v.views)} vues)`;
        vidDiv.appendChild(views);

        vidDiv.addEventListener('click', () => {
          document.getElementById('modalOverlay').classList.add('hidden');
          setTimeout(() => openModal(v), 100);
        });

        chDiv.appendChild(vidDiv);
      });

      body.appendChild(chDiv);
    }

    const totalEl = document.createElement('div');
    totalEl.className = 'stats-total';
    totalEl.textContent = `Total: ${total} video(s)`;
    body.appendChild(totalEl);
  }
}

document.getElementById('statsBtn').addEventListener('click', openStatsModal);

const container = document.getElementById('deckContainer');

COLUMNS.forEach(col => {
  seen[col.key] = new Set();

  const colEl = document.createElement('div');
  colEl.className = 'deck-column';
  colEl.id = `col-${col.key}`;
  const initial = col.label.charAt(0).toUpperCase();
  colEl.innerHTML = `
    <div class="deck-col-header">
      <div class="col-avatar" id="avatar-${col.key}">${initial}</div>
      <div>
        <h2>${col.label}</h2>
        <div class="handle">${col.handle}</div>
      </div>
      <span class="deck-col-badge"><span class="deck-pulse"></span>live</span>
    </div>
    <div class="deck-col-feed" id="feed-${col.key}">
      <div class="deck-loading">Loading…</div>
    </div>`;
  container.appendChild(colEl);
});

async function updateColumn(col) {
  const feed = document.getElementById(`feed-${col.key}`);
  try {
    const videos = await fetchFeed(col);
    setCachedFeed(col.key, videos.map(v => ({ ...v })));

    if (col.avatar) {
      const avatarEl = document.getElementById(`avatar-${col.key}`);
      if (avatarEl && avatarEl.tagName === 'DIV') {
        const img = document.createElement('img');
        img.className = 'col-avatar';
        img.src = col.avatar;
        img.alt = col.label;
        img.onerror = function() {
          this.style.display = 'none';
          const fallback = document.createElement('div');
          fallback.className = 'col-avatar';
          fallback.textContent = col.label.charAt(0).toUpperCase();
          avatarEl.parentNode.replaceChild(fallback, this);
        };
        avatarEl.parentNode.replaceChild(img, avatarEl);
      }
    }

    const fresh = videos.filter(v => v.videoId && !seen[col.key].has(v.videoId));
    if (!fresh.length) return;

    const loader = feed.querySelector('.deck-loading');
    if (loader) loader.remove();

    const frag = document.createDocumentFragment();
    fresh.forEach(v => {
      frag.appendChild(createVideoCard(v));
      seen[col.key].add(v.videoId);
    });
    feed.insertBefore(frag, feed.firstChild);
  } catch(e) {
    const loader = feed.querySelector('.deck-loading');
    if (loader) {
      loader.innerHTML = '';
      const msg = document.createElement('div');
      msg.textContent = '⚠ Failed to load';
      msg.style.cssText = 'margin-bottom:8px;font-size:0.8rem;color:var(--text3);';
      const btn = document.createElement('button');
      btn.textContent = '↺ Retry';
      btn.style.cssText = 'font-size:0.72rem;padding:5px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;';
      btn.onmouseenter = () => btn.style.borderColor = 'var(--accent)';
      btn.onmouseleave = () => btn.style.borderColor = 'var(--border2)';
      btn.onclick = () => { loader.textContent = 'Retrying…'; updateColumn(col); };
      loader.appendChild(msg);
      loader.appendChild(btn);
    }
    console.warn('Feed error', col.key, e);
  }
}

function updateLoop(background = false) {
  COLUMNS.forEach((col, i) => {
    setTimeout(() => {
      if (!background) {
        const cached = getCachedFeed(col.key);
        if (cached) {
          const feed = document.getElementById(`feed-${col.key}`);
          const loader = feed.querySelector('.deck-loading');
          if (loader) loader.remove();

          if (col.avatar) {
            const avatarEl = document.getElementById(`avatar-${col.key}`);
            if (avatarEl && avatarEl.tagName === 'DIV') {
              const img = document.createElement('img');
              img.className = 'col-avatar';
              img.src = col.avatar;
              img.alt = col.label;
              img.onerror = function() {
                this.style.display = 'none';
                const fallback = document.createElement('div');
                fallback.className = 'col-avatar';
                fallback.textContent = col.label.charAt(0).toUpperCase();
                avatarEl.parentNode.replaceChild(fallback, this);
              };
              avatarEl.parentNode.replaceChild(img, avatarEl);
            }
          }

          cached.forEach(v => {
            if (v.videoId && !seen[col.key].has(v.videoId)) {
              feed.appendChild(createVideoCard(v));
              seen[col.key].add(v.videoId);
            }
          });
        }
      }
      updateColumn(col);
    }, i * 50);
  });
  if (!background) {
    setTimeout(() => updateLoop(true), 60000);
  }
}

updateLoop(false);
</script>
