<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Deck — MediaTools Studio</title>
  <link rel="preconnect" href="https://api.allorigins.win">
  <link rel="preconnect" href="https://corsproxy.io">
  <link rel="preconnect" href="https://api.codetabs.com">
  <link rel="preconnect" href="https://www.youtube.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0f; --bg2:#111118; --bg3:#1a1a24;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
      --text:#e8e8f0; --text2:#8888a8; --text3:#555570;
      --accent:#e8ff47; --accent2:#7c6bff; --accent3:#ff6b6b;
      --card-bg:#13131c; --card-hover:#1e1e2e;
      --btn-bg:#e8ff47; --btn-text:#0a0a0f;
      --shadow:0 4px 32px rgba(0,0,0,0.5);
      --radius:16px; --radius-sm:10px; --radius-xs:6px;
      --yt-red:#ff0033;
    }
    [data-theme="light"] {
      --bg:#f4f4f0; --bg2:#ffffff; --bg3:#ebebeb;
      --border:rgba(0,0,0,0.07); --border2:rgba(0,0,0,0.13);
      --text:#111118; --text2:#555570; --text3:#aaaacc;
      --accent:#3a2fff; --accent2:#7c6bff; --accent3:#ff4444;
      --card-bg:#ffffff; --card-hover:#f0f0ff;
      --btn-bg:#111118; --btn-text:#ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; min-height: 100vh;
      transition: background 0.3s, color 0.3s;
      -webkit-font-smoothing: antialiased;
    }

    .nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 12px;
      padding: 14px 24px;
      background: var(--bg); border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--text2); text-decoration: none;
      font-size: 0.85rem; font-weight: 500;
      padding: 6px 12px; border: 1px solid var(--border2);
      border-radius: var(--radius-xs); transition: all 0.2s;
    }
    .nav-back:hover { color: var(--text); border-color: var(--accent); }
    .nav-stats {
      display: flex; align-items: center; gap: 6px;
      color: var(--text2); text-decoration: none;
      font-size: 0.85rem; font-weight: 500;
      padding: 6px 12px; border: 1px solid var(--border2);
      border-radius: var(--radius-xs); transition: all 0.2s;
      background: transparent; cursor: pointer; font-family: inherit;
    }
    .nav-stats:hover { color: var(--text); border-color: var(--yt-red); }
    .nav-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1rem; flex: 1;
    }
    .theme-toggle {
      width: 38px; height: 38px;
      border: 1px solid var(--border2); border-radius: 50%;
      background: transparent; color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all 0.2s;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    .deck-container {
      display: flex; overflow-x: auto;
      height: calc(100vh - 57px);
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .deck-column {
      flex: 1 1 0; min-width: 280px; max-width: 420px;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      background: var(--bg2); overflow: hidden;
    }
    .deck-col-header {
      position: sticky; top: 0;
      padding: 14px 16px; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      z-index: 2; display: flex; align-items: center;
      gap: 10px; justify-content: space-between; flex-shrink: 0;
    }
    .col-avatar-wrap {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      background: var(--yt-red); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .col-avatar-initial {
      color: #fff; font-size: 0.75rem; font-weight: 700;
      font-family: 'Syne', sans-serif; line-height: 1;
    }
    .col-avatar-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
    }
    .col-header-text { flex: 1; min-width: 0; }
    .deck-col-header h2 {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.95rem; color: var(--yt-red);
    }
    .deck-col-header .handle {
      font-size: 0.72rem; color: var(--text3); margin-top: 2px;
    }
    .deck-col-badge {
      font-size: 0.7rem; padding: 2px 8px;
      background: var(--bg3); border-radius: 100px; color: var(--text2);
      display: flex; align-items: center; gap: 4px;
    }
    .deck-pulse {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: var(--yt-red);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .deck-col-feed {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .deck-loading {
      padding: 24px 16px; text-align: center;
      font-size: 0.8rem; color: var(--text3);
    }

    .video-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0;
      margin-bottom: 10px; cursor: pointer; overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
    }
    .video-card:hover { background: var(--card-hover); border-color: var(--border2); }

    .video-thumb-wrap {
      position: relative; width: 100%; aspect-ratio: 16/9;
      background: var(--bg3); overflow: hidden;
    }
    .video-thumb {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .video-duration {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.8); color: #fff;
      font-size: 0.7rem; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
    }
    .video-play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0); transition: background 0.2s;
    }
    .video-card:hover .video-play-overlay { background: rgba(0,0,0,0.3); }
    .play-icon {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(0,0,0,0.7); display: flex;
      align-items: center; justify-content: center;
      color: #fff; font-size: 1rem; opacity: 0;
      transition: opacity 0.2s;
    }
    .video-card:hover .play-icon { opacity: 1; }

    .video-info { padding: 12px; }

    .video-title {
      font-size: 0.85rem; font-weight: 500;
      color: var(--text); line-height: 1.4;
      margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .video-meta {
      display: flex; align-items: center; gap: 6px;
      margin-bottom: 8px;
    }
    .video-date {
      font-size: 0.72rem; color: var(--text3);
    }
    .video-channel {
      font-size: 0.72rem; color: var(--text3);
    }

    .video-stats {
      display: flex; gap: 12px;
      padding-top: 8px; border-top: 1px solid var(--border);
    }
    .video-stat {
      display: flex; align-items: center; gap: 4px;
      font-size: 0.72rem; color: var(--text3);
    }
    .video-stat .stat-icon { font-size: 0.8rem; }
    .video-stat .stat-count { font-weight: 500; }
    .stat-views .stat-icon { color: var(--accent2); }
    .stat-likes .stat-icon { color: var(--yt-red); }

    .video-desc {
      font-size: 0.78rem; color: var(--text2);
      line-height: 1.5; margin-bottom: 8px;
      white-space: pre-wrap;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .video-actions {
      display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px;
    }
    .video-btn {
      font-size: 0.68rem; padding: 4px 9px;
      border: 1px solid var(--border2); border-radius: var(--radius-xs);
      background: var(--bg3); color: var(--text2); cursor: pointer;
      transition: all 0.15s; font-family: 'DM Sans', sans-serif;
    }
    .video-btn:hover { border-color: var(--accent); color: var(--accent); }
    .video-btn.open-yt { color: var(--yt-red); }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.78);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px; backdrop-filter: blur(5px);
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border2);
      border-radius: var(--radius); max-width: 720px; width: 100%;
      max-height: 90vh; overflow-y: auto; padding: 24px;
      position: relative; scrollbar-width: thin;
      scrollbar-color: var(--accent) var(--bg);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text2); width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 10;
    }
    .modal-close:hover { color: var(--text); border-color: var(--accent); }
    .modal-video-wrap {
      width: 100%; aspect-ratio: 16/9; border-radius: 10px;
      background: var(--bg3); margin-bottom: 16px; overflow: hidden;
      position: relative;
    }
    .modal-video-wrap img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .modal-video-play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.3); cursor: pointer;
    }
    .modal-video-play span {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(0,0,0,0.7); display: flex;
      align-items: center; justify-content: center;
      color: #fff; font-size: 1.4rem;
    }
    .modal-title {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1.1rem; color: var(--text);
      line-height: 1.4; margin-bottom: 8px;
    }
    .modal-channel {
      font-size: 0.85rem; color: var(--text2); margin-bottom: 12px;
    }
    .modal-stats {
      display: flex; gap: 14px; margin-bottom: 14px;
      padding: 10px 0; border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .modal-stat {
      display: flex; align-items: center; gap: 5px;
      font-size: 0.85rem; color: var(--text2);
    }
    .modal-stat .stat-icon { font-size: 0.9rem; }
    .modal-stat .stat-count { font-weight: 600; }
    .modal-desc {
      font-size: 0.88rem; color: var(--text2);
      line-height: 1.6; margin-bottom: 16px;
      white-space: pre-wrap;
    }
    .modal-footer {
      display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap; border-top: 1px solid var(--border);
      padding-top: 14px; margin-top: 4px;
    }
    .modal-date { font-size: 0.78rem; color: var(--text3); flex: 1; }
    .modal-open-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: var(--radius-xs);
      background: var(--yt-red); color: #fff;
      font-size: 0.78rem; font-weight: 600; text-decoration: none;
      transition: opacity 0.2s;
    }
    .modal-open-btn:hover { opacity: 0.85; }
    .modal-copy-btn {
      padding: 7px 14px; border-radius: var(--radius-xs);
      border: 1px solid var(--border2); background: var(--bg3);
      color: var(--text2); font-size: 0.78rem; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .modal-copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .modal-copy-btn.copied { background: var(--accent); color: var(--btn-text); border-color: var(--accent); }

    .stats-header {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1.1rem; color: var(--text); margin-bottom: 4px;
    }
    .stats-subtitle {
      font-size: 0.82rem; color: var(--text3); margin-bottom: 16px;
    }
    .stats-channel {
      margin-bottom: 20px;
    }
    .stats-channel-title {
      font-family: 'Syne', sans-serif; font-weight: 600;
      font-size: 0.95rem; color: var(--yt-red); margin-bottom: 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--border);
    }
    .stats-video {
      padding: 8px 0; border-bottom: 1px solid var(--border);
      display: flex; align-items: baseline; gap: 8px;
    }
    .stats-video:last-child { border-bottom: none; }
    .stats-video-num {
      font-size: 0.72rem; color: var(--text3);
      min-width: 20px; flex-shrink: 0;
    }
    .stats-video-title {
      font-size: 0.82rem; color: var(--text);
      line-height: 1.4; flex: 1;
    }
    .stats-video-views {
      font-size: 0.72rem; color: var(--text2);
      white-space: nowrap; flex-shrink: 0;
    }
    .stats-loading {
      text-align: center; padding: 40px;
      color: var(--text3); font-size: 0.9rem;
    }
    .stats-total {
      margin-top: 16px; padding-top: 12px;
      border-top: 2px solid var(--border2);
      font-size: 0.9rem; font-weight: 600; color: var(--text);
    }
    .stats-date-range {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .stats-date-label {
      font-size: 0.78rem; color: var(--text2);
    }
    .stats-date-input {
      font-size: 0.78rem; padding: 4px 8px;
      border: 1px solid var(--border2); border-radius: var(--radius-xs);
      background: var(--bg3); color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }
    .stats-date-input::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }
    [data-theme="light"] .stats-date-input::-webkit-calendar-picker-indicator {
      filter: none;
    }
    .stats-apply-btn {
      font-size: 0.78rem; padding: 5px 14px;
      border: none; border-radius: var(--radius-xs);
      background: var(--yt-red); color: #fff;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-weight: 600; transition: opacity 0.2s;
    }
    .stats-apply-btn:hover { opacity: 0.85; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .deck-col-header, .deck-column, .video-card {
      opacity: 0; transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .deck-column:nth-of-type(1) { animation-delay: 0.1s; }
    .deck-column:nth-of-type(2) { animation-delay: 0.15s; }
    .deck-column:nth-of-type(3) { animation-delay: 0.2s; }
    .deck-column:nth-of-type(4) { animation-delay: 0.25s; }
    .deck-column:nth-of-type(5) { animation-delay: 0.3s; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ════════════════════════════════════════
       MOBILE — TAB-BASED SINGLE COLUMN VIEW
    ════════════════════════════════════════ */

    /* Tab bar — hidden on desktop */
    .mobile-tab-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: var(--bg2);
      border-top: 1px solid var(--border2);
      z-index: 90;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
      align-items: stretch;
    }
    .mobile-tab-bar::-webkit-scrollbar { display: none; }

    .mobile-tab {
      flex: 0 0 auto;
      min-width: 72px;
      max-width: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 6px 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    .mobile-tab:hover { background: var(--bg3); }
    .mobile-tab.active { border-bottom-color: var(--yt-red); }

    .mobile-tab-avatar-wrap {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--yt-red); border: 1.5px solid var(--border2);
      position: relative; overflow: hidden; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s;
    }
    .mobile-tab.active .mobile-tab-avatar-wrap { border-color: var(--yt-red); }
    .mobile-tab-avatar-initial {
      color: #fff; font-size: 0.5rem; font-weight: 700;
      font-family: 'Syne', sans-serif; line-height: 1;
    }
    .mobile-tab-avatar-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border-radius: 50%; object-fit: cover;
    }
    .mobile-tab.active .mobile-tab-avatar { border-color: var(--yt-red); }

    .mobile-tab-label {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.55rem;
      color: var(--text3);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
      line-height: 1;
      transition: color 0.15s;
    }
    .mobile-tab.active .mobile-tab-label { color: var(--yt-red); }

    /* Slide animations for tab switching */
    @keyframes slideInFromRight { from { transform: translateX(28px); opacity:0; } to { transform: translateX(0); opacity:1; } }
    @keyframes slideInFromLeft  { from { transform: translateX(-28px); opacity:0; } to { transform: translateX(0); opacity:1; } }
    .deck-column.slide-from-right { animation: slideInFromRight 0.22s cubic-bezier(0.4,0,0.2,1) forwards; }
    .deck-column.slide-from-left  { animation: slideInFromLeft  0.22s cubic-bezier(0.4,0,0.2,1) forwards; }

    @media (max-width: 700px) {

      /* Kill the fadeUp re-trigger when columns are shown/hidden via mobile-active */
      .deck-column {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      /* Nav: tighten up */
      .nav { padding: 10px 14px; gap: 8px; }
      .nav-back  { padding: 5px 9px; font-size: 0.78rem; }
      .nav-stats { padding: 5px 9px; font-size: 0.78rem; }
      .nav-title { font-size: 0.88rem; }
      .nav-x-icon { display: none; }
      .theme-toggle { width: 32px; height: 32px; font-size: 0.88rem; }

      /* Show tab bar */
      .mobile-tab-bar { display: flex; }

      /* Deck: vertical single column mode */
      .deck-container {
        display: block;
        height: calc(100vh - 53px);
        overflow: hidden;
        position: relative;
      }

      /* Each column: absolute, hidden by default */
      .deck-column {
        position: absolute;
        inset: 0;
        min-width: unset;
        max-width: unset;
        width: 100%;
        border-right: none;
        display: none;
        flex-direction: column;
        padding-bottom: 56px; /* tab bar height */
      }
      .deck-column.mobile-active { display: flex; }

      /* Feed: scrollable, touch-friendly */
      .deck-col-feed {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 8px;
      }

      /* Column header compact */
      .deck-col-header { padding: 11px 14px; }
      .col-avatar-wrap { width: 28px; height: 28px; }
      .deck-col-header h2 { font-size: 0.88rem; }
      .deck-col-header .handle { font-size: 0.67rem; }

      /* Cards: compact */
      .video-info    { padding: 10px; }
      .video-title   { font-size: 0.82rem; }
      .video-desc    { font-size: 0.75rem; -webkit-line-clamp: 2; }
      .video-stat    { font-size: 0.7rem; }
      .video-btn     { font-size: 0.65rem; padding: 4px 8px; }

      /* Modal: bottom sheet */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal-box {
        max-width: 100%;
        width: 100%;
        max-height: 92vh;
        border-radius: var(--radius) var(--radius) 0 0;
        padding: 20px 18px 28px;
      }
      .modal-title { font-size: 0.98rem; }
      .modal-stats { gap: 10px; flex-wrap: wrap; }
      .modal-footer { flex-wrap: wrap; gap: 8px; }
      .modal-open-btn { flex: 1; justify-content: center; text-align: center; }
      .modal-copy-btn { flex: 1; text-align: center; }

      /* Stats date range: stack */
      .stats-date-range { gap: 6px; }
      .stats-date-input { font-size: 0.74rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-back">← Back</a>
    <button class="nav-stats" id="statsBtn">📊 Stats</button>
    <span class="nav-title">YT Deck</span>
    <span class="nav-x-icon" style="font-size:0.75rem;color:var(--text3);">via RSS</span>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
      <button class="theme-toggle" id="themeToggle"><span class="theme-icon">○</span></button>
    </div>
  </nav>

  <div class="deck-container" id="deckContainer"></div>

  <!-- Mobile tab bar — built by JS -->
  <div class="mobile-tab-bar" id="mobileTabBar"></div>

const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function fetchWithProxy(url) {
  for (const proxyFn of PROXIES) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 3000);
      const res = await fetch(proxyFn(url), { cache: 'no-store', signal: controller.signal });
      clearTimeout(timeout);
      if (res.ok) return res.text();
    } catch(e) {}
  }
  throw new Error('All proxies failed');
}

const CACHE_KEY = 'ytdeck-cache';
const CACHE_TTL = 5 * 60 * 1000;

function getCache() {
  try {
    return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
  } catch { return {}; }
}

function getCachedFeed(colKey) {
  const cache = getCache();
  const entry = cache[colKey];
  if (entry && Date.now() - entry.ts < CACHE_TTL) return entry.videos;
  return null;
}

function setCachedFeed(colKey, videos) {
  const cache = getCache();
  cache[colKey] = { ts: Date.now(), videos };
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch {}
}

function getFeedUrl(channelId) {
  return `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
}

async function fetchFeed(col) {
  const feedUrl = getFeedUrl(col.channelId);
  const text = await fetchWithProxy(feedUrl, PROXIES);
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'application/xml');

  const parseError = xml.querySelector('parsererror');
  if (parseError) throw new Error('Invalid XML response');

  const entries = xml.querySelectorAll('entry');
  const videos = [];

  entries.forEach(entry => {
    const videoId = entry.getElementsByTagNameNS('http://www.youtube.com/xml/schemas/2015', 'videoId')[0]?.textContent;
    const title = entry.querySelector('title')?.textContent || '';
    const link = entry.querySelector('link[rel="alternate"]')?.getAttribute('href') || '';
    const published = entry.querySelector('published')?.textContent || '';
    const updated = entry.querySelector('updated')?.textContent || '';
    const author = entry.querySelector('author name')?.textContent || col.label;
    const authorUri = entry.querySelector('author uri')?.textContent || '';

    const mediaGroup = entry.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'group')[0];
    const thumbnail = mediaGroup?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'thumbnail')[0]?.getAttribute('url') || '';
    const description = mediaGroup?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'description')[0]?.textContent || '';
    const communityStats = mediaGroup?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'community')[0];
    const statistics = communityStats?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'statistics')[0];
    const views = parseInt(statistics?.getAttribute('views') || '0', 10);
    const starRating = communityStats?.getElementsByTagNameNS('http://search.yahoo.com/mrss/', 'starRating')[0];
    const likes = parseInt(starRating?.getAttribute('count') || '0', 10);

    videos.push({
      videoId,
      title,
      link,
      published,
      updated,
      author,
      authorUri,
      thumbnail,
      description: description.replace(/<[^>]*>/g, '').trim(),
      views,
      likes,
      colKey: col.key,
    });
  });

  return videos;
}

function formatDate(ds) {
  if (!ds) return '';
  try {
    const d = new Date(ds);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60)   return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
    return d.toLocaleString('fr-FR', { day:'2-digit', month:'short', year:'numeric' });
  } catch(e) { return ds; }
}

function formatCount(n) {
  if (!n || n === 0) return '0';
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.0', '') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1).replace('.0', '') + 'K';
  return n.toString();
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = orig; }, 1400);
  });
}

function isArabic(text) {
  return /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(text);
}

      statsStartDate = new Date(saved.start);
      statsEndDate = new Date(saved.end);

}

function saveStatsDates() {

    }));

function getDefaultWeek() {
  const now = new Date();
  const end = new Date(now);
  end.setDate(now.getDate() - 2);
  end.setHours(23, 59, 59, 999);
  const start = new Date(now);
  start.setDate(now.getDate() - 6);
  start.setHours(0, 0, 0, 0);
  return { start, end };
}

async function loadStatsResults() {
  const body = document.getElementById('modalBody');
  const resultsDiv = document.getElementById('statsResults');
  const startStr = statsStartDate.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
  const endStr = statsEndDate.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });

  resultsDiv.innerHTML = `<div class="stats-loading">Chargement des données...</div>`;

  let total = 0;
  const channelResults = [];

  for (const col of COLUMNS) {
    try {
      let videos;
      const cached = getCachedFeed(col.key);
      if (cached) {
        videos = cached;
      } else {
        videos = await fetchFeed(col);
      }

      const lowViewVideos = videos.filter(v => {
        const pubDate = new Date(v.published);
        return v.views < 5000 && pubDate >= statsStartDate && pubDate <= statsEndDate;
      });

      if (lowViewVideos.length > 0) {
        channelResults.push({ label: col.label, videos: lowViewVideos });
        total += lowViewVideos.length;
      }
    } catch(e) {
      console.warn('Stats fetch failed for', col.key, e);
    }
  }

  resultsDiv.innerHTML = '';

  const subtitle = document.createElement('div');
  subtitle.className = 'stats-subtitle';
  subtitle.textContent = `Semaine du ${startStr} au ${endStr}`;
  resultsDiv.appendChild(subtitle);

  if (channelResults.length === 0) {
    const empty = document.createElement('div');
    empty.style.cssText = 'text-align:center;padding:40px;color:var(--text3);';
    empty.textContent = 'Aucune video sous 5K vues pour cette periode';
    resultsDiv.appendChild(empty);
  } else {
    for (const cr of channelResults) {
      const chDiv = document.createElement('div');
      chDiv.className = 'stats-channel';

      const chTitle = document.createElement('div');
      chTitle.className = 'stats-channel-title';
      chTitle.textContent = cr.label;
      chDiv.appendChild(chTitle);

      cr.videos.forEach((v, i) => {
        const vidDiv = document.createElement('div');
        vidDiv.className = 'stats-video';
        vidDiv.style.cursor = 'pointer';

        const num = document.createElement('span');
        num.className = 'stats-video-num';
        num.textContent = `${i + 1}.`;
        vidDiv.appendChild(num);

        const title = document.createElement('span');
        title.className = 'stats-video-title';
        title.textContent = v.title;
        if (isArabic(v.title)) title.dir = 'rtl';
        vidDiv.appendChild(title);

        const views = document.createElement('span');
        views.className = 'stats-video-views';
        views.textContent = `(${formatCount(v.views)} vues)`;

        vidDiv.addEventListener('click', () => {

        });

        chDiv.appendChild(vidDiv);

      resultsDiv.appendChild(chDiv);
    }

    const totalEl = document.createElement('div');

async function loadAvatar(col) {
  try {
    const html = await fetchWithProxy(`https://www.youtube.com/@${col.handle.slice(1)}`);

    // Try multiple extraction strategies for robustness
    const strategies = [
      // Strategy 1: avatar thumbnails block
      /"avatar"\s*:\s*\{\s*"thumbnails"\s*:\s*\[([^\]]+)\]/,
      // Strategy 2: channel thumbnail with higher res
      /"thumbnails"\s*:\s*\[\s*\{\s*"url"\s*:\s*"([^"]*yt3\.ggpht\.com[^"]*)"/,
      // Strategy 3: c4 or channel banner fallback
      /"channelId"\s*:\s*"([^"]+)"[^}]*"avatar"/,
      // Strategy 4: og:image meta tag
      /<meta\s+property="og:image"\s+content="([^"]+)"/,
    ];

    let avatarUrl = '';

    for (const pattern of strategies) {
      const match = html.match(pattern);
      if (match) {
        if (pattern === strategies[0]) {
          // Extract URL from thumbnails array
          const urls = match[1].match(/"url"\s*:\s*"([^"]+)"/g);
          if (urls && urls.length) {
            avatarUrl = urls[urls.length - 1].replace(/"url"\s*:\s*"/, '').replace(/"/g, '');
          }
        } else if (pattern === strategies[1] || pattern === strategies[3]) {
          avatarUrl = match[1];
        }
        if (avatarUrl) break;
      }
    }

    // Clean up URL escape sequences
    avatarUrl = avatarUrl
      .replace(/\\u0026/g, '&')
      .replace(/\\\//g, '/')
      .replace(/\\u/g, '')
      .trim();

    if (avatarUrl) {
      setAvatar(col.key, avatarUrl);
      return;
    }

    // Fallback: construct avatar URL from channel page content or use a default
    throw new Error('No avatar found in page');
  } catch(e) {
    // Leave the initial visible as fallback
    console.warn('Avatar fetch failed for', col.key, e);
  }
}

async function updateColumn(col) {
  const feed = document.getElementById(`feed-${col.key}`);
  try {
    const videos = await fetchFeed(col);
    setCachedFeed(col.key, videos.map(v => ({ ...v })));

    const fresh = videos.filter(v => v.videoId && !seen[col.key].has(v.videoId));
    if (!fresh.length) return;

    const loader = feed.querySelector('.deck-loading');
    if (loader) loader.remove();

    const frag = document.createDocumentFragment();
    fresh.forEach(v => {
      frag.appendChild(createVideoCard(v));
      seen[col.key].add(v.videoId);
    });
    feed.insertBefore(frag, feed.firstChild);
  } catch(e) {
    const loader = feed.querySelector('.deck-loading');
    if (loader) {
      loader.innerHTML = '';
      const msg = document.createElement('div');
      msg.textContent = '⚠ Failed to load';
      msg.style.cssText = 'margin-bottom:8px;font-size:0.8rem;color:var(--text3);';
      const btn = document.createElement('button');
      btn.textContent = '↺ Retry';
      btn.style.cssText = 'font-size:0.72rem;padding:5px 12px;border:1px solid var(--border2);border-radius:6px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:inherit;';
      btn.onmouseenter = () => btn.style.borderColor = 'var(--accent)';
      btn.onmouseleave = () => btn.style.borderColor = 'var(--border2)';
      btn.onclick = () => { loader.textContent = 'Retrying…'; updateColumn(col); };
      loader.appendChild(msg);
      loader.appendChild(btn);
    }
    console.warn('Feed error', col.key, e);
  }
}

function updateLoop(background = false) {
  COLUMNS.forEach((col, i) => {
    setTimeout(() => {
      if (!background) {
        loadAvatar(col);
        const cached = getCachedFeed(col.key);
        if (cached && cached.length) {
          const feed = document.getElementById(`feed-${col.key}`);
          const loader = feed.querySelector('.deck-loading');
          if (loader) loader.remove();

          cached.forEach(v => {
            if (v.videoId && !seen[col.key].has(v.videoId)) {
              feed.appendChild(createVideoCard(v));
              seen[col.key].add(v.videoId);
            }
          });
          // Cache rendered — schedule a background refresh instead of loading again immediately
          setTimeout(() => updateColumn(col), 2000 + i * 200);
          return;
        }
      }
      updateColumn(col);
    }, i * 50);
  });
  if (!background) {
    setTimeout(() => updateLoop(true), 60000);
  }
}

// ═══════════════════════════════════════════
//  MOBILE TAB BAR
// ═══════════════════════════════════════════
const IS_MOBILE = () => window.innerWidth <= 700;

let mobileActiveIndex = 0;

function buildMobileTabs() {
  const bar = document.getElementById('mobileTabBar');
  bar.innerHTML = '';

  COLUMNS.forEach((col, i) => {
    const tab = document.createElement('div');
    tab.className = 'mobile-tab' + (i === 0 ? ' active' : '');
    tab.dataset.index = i;

    const avatarWrap = document.createElement('div');
    avatarWrap.className = 'mobile-tab-avatar-wrap';
    avatarWrap.id = `tab-avatar-${col.key}`;

    const initial = document.createElement('span');
    initial.className = 'mobile-tab-avatar-initial';
    initial.textContent = col.label.charAt(0);

    const avatarImg = document.createElement('img');
    avatarImg.className = 'mobile-tab-avatar-img';
    avatarImg.alt = col.label;

    avatarWrap.appendChild(initial);
    avatarWrap.appendChild(avatarImg);

    const label = document.createElement('span');
    label.className = 'mobile-tab-label';
    label.textContent = col.label;

    tab.appendChild(avatarWrap);
    tab.appendChild(label);

    tab.addEventListener('click', () => switchMobileTab(i));
    bar.appendChild(tab);
  });
}

function switchMobileTab(newIndex, direction) {
  if (!IS_MOBILE()) return;
  if (newIndex === mobileActiveIndex) return;

  const dir = direction !== undefined ? direction : (newIndex > mobileActiveIndex ? 'right' : 'left');
  const animClass = dir === 'right' ? 'slide-from-right' : 'slide-from-left';

  // Hide current
  const oldCol = document.getElementById(`col-${COLUMNS[mobileActiveIndex].key}`);
  if (oldCol) oldCol.classList.remove('mobile-active');

  // Show new with animation
  const newCol = document.getElementById(`col-${COLUMNS[newIndex].key}`);
  if (newCol) {
    newCol.classList.add('mobile-active');
    newCol.classList.remove('slide-from-right', 'slide-from-left');
    void newCol.offsetWidth; // force reflow
    newCol.classList.add(animClass);
    setTimeout(() => newCol.classList.remove(animClass), 300);
  }

  // Update tabs
  document.querySelectorAll('.mobile-tab').forEach((t, i) => t.classList.toggle('active', i === newIndex));

  // Scroll active tab into view in bar
  const tabs = document.querySelectorAll('.mobile-tab');
  if (tabs[newIndex]) tabs[newIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  mobileActiveIndex = newIndex;
}

function applyMobileLayout() {
  if (IS_MOBILE()) {
    // Show only the active column
    COLUMNS.forEach((col, i) => {
      const el = document.getElementById(`col-${col.key}`);
      if (el) el.classList.toggle('mobile-active', i === mobileActiveIndex);
    });
  } else {
    // Desktop: show all columns normally
    COLUMNS.forEach(col => {
      const el = document.getElementById(`col-${col.key}`);
      if (el) el.classList.remove('mobile-active');
    });
  }
}

// Sync tab avatars when column avatars load
// Touch swipe between columns
(function initSwipe() {
  const container = document.getElementById('deckContainer');
  let touchStartX = 0;
  let touchStartY = 0;
  let swiping = false;

  container.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    swiping = false;
  }, { passive: true });

  container.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    // Only treat as horizontal swipe if clearly more horizontal than vertical
    if (!swiping && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) {
      swiping = true;
    }
  }, { passive: true });

  container.addEventListener('touchend', e => {
    if (!IS_MOBILE() || !swiping) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const THRESHOLD = 60;
    if (dx < -THRESHOLD && mobileActiveIndex < COLUMNS.length - 1) {
      switchMobileTab(mobileActiveIndex + 1, 'right');
    } else if (dx > THRESHOLD && mobileActiveIndex > 0) {
      switchMobileTab(mobileActiveIndex - 1, 'left');
    }
    swiping = false;
  }, { passive: true });
})();

// Handle resize: switch between desktop/mobile layout
window.addEventListener('resize', () => {
  applyMobileLayout();
});

buildMobileTabs();
applyMobileLayout();

updateLoop(false);
</script>
