<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Palette Generator — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
      --text:#e8e8f0;--text2:#8888a8;--text3:#555570;
      --accent:#e8ff47;--accent2:#7c6bff;--accent3:#ff6b6b;
      --card-bg:#13131c;--card-hover:#1e1e2e;--input-bg:#1a1a26;
      --btn-bg:#e8ff47;--btn-text:#0a0a0f;
      --radius:16px;--radius-sm:10px;--radius-xs:6px;
    }
    [data-theme="light"] {
      --bg:#f4f4f0;--bg2:#ffffff;--bg3:#ebebeb;
      --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
      --text:#111118;--text2:#555570;--text3:#aaaacc;
      --accent:#3a2fff;--accent2:#7c6bff;--accent3:#ff4444;
      --card-bg:#ffffff;--card-hover:#f0f0ff;--input-bg:#f8f8fc;
      --btn-bg:#111118;--btn-text:#ffffff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}
    .nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
    .nav-back{display:flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:.85rem;font-weight:500;padding:6px 12px;border:1px solid var(--border2);border-radius:var(--radius-xs);transition:all .2s}
    .nav-back:hover{color:var(--text);border-color:var(--accent)}
    .nav-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;flex:1}
    .theme-toggle{margin-left:auto;width:38px;height:38px;border:1px solid var(--border2);border-radius:50%;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
    .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

    .tool-page{max-width:760px;margin:0 auto;padding:32px 24px 80px}
    .tool-header{margin-bottom:28px}
    .tool-header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-.02em;margin-bottom:6px}
    .tool-header p{color:var(--text2);font-size:.9rem}
    .section-head{display:flex;align-items:center;gap:8px;font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin:22px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
    .section-head::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px;flex-shrink:0}

    /* Drop zone */
    .dropzone{border:2px dashed var(--border2);border-radius:var(--radius);padding:44px 24px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);position:relative;margin-bottom:20px}
    .dropzone:hover,.dropzone.drag-over{border-color:var(--accent);background:var(--card-hover)}
    .dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .dz-icon{font-size:2.2rem;margin-bottom:8px;opacity:.4}
    .dz-text{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;margin-bottom:4px}
    .dz-sub{font-size:.78rem;color:var(--text3)}

    /* Preview + palette layout */
    .result-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    .img-preview-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .img-preview-wrap img{width:100%;display:block;max-height:280px;object-fit:contain;background:repeating-conic-gradient(#33333366 0% 25%,transparent 0% 50%) 0 0/16px 16px}

    /* Palette display */
    .palette-strip{display:flex;height:60px;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:14px;border:1px solid var(--border)}
    .palette-strip-seg{flex:1;transition:flex .3s}
    .palette-strip-seg:hover{flex:2}

    /* Color swatches */
    .swatch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
    .swatch{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:all .15s}
    .swatch:hover{transform:translateY(-2px);border-color:var(--accent)}
    .swatch-color{height:64px;width:100%}
    .swatch-info{padding:8px 10px}
    .swatch-hex{font-family:'DM Mono',monospace;font-size:.78rem;font-weight:500;margin-bottom:2px}
    .swatch-rgb{font-size:.65rem;color:var(--text3)}
    .swatch-copy{font-size:.62rem;color:var(--text3);margin-top:3px;font-style:italic}
    .swatch.copied .swatch-copy{color:var(--accent)}

    /* Count selector */
    .count-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .count-row label{font-size:.78rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);white-space:nowrap}
    .count-btns{display:flex;gap:4px}
    .cnt-btn{padding:6px 12px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;font-size:.75rem;color:var(--text2);transition:all .15s}
    .cnt-btn:hover{border-color:var(--accent);color:var(--accent)}
    .cnt-btn.active{background:var(--btn-bg);color:var(--btn-text);border-color:var(--btn-bg)}

    /* Export buttons */
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s}
    .btn-primary{background:var(--btn-bg);color:var(--btn-text)}
    .btn-primary:hover{opacity:.88;transform:translateY(-1px)}
    .btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .btn-row{display:flex;gap:8px;flex-wrap:wrap}

    /* Export code */
    .code-block{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:14px;font-family:'DM Mono',monospace;font-size:.78rem;color:var(--text2);line-height:1.7;margin-top:12px;max-height:160px;overflow-y:auto;white-space:pre}

    .copy-feedback{font-size:.75rem;color:var(--accent);height:18px;margin-top:6px;text-align:center}

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .tool-header, .field, .btn, .result-layout, .color-grid, .preview-swatch {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.5s ease forwards;
    }
    .tool-header { animation-delay: 0.05s; }
    .field:nth-of-type(1) { animation-delay: 0.1s; }
    .btn { animation-delay: 0.15s; }
    .result-layout { animation-delay: 0.2s; }

    @media(max-width:620px){.result-layout{grid-template-columns:1fr}}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
  </style>
</head>
<body>
<nav class="nav">
  <a href="../index.html" class="nav-back">← Back</a>
  <span class="nav-title">Color Palette Generator</span>
  <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
</nav>
<div class="tool-page">
  <div class="tool-header">
    <h1>Color Palette Generator</h1>
    <p>Extract dominant colors from any image. Export as HEX, RGB, or CSS variables.</p>
  </div>

  <div class="dropzone" id="dropzone">
    <input type="file" id="fileInput" accept="image/*" />
    <div class="dz-icon">◈</div>
    <div class="dz-text">Drop an image or click to browse</div>
    <div class="dz-sub">JPG, PNG, WebP, GIF supported</div>
  </div>

  <div id="results" style="display:none">
    <!-- Count selector -->
    <div class="count-row">
      <label>Colors</label>
      <div class="count-btns" id="countBtns">
        <button class="cnt-btn" data-n="4">4</button>
        <button class="cnt-btn active" data-n="6">6</button>
        <button class="cnt-btn" data-n="8">8</button>
        <button class="cnt-btn" data-n="10">10</button>
        <button class="cnt-btn" data-n="12">12</button>
      </div>
    </div>

    <div class="result-layout">
      <!-- Image preview -->
      <div class="img-preview-wrap">
        <img id="previewImg" src="" alt="Preview" />
      </div>
      <!-- Palette strip -->
      <div>
        <p class="section-head" style="margin-top:0">Palette</p>
        <div class="palette-strip" id="paletteStrip"></div>
        <div class="swatch-grid" id="swatchGrid"></div>
      </div>
    </div>

    <!-- Export -->
    <p class="section-head">Export</p>
    <div class="btn-row">
      <button class="btn btn-secondary" id="exportHex">⧉ Copy HEX List</button>
      <button class="btn btn-secondary" id="exportRgb">⧉ Copy RGB List</button>
      <button class="btn btn-secondary" id="exportCss">⧉ Copy CSS Vars</button>
    </div>
    <div class="code-block" id="codeBlock"></div>
    <div class="copy-feedback" id="copyFeedback"></div>
  </div>

  <canvas id="hiddenCanvas" style="display:none"></canvas>
</div>

<script>
  (function(){const K='mts-theme',g=()=>localStorage.getItem(K)||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'),a=t=>{document.documentElement.setAttribute('data-theme',t);localStorage.setItem(K,t);const i=document.querySelector('.theme-icon');if(i)i.textContent=t==='dark'?'☽':'○'};a(g());document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('themeToggle');if(b)b.addEventListener('click',()=>a(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'))})})();

  let palette = [];
  let colorCount = 6;
  let imgData = null;

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const canvas = document.getElementById('hiddenCanvas');
  const ctx = canvas.getContext('2d');

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); loadFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => loadFile(fileInput.files[0]));

  function loadFile(f) {
    if (!f || !f.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        // Sample at max 200×200 for speed
        const scale = Math.min(200/img.naturalWidth, 200/img.naturalHeight, 1);
        canvas.width = Math.floor(img.naturalWidth * scale);
        canvas.height = Math.floor(img.naturalHeight * scale);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        document.getElementById('previewImg').src = e.target.result;
        extractPalette();
        document.getElementById('results').style.display = 'block';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(f);
  }

  /* Median-cut-ish quantization via k-means clustering */
  function extractPalette() {
    if (!imgData) return;
    const pixels = [];
    for (let i = 0; i < imgData.length; i += 4) {
      const r = imgData[i], g = imgData[i+1], b = imgData[i+2], a = imgData[i+3];
      if (a < 128) continue; // skip transparent
      pixels.push([r, g, b]);
    }
    palette = kMeans(pixels, colorCount);
    renderPalette();
  }

  function kMeans(pixels, k) {
    // Sample evenly for speed
    const sample = pixels.filter((_, i) => i % Math.floor(pixels.length / 2000 + 1) === 0);
    // Init centroids from evenly spaced samples
    let centroids = [];
    const step = Math.floor(sample.length / k);
    for (let i = 0; i < k; i++) centroids.push([...sample[i * step] || sample[0]]);

    for (let iter = 0; iter < 12; iter++) {
      const clusters = Array.from({length: k}, () => []);
      for (const p of sample) {
        let minD = Infinity, ci = 0;
        centroids.forEach((c, i) => {
          const d = (p[0]-c[0])**2 + (p[1]-c[1])**2 + (p[2]-c[2])**2;
          if (d < minD) { minD = d; ci = i; }
        });
        clusters[ci].push(p);
      }
      centroids = clusters.map(cl => {
        if (!cl.length) return [128,128,128];
        return [
          Math.round(cl.reduce((s,p)=>s+p[0],0)/cl.length),
          Math.round(cl.reduce((s,p)=>s+p[1],0)/cl.length),
          Math.round(cl.reduce((s,p)=>s+p[2],0)/cl.length),
        ];
      });
    }
    // Sort by luminance
    return centroids.sort((a,b) => (0.299*b[0]+0.587*b[1]+0.114*b[2]) - (0.299*a[0]+0.587*a[1]+0.114*a[2]));
  }

  function toHex(r,g,b){return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
  function textColor(r,g,b){return (0.299*r+0.587*g+0.114*b)>140?'#111':'#fff'}

  function renderPalette() {
    // Strip
    const strip = document.getElementById('paletteStrip');
    strip.innerHTML = '';
    palette.forEach(([r,g,b]) => {
      const seg = document.createElement('div');
      seg.className = 'palette-strip-seg';
      seg.style.background = toHex(r,g,b);
      strip.appendChild(seg);
    });

    // Swatches
    const grid = document.getElementById('swatchGrid');
    grid.innerHTML = '';
    palette.forEach(([r,g,b]) => {
      const hex = toHex(r,g,b);
      const tc = textColor(r,g,b);
      const sw = document.createElement('div');
      sw.className = 'swatch';
      sw.innerHTML = `<div class="swatch-color" style="background:${hex}"></div><div class="swatch-info"><div class="swatch-hex" style="color:${tc==='#111'?'var(--text)':'var(--text)'}">${hex.toUpperCase()}</div><div class="swatch-rgb">rgb(${r}, ${g}, ${b})</div><div class="swatch-copy">Click to copy</div></div>`;
      sw.addEventListener('click', () => {
        navigator.clipboard.writeText(hex.toUpperCase()).then(() => {
          sw.classList.add('copied');
          sw.querySelector('.swatch-copy').textContent = '✓ Copied!';
          setTimeout(() => { sw.classList.remove('copied'); sw.querySelector('.swatch-copy').textContent = 'Click to copy'; }, 1800);
        });
      });
      grid.appendChild(sw);
    });

    updateCodeBlock('hex');
  }

  /* Count buttons */
  document.getElementById('countBtns').addEventListener('click', e => {
    const btn = e.target.closest('.cnt-btn'); if (!btn) return;
    document.querySelectorAll('.cnt-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    colorCount = parseInt(btn.dataset.n);
    extractPalette();
  });

  /* Export */
  function updateCodeBlock(mode) {
    let code = '';
    if (mode === 'hex') {
      code = palette.map(([r,g,b]) => toHex(r,g,b).toUpperCase()).join('\n');
    } else if (mode === 'rgb') {
      code = palette.map(([r,g,b]) => `rgb(${r}, ${g}, ${b})`).join('\n');
    } else if (mode === 'css') {
      code = ':root {\n' + palette.map(([r,g,b],i) => `  --color-${i+1}: ${toHex(r,g,b).toUpperCase()};`).join('\n') + '\n}';
    }
    document.getElementById('codeBlock').textContent = code;
    return code;
  }

  function showFeedback(msg) {
    const fb = document.getElementById('copyFeedback');
    fb.textContent = msg;
    setTimeout(() => { fb.textContent = ''; }, 2000);
  }

  document.getElementById('exportHex').addEventListener('click', () => {
    const code = updateCodeBlock('hex');
    navigator.clipboard.writeText(code).then(() => showFeedback('✓ HEX list copied!'));
  });
  document.getElementById('exportRgb').addEventListener('click', () => {
    const code = updateCodeBlock('rgb');
    navigator.clipboard.writeText(code).then(() => showFeedback('✓ RGB list copied!'));
  });
  document.getElementById('exportCss').addEventListener('click', () => {
    const code = updateCodeBlock('css');
    navigator.clipboard.writeText(code).then(() => showFeedback('✓ CSS variables copied!'));
  });
</script>
</body>
</html>
