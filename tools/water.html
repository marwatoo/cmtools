<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watermark Tool — MediaTools Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;
      --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
      --text:#e8e8f0;--text2:#8888a8;--text3:#555570;
      --accent:#e8ff47;--accent2:#7c6bff;--accent3:#ff6b6b;
      --card-bg:#13131c;--card-hover:#1e1e2e;--input-bg:#1a1a26;
      --btn-bg:#e8ff47;--btn-text:#0a0a0f;
      --shadow:0 4px 32px rgba(0,0,0,0.5);
      --radius:16px;--radius-sm:10px;--radius-xs:6px;
    }
    [data-theme="light"] {
      --bg:#f4f4f0;--bg2:#ffffff;--bg3:#ebebeb;
      --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
      --text:#111118;--text2:#555570;--text3:#aaaacc;
      --accent:#3a2fff;--accent2:#7c6bff;--accent3:#ff4444;
      --card-bg:#ffffff;--card-hover:#f0f0ff;--input-bg:#f8f8fc;
      --btn-bg:#111118;--btn-text:#ffffff;
      --shadow:0 4px 32px rgba(0,0,0,0.12);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;-webkit-font-smoothing:antialiased}

    .nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;padding:14px 24px;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:blur(12px)}
    .nav-back{display:flex;align-items:center;gap:6px;color:var(--text2);text-decoration:none;font-size:.85rem;font-weight:500;padding:6px 12px;border:1px solid var(--border2);border-radius:var(--radius-xs);transition:all .2s}
    .nav-back:hover{color:var(--text);border-color:var(--accent)}
    .nav-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;flex:1}
    .theme-toggle{margin-left:auto;width:38px;height:38px;border:1px solid var(--border2);border-radius:50%;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s}
    .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}

    .editor-layout{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;padding:24px 24px 80px;max-width:1140px;margin:0 auto}
    .controls-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;position:sticky;top:73px}
    .editor-preview{min-width:0}

    .tool-header{padding:28px 24px 0;max-width:1140px;margin:0 auto}
    .tool-header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-.02em;margin-bottom:4px}
    .tool-header p{color:var(--text2);font-size:.9rem;margin-bottom:20px}

    .section-head{display:flex;align-items:center;gap:8px;font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin:18px 0 10px;padding-bottom:7px;border-bottom:1px solid var(--border)}
    .section-head::before{content:'';display:inline-block;width:3px;height:12px;background:var(--accent);border-radius:2px;flex-shrink:0}

    .field{margin-bottom:13px}
    .field label{display:block;font-size:.75rem;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--text2);margin-bottom:6px}
    .field input[type=text],.field input[type=number],.field select,.field textarea{width:100%;padding:9px 12px;background:var(--input-bg);border:1px solid var(--border2);border-radius:var(--radius-xs);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
    .field textarea{resize:vertical;min-height:64px}
    .field input[type=range]{width:100%;accent-color:var(--accent);margin-top:4px}
    .field input[type=color]{width:44px;height:32px;padding:2px;border:1px solid var(--border2);border-radius:var(--radius-xs);background:var(--input-bg);cursor:pointer;outline:none}
    .range-row{display:flex;align-items:center;gap:10px}
    .range-row input{flex:1}
    .range-val{font-size:.78rem;color:var(--text2);min-width:36px;text-align:right}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .color-row{display:flex;align-items:center;gap:8px}
    .color-row input[type=text]{flex:1}

    .mode-tabs{display:flex;gap:4px;background:var(--bg3);border-radius:var(--radius-sm);padding:4px;margin-bottom:14px}
    .mode-tab{flex:1;padding:7px 10px;border:none;background:transparent;color:var(--text2);font-family:'Syne',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border-radius:calc(var(--radius-sm) - 2px);transition:background .18s,color .18s}
    .mode-tab.active{background:var(--btn-bg);color:var(--btn-text)}
    .mode-tab:hover:not(.active){color:var(--text);background:var(--bg2)}

    .panel{display:none}.panel.active{display:block}

    .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 18px;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.92rem;cursor:pointer;transition:all .2s;width:100%}
    .btn-primary{background:var(--btn-bg);color:var(--btn-text)}
    .btn-primary:hover{opacity:.88;transform:translateY(-1px)}
    .btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2);margin-top:8px}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

    /* Preview */
    .preview-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .preview-topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border)}
    .preview-label{font-family:'Syne',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3)}
    .preview-meta{font-size:.72rem;color:var(--text3)}
    .canvas-wrap{padding:16px;display:flex;justify-content:center;align-items:center;min-height:360px;background:repeating-conic-gradient(var(--bg3) 0% 25%, transparent 0% 50%) 0 0 / 20px 20px}
    #mainCanvas{max-width:100%;max-height:500px;display:block;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.4)}

    .upload-zone{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:14px}
    .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:var(--card-hover)}
    .upload-icon{font-size:2rem;margin-bottom:8px;opacity:.5}
    .upload-text{font-size:.85rem;color:var(--text2)}
    .upload-text strong{color:var(--accent)}
    .upload-input{display:none}

    .pos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
    .pos-btn{padding:8px;border:1px solid var(--border2);border-radius:var(--radius-xs);background:var(--input-bg);color:var(--text3);cursor:pointer;font-size:.75rem;transition:all .15s;text-align:center}
    .pos-btn:hover{border-color:var(--accent);color:var(--accent)}
    .pos-btn.active{border-color:var(--accent);background:var(--accent);color:var(--btn-text);font-weight:700}

    @media(max-width:760px){.editor-layout{grid-template-columns:1fr}.controls-card{position:static}}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
  </style>
</head>
<body>
<nav class="nav">
  <a href="../index.html" class="nav-back">← Back</a>
  <span class="nav-title">Watermark Tool</span>
  <button class="theme-toggle" id="themeToggle"><span class="theme-icon">☽</span></button>
</nav>

<div class="tool-header">
  <h1>Watermark Tool</h1>
  <p>Add text or image watermarks to your photos — adjust position, opacity, size, and download instantly.</p>
</div>

<div class="editor-layout">
  <!-- Controls -->
  <div class="controls-card">
    <!-- Upload -->
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">🖼</div>
      <div class="upload-text"><strong>Click or drag</strong> an image here</div>
      <input type="file" id="imageInput" class="upload-input" accept="image/*" />
    </div>

    <!-- Watermark type -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-wm="text">Text</button>
      <button class="mode-tab" data-wm="image">Image</button>
    </div>

    <!-- Text Panel -->
    <div class="panel active" id="panel-text">
      <div class="field">
        <label>Watermark Text</label>
        <textarea id="wmText" placeholder="© Your Name 2025">© Your Name</textarea>
      </div>
      <div class="two-col">
        <div class="field">
          <label>Font Size</label>
          <div class="range-row">
            <input type="range" id="wmFontSize" min="8" max="120" value="32" />
            <span class="range-val" id="wmFontSizeVal">32</span>
          </div>
        </div>
        <div class="field">
          <label>Font Style</label>
          <select id="wmFont">
            <option value="Syne">Syne</option>
            <option value="DM Sans">DM Sans</option>
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier New</option>
            <option value="Impact">Impact</option>
          </select>
        </div>
      </div>
      <div class="two-col">
        <div class="field">
          <label>Color</label>
          <div class="color-row">
            <input type="color" id="wmColor" value="#ffffff" />
            <input type="text" id="wmColorHex" value="#ffffff" />
          </div>
        </div>
        <div class="field">
          <label>Bold / Italic</label>
          <select id="wmWeight">
            <option value="normal normal">Regular</option>
            <option value="bold normal" selected>Bold</option>
            <option value="normal italic">Italic</option>
            <option value="bold italic">Bold Italic</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Image Panel -->
    <div class="panel" id="panel-image">
      <div class="upload-zone" id="wmUploadZone" style="padding:24px 16px">
        <div class="upload-icon">🔖</div>
        <div class="upload-text"><strong>Click or drag</strong> watermark image (PNG recommended)</div>
        <input type="file" id="wmImageInput" class="upload-input" accept="image/*" />
      </div>
      <div class="field">
        <label>Watermark Size (%)</label>
        <div class="range-row">
          <input type="range" id="wmImgSize" min="5" max="80" value="25" />
          <span class="range-val" id="wmImgSizeVal">25%</span>
        </div>
      </div>
    </div>

    <!-- Shared controls -->
    <div class="section-head">Position & Style</div>

    <div class="field">
      <label>Position</label>
      <div class="pos-grid" id="posGrid">
        <button class="pos-btn" data-pos="top-left">↖ Top Left</button>
        <button class="pos-btn" data-pos="top-center">↑ Top Center</button>
        <button class="pos-btn" data-pos="top-right">↗ Top Right</button>
        <button class="pos-btn" data-pos="center-left">← Center</button>
        <button class="pos-btn active" data-pos="center">⊙ Center</button>
        <button class="pos-btn" data-pos="center-right">→ Center</button>
        <button class="pos-btn" data-pos="bottom-left">↙ Bottom Left</button>
        <button class="pos-btn" data-pos="bottom-center">↓ Bottom Center</button>
        <button class="pos-btn active2" data-pos="bottom-right">↘ Bottom Right</button>
      </div>
    </div>
    <div class="field">
      <label>Opacity</label>
      <div class="range-row">
        <input type="range" id="wmOpacity" min="5" max="100" value="55" />
        <span class="range-val" id="wmOpacityVal">55%</span>
      </div>
    </div>
    <div class="field">
      <label>Rotation (°)</label>
      <div class="range-row">
        <input type="range" id="wmRotation" min="-180" max="180" value="-30" />
        <span class="range-val" id="wmRotationVal">-30°</span>
      </div>
    </div>
    <div class="field">
      <label>Tile / Repeat</label>
      <select id="wmTile">
        <option value="single">Single</option>
        <option value="tile">Tiled</option>
      </select>
    </div>

    <div style="margin-top:16px">
      <button class="btn btn-primary" id="downloadBtn" disabled>⬇ Download Image</button>
      <button class="btn btn-secondary" id="clearBtn">✕ Clear</button>
    </div>
  </div>

  <!-- Preview -->
  <div class="editor-preview">
    <div class="preview-card">
      <div class="preview-topbar">
        <span class="preview-label">Preview</span>
        <span class="preview-meta" id="canvasDim">—</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="mainCanvas"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
(function(){const K='mts-theme',g=()=>localStorage.getItem(K)||(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark'),a=t=>{document.documentElement.setAttribute('data-theme',t);localStorage.setItem(K,t);const i=document.querySelector('.theme-icon');if(i)i.textContent=t==='dark'?'☽':'○'};a(g());document.addEventListener('DOMContentLoaded',()=>{const b=document.getElementById('themeToggle');if(b)b.addEventListener('click',()=>a(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'))})})();

let baseImage = null;
let wmImage = null;
let currentPos = 'center';
let wmType = 'text';

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// Upload zones
const uploadZone = document.getElementById('uploadZone');
const imageInput = document.getElementById('imageInput');
uploadZone.addEventListener('click', () => imageInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag'); loadBaseImage(e.dataTransfer.files[0]); });
imageInput.addEventListener('change', e => loadBaseImage(e.target.files[0]));

const wmUploadZone = document.getElementById('wmUploadZone');
const wmImageInput = document.getElementById('wmImageInput');
wmUploadZone.addEventListener('click', () => wmImageInput.click());
wmUploadZone.addEventListener('dragover', e => { e.preventDefault(); wmUploadZone.classList.add('drag'); });
wmUploadZone.addEventListener('dragleave', () => wmUploadZone.classList.remove('drag'));
wmUploadZone.addEventListener('drop', e => { e.preventDefault(); wmUploadZone.classList.remove('drag'); loadWmImage(e.dataTransfer.files[0]); });
wmImageInput.addEventListener('change', e => loadWmImage(e.target.files[0]));

function loadBaseImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { baseImage = img; render(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function loadWmImage(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { wmImage = img; render(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Mode tabs
document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    wmType = tab.dataset.wm;
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + wmType).classList.add('active');
    render();
  });
});

// Position grid
document.getElementById('posGrid').addEventListener('click', e => {
  const btn = e.target.closest('.pos-btn'); if (!btn) return;
  document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPos = btn.dataset.pos;
  render();
});

// Range displays
function wireRange(id, valId, suffix='') {
  const el = document.getElementById(id), val = document.getElementById(valId);
  el.addEventListener('input', () => { val.textContent = el.value + suffix; render(); });
}
wireRange('wmFontSize','wmFontSizeVal','');
wireRange('wmOpacity','wmOpacityVal','%');
wireRange('wmRotation','wmRotationVal','°');
wireRange('wmImgSize','wmImgSizeVal','%');

// Color sync
document.getElementById('wmColor').addEventListener('input', e => {
  document.getElementById('wmColorHex').value = e.target.value; render();
});
document.getElementById('wmColorHex').addEventListener('input', e => {
  const v = e.target.value;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) { document.getElementById('wmColor').value = v; render(); }
});

// All other inputs
['wmText','wmFont','wmWeight','wmTile'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', render);
  document.getElementById(id)?.addEventListener('change', render);
});

function getPosCoords(cw, ch, wmW, wmH, margin) {
  const positions = {
    'top-left':      [margin, margin],
    'top-center':    [cw/2, margin],
    'top-right':     [cw - margin, margin],
    'center-left':   [margin, ch/2],
    'center':        [cw/2, ch/2],
    'center-right':  [cw - margin, ch/2],
    'bottom-left':   [margin, ch - margin],
    'bottom-center': [cw/2, ch - margin],
    'bottom-right':  [cw - margin, ch - margin],
  };
  return positions[currentPos] || [cw/2, ch/2];
}

function render() {
  if (!baseImage) return;
  const MAX = 1200;
  let w = baseImage.naturalWidth, h = baseImage.naturalHeight;
  if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }

  canvas.width = w; canvas.height = h;
  document.getElementById('canvasDim').textContent = `${baseImage.naturalWidth} × ${baseImage.naturalHeight}px`;
  ctx.drawImage(baseImage, 0, 0, w, h);

  const opacity = parseInt(document.getElementById('wmOpacity').value) / 100;
  const rotation = parseInt(document.getElementById('wmRotation').value) * Math.PI / 180;
  const tile = document.getElementById('wmTile').value;
  const margin = Math.min(w, h) * 0.04;

  ctx.save();
  ctx.globalAlpha = opacity;

  if (wmType === 'text') {
    const text = document.getElementById('wmText').value || '© Watermark';
    const fontSize = parseInt(document.getElementById('wmFontSize').value);
    const font = document.getElementById('wmFont').value;
    const color = document.getElementById('wmColorHex').value || '#ffffff';
    const wParts = document.getElementById('wmWeight').value.split(' ');
    const weight = wParts[0], style = wParts[1];
    ctx.font = `${style} ${weight} ${fontSize}px "${font}"`;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (tile === 'tile') {
      const metrics = ctx.measureText(text);
      const tw = metrics.width + fontSize * 3;
      const th = fontSize * 3;
      for (let y = -h; y < h * 2; y += th) {
        for (let x = -w; x < w * 2; x += tw) {
          ctx.save();
          ctx.translate(x + tw/2, y + th/2);
          ctx.rotate(rotation);
          ctx.fillText(text, 0, 0);
          ctx.restore();
        }
      }
    } else {
      const [cx, cy] = getPosCoords(w, h, 0, 0, margin);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);
      // Shadow for readability
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 4;
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }
  } else if (wmType === 'image' && wmImage) {
    const sizePct = parseInt(document.getElementById('wmImgSize').value) / 100;
    const wmW = w * sizePct;
    const wmH = wmW * (wmImage.naturalHeight / wmImage.naturalWidth);

    if (tile === 'tile') {
      const padW = wmW * 1.5, padH = wmH * 1.5;
      for (let y = -h; y < h * 2; y += padH) {
        for (let x = -w; x < w * 2; x += padW) {
          ctx.save();
          ctx.translate(x + padW/2, y + padH/2);
          ctx.rotate(rotation);
          ctx.drawImage(wmImage, -wmW/2, -wmH/2, wmW, wmH);
          ctx.restore();
        }
      }
    } else {
      const [cx, cy] = getPosCoords(w, h, wmW, wmH, margin);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(rotation);
      ctx.drawImage(wmImage, -wmW/2, -wmH/2, wmW, wmH);
      ctx.restore();
    }
  }

  ctx.restore();
  document.getElementById('downloadBtn').disabled = false;
}

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!baseImage) return;
  // Full-res render
  const offscreen = document.createElement('canvas');
  const ow = baseImage.naturalWidth, oh = baseImage.naturalHeight;
  offscreen.width = ow; offscreen.height = oh;
  const octx = offscreen.getContext('2d');
  octx.drawImage(baseImage, 0, 0, ow, oh);

  const opacity = parseInt(document.getElementById('wmOpacity').value) / 100;
  const rotation = parseInt(document.getElementById('wmRotation').value) * Math.PI / 180;
  const tile = document.getElementById('wmTile').value;
  const margin = Math.min(ow, oh) * 0.04;

  octx.save();
  octx.globalAlpha = opacity;

  if (wmType === 'text') {
    const text = document.getElementById('wmText').value || '© Watermark';
    const fontSize = parseInt(document.getElementById('wmFontSize').value) * (ow / canvas.width);
    const font = document.getElementById('wmFont').value;
    const color = document.getElementById('wmColorHex').value || '#ffffff';
    const wParts = document.getElementById('wmWeight').value.split(' ');
    octx.font = `${wParts[1]} ${wParts[0]} ${fontSize}px "${font}"`;
    octx.fillStyle = color;
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    if (tile === 'tile') {
      const metrics = octx.measureText(text);
      const tw = metrics.width + fontSize * 3, th = fontSize * 3;
      for (let y = -oh; y < oh * 2; y += th)
        for (let x = -ow; x < ow * 2; x += tw) {
          octx.save(); octx.translate(x+tw/2,y+th/2); octx.rotate(rotation); octx.fillText(text,0,0); octx.restore();
        }
    } else {
      const [cx,cy] = getPosCoords(ow,oh,0,0,margin);
      octx.save(); octx.translate(cx,cy); octx.rotate(rotation);
      octx.shadowColor='rgba(0,0,0,0.5)'; octx.shadowBlur=6;
      octx.fillText(text,0,0); octx.restore();
    }
  } else if (wmType === 'image' && wmImage) {
    const sizePct = parseInt(document.getElementById('wmImgSize').value) / 100;
    const wmW = ow * sizePct, wmH = wmW * (wmImage.naturalHeight/wmImage.naturalWidth);
    if (tile === 'tile') {
      const padW = wmW * 1.5, padH = wmH * 1.5;
      for (let y = -oh; y < oh * 2; y += padH)
        for (let x = -ow; x < ow * 2; x += padW) {
          octx.save(); octx.translate(x+padW/2,y+padH/2); octx.rotate(rotation);
          octx.drawImage(wmImage,-wmW/2,-wmH/2,wmW,wmH); octx.restore();
        }
    } else {
      const [cx,cy] = getPosCoords(ow,oh,wmW,wmH,margin);
      octx.save(); octx.translate(cx,cy); octx.rotate(rotation);
      octx.drawImage(wmImage,-wmW/2,-wmH/2,wmW,wmH); octx.restore();
    }
  }
  octx.restore();

  const a = document.createElement('a');
  a.href = offscreen.toDataURL('image/png');
  a.download = 'watermarked.png';
  a.click();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  baseImage = null; wmImage = null;
  canvas.width = 1; canvas.height = 1;
  document.getElementById('canvasDim').textContent = '—';
  document.getElementById('downloadBtn').disabled = true;
  imageInput.value = ''; wmImageInput.value = '';
});
</script>
</body>
